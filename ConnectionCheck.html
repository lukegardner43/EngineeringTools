async function exportPDF(){
  if(!window.jspdf){alert('PDF library not loaded yet.');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
  const W=210, M=15, TW=W-2*M;
  let y=20;

  function pageCheck(need){
    if(y+need>282){doc.addPage();y=20;}
  }

  // Dark header bar
  doc.setFillColor(26,26,26);
  doc.rect(0,0,210,16,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text('P358 Steel Connection Design Check',M,11);
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(180,180,180);
  doc.text('SCI P358 · EN 1993-1-8 · UK NA · γM0 = 1.00 · γM2 = 1.25',W-M,11,{align:'right'});

  // Project meta block
  y=24;
  const mFields=[
    ['Project',   document.getElementById('proj-name')?.value||''],
    ['Reference', document.getElementById('proj-ref')?.value||''],
    ['Engineer',  document.getElementById('proj-eng')?.value||''],
    ['Date',      document.getElementById('proj-date')?.value||''],
  ];
  doc.setFontSize(8);
  mFields.forEach(([k,v],i)=>{
    const col=(i<2)?0:TW/2;
    const row=i%2;
    doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
    doc.text(k+':',M+col,y+row*5);
    doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
    doc.text(v||'—',M+col+22,y+row*5);
  });
  y+=14;

  // Section heading helper
  function h1(txt){
    pageCheck(10);
    doc.setFillColor(240,238,234);doc.rect(M,y-4,TW,8,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(20,20,20);
    doc.text(txt,M+2,y+1);y+=9;
  }

  // Plain label-value row
  function row(lbl,val,ref){
    pageCheck(5);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
    doc.text(lbl,M,y,{maxWidth:TW*0.54});
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(15,15,15);
    doc.text(String(val),M+TW*0.56,y,{maxWidth:TW*0.26});
    if(ref){doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(130,130,130);doc.text(ref,W-M,y,{align:'right',maxWidth:TW*0.18});}
    y+=4.5;
  }

  // Coloured check result row
  function rowResult(lbl,val,ok){
    pageCheck(6);
    doc.setFillColor(ok?228:252,ok?242:228,ok?220:220);
    doc.rect(M,y-3.5,TW,5.5,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
    doc.text(lbl,M+1,y,{maxWidth:TW*0.52});
    doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.setTextColor(ok?25:170,ok?100:25,ok?25:25);
    doc.text(val,M+TW*0.56,y,{maxWidth:TW*0.44});
    doc.setTextColor(15,15,15);y+=5.5;
  }

  async function latexToPNG(tex, widthMM){
    const PX_PER_MM=3.78, SCALE=2;
    const pxW=Math.round(widthMM*PX_PER_MM);
    const wrap=document.createElement('div');
    wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:${pxW}px;background:white;color:black;font-size:11px;line-height:1.4;padding:2px 4px;box-sizing:border-box`;
    document.body.appendChild(wrap);
    try{
      katex.render(tex,wrap,{throwOnError:false,displayMode:false,output:'html'});
      const cssH=wrap.offsetHeight;
      const cvs=await html2canvas(wrap,{scale:SCALE,backgroundColor:'#ffffff',logging:false,width:pxW,height:cssH});
      document.body.removeChild(wrap);
      return{png:cvs.toDataURL('image/png'),heightMM:Math.min(cssH/PX_PER_MM,12)};
    }catch(e){
      if(document.body.contains(wrap))document.body.removeChild(wrap);
      return null;
    }
  }
  async function frow(label,latexStr,ref){
    const result=await latexToPNG(latexStr,TW-10);
    const imgH=result?result.heightMM:5;
    const labelH=label?4.5:0;
    pageCheck(labelH+imgH+3);
    if(label){
      doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(80,80,80);
      doc.text(label,M+2,y); y+=4.5;
    }
    if(result){
      doc.addImage(result.png,'PNG',M+4,y,TW-10,imgH);
      y+=imgH+2;
    }
    if(ref){
      doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(130,130,130);
      doc.text(ref,W-M,y,{align:'right'});
    }
  }

  const res     = window.lastRes;
  const type    = window.lastType||'Connection Design';
  const summary = window.lastSummary||[];

  if(!res){
    row('No results available — run calculation first.','','');
    doc.save('Connection_Check_Report.pdf');
    return;
  }

  const {checks,allPass,maxR} = res;

  // Overall verdict banner
  pageCheck(14);
  doc.setFillColor(allPass?42:180, allPass?110:40, allPass?30:40);
  doc.roundedRect(M,y,TW,11,2,2,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(255,255,255);
  doc.text(
    allPass ? 'CONNECTION ADEQUATE — ALL CHECKS PASS' : 'CONNECTION INADEQUATE — CHECKS FAILED',
    W/2, y+7.5, {align:'center'}
  );
  y+=16;

  // Utilisation summary line
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
  const passCount=checks.filter(c=>c.pass).length;
  doc.text(
    `${passCount} of ${checks.length} checks pass  ·  Max utilisation: ${(maxR*100).toFixed(1)}%  ·  P358 / EC3-1-8 / UK NA`,
    M, y
  );
  y+=8;

  // 1. Connection type / input summary
  h1(`1. ${type} — Input Summary`);
  summary.forEach(([k,v])=>row(k,v,''));
  y+=3;

  // 2. Design checks
  h1('2. Design Checks');
  for(const c of checks){
    const util=`η = ${(c.r*100).toFixed(1)}%`;
    const demcap=`${rd(c.dem)} / ${rd(c.cap)} ${c.unit}`;
    rowResult(
      `${c.id}.  ${c.name}`,
      c.pass ? `PASS  ${util}  (${demcap})` : `FAIL  ${util}  (${demcap})`,
      c.pass
    );
    // KaTeX utilisation fraction
    const uLaTeX=`\\eta = \\dfrac{${rd(c.dem)}}{${rd(c.cap)}}\\,\\text{${c.unit}} = ${rd(c.r,3)}\\;${c.pass?'\\leq 1.0\\;\\checkmark':'>1.0\\;\\times'}`;
    await frow('',uLaTeX,'');
    // KaTeX capacity formula (if provided)
    if(c.latex) await frow('',c.latex,'');
    // Calc lines
    if(c.ref){
      pageCheck(4);
      doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(130,130,130);
      doc.text(c.ref, M+3, y); y+=4;
    }
    if(c.lines && c.lines.length){
      c.lines.slice(0,4).forEach(line=>{
        if(!line) return;
        pageCheck(4);
        doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(80,80,80);
        doc.text('  '+line, M+3, y, {maxWidth:TW-3}); y+=4;
      });
    }
    y+=2;
  }

  // 3. Notes
  pageCheck(20);
  y+=4;
  h1('3. Notes');
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(60,60,60);
  const noteLines=[
    'SCI P358 / EN 1993-1-8:2005 / UK National Annex. Section properties: t ≤ 16 mm per BS EN 10025-2.',
    'Bolt grade 8.8 (fub = 800 MPa), threads assumed in shear plane. γM0 = 1.00, γM2 = 1.25.',
    'Design aid only — engineer to verify all inputs and applicability to specific project conditions.',
  ];
  noteLines.forEach(line=>{
    pageCheck(5);
    doc.text(line,M,y,{maxWidth:TW});
    y+=5;
  });

  // Footer on each page
  const totalPages=doc.getNumberOfPages();
  for(let i=1;i<=totalPages;i++){
    doc.setPage(i);
    doc.setFillColor(240,238,234);
    doc.rect(0,287,210,10,'F');
    doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(120,120,120);
    doc.text(
      `Page ${i} of ${totalPages}  |  P358 Steel Connection Design Check  |  Generated ${new Date().toLocaleDateString('en-GB')}`,
      W/2,293,{align:'center'}
    );
  }

  const ref=document.getElementById('proj-ref')?.value||'Report';
  doc.save(`Connection_Check_${ref.replace(/\s+/g,'_')}.pdf`);
}
</script>
</body>
</html>
