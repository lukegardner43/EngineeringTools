// в”Җв”Җв”Җ CALCULATIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const fv=v=>parseFloat(v)||0, fi=v=>Math.max(1,parseInt(v)||1);
const rd=(v,d=2)=>(+v).toFixed(d), esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const rc=r=>r>1?'var(--fail)':r>.85?'var(--warn)':'var(--pass)';
function chk(id,name,ref,lines,cap,dem,unit){const r=cap>0?dem/cap:999;return{id,name,ref,lines,cap,dem,unit,r,pass:r<=1};}

function calcFin(g){
  const b=BOLT[g.boltSize],pm=MAT[g.platGrade],bm=MAT[g.beamGrade];
  const Vn=fv(g.V)*1e3,nb=fi(g.n),P1=fv(g.p1),E1=fv(g.e1),E2p=fv(g.e2p),E2w=fv(g.e2w);
  const Tp=fv(g.tp),Hp=fv(g.hp),Lp=fv(g.lp),Tw=fv(g.tw),Aw=.707*fv(g.aw);
  const{d,d0,As}=b,fub=800,a=Lp-E2p;
  // ОіM2 = 1.25 for bolts/welds (EC3-1-8 UK NA); = 1.1 for plate cross-section fracture (EC3-1-1 UK NA)
  const GM2s=1.1;  // section fracture (net shear, block shear on plates)
  let Iy=0;for(let i=0;i<nb;i++){const y=i*P1-(nb-1)*P1/2;Iy+=y*y;}
  const ym=(nb-1)*P1/2,M=Vn*a,Fvd=Vn/nb,Fhm=Iy>0?M*ym/Iy:0,Fr=Math.sqrt(Fvd*Fvd+Fhm*Fhm);
  const C=[];

  // 1 вҖ” Bolt group shear (elastic in-plane analysis, equivalent to P358 Оұ-ОІ for n2=1)
  const FvRd=.6*fub*As/GM2;
  const beta_check = 6*a/(nb*(nb+1)*P1);
  C.push(chk('1','Bolt Group вҖ” Shear Resistance','EC3-1-8 Table 3.4 / P358 В§5.5 Check 2',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mmВІ  Fv,Rd = 0.6Г—${fub}Г—${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `Eccentricity z = a = Lp вҲ’ eвӮӮ = ${Lp} вҲ’ ${E2p} = ${a} mm`,
    `Elastic analysis (вүЎ P358 ОІ-method: ОІ = 6z/[n(n+1)pвӮҒ] = ${rd(beta_check,3)})`,
    `Iy = ОЈyiВІ = ${rd(Iy,0)} mmВІ   ymax = ${ym} mm`,
    `F_direct = V/n = ${rd(Fvd/1e3)} kN   F_moment = VВ·aВ·ymax/Iy = ${rd(Fhm/1e3)} kN`,
    `F_resultant = вҲҡ(${rd(Fvd/1e3)}ВІ+${rd(Fhm/1e3)}ВІ) = ${rd(Fr/1e3)} kN`,
  ],FvRd/1e3,Fr/1e3,'kN'));

  // 2 вҖ” Bearing on fin plate
  const k1p=Math.min(2.8*E2p/d0-1.7,2.5),abp=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/pm.fu,1):Math.min(E1/(3*d0),fub/pm.fu,1);
  const FbpRd=Math.max(0,k1p)*Math.max(0,abp)*pm.fu*d*Tp/GM2/1e3;
  C.push(chk('2','Bearing Resistance вҖ” Fin Plate','EC3-1-8 Table 3.4 / P358 В§5.5 Check 3',[
    `kвӮҒ = min(2.8Г—${E2p}/${d0}вҲ’1.7, 2.5) = ${rd(k1p)}`,
    `Оұb = min(eвӮҒ/3dвӮҖ${nb>1?`, pвӮҒ/3dвӮҖвҲ’Вј`:``, `fub/fu`}, 1) = ${rd(abp,3)}`,
    `Fb,Rd = ${rd(k1p)}Г—${rd(abp,3)}Г—${pm.fu}Г—${d}Г—${Tp}/1.25 = ${rd(FbpRd)} kN`,
  ],FbpRd,Fr/1e3,'kN'));

  // 3 вҖ” Bearing on beam web
  const k1w=Math.min(2.8*E2w/d0-1.7,2.5),abw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbwRd=Math.max(0,k1w)*Math.max(0,abw)*bm.fu*d*Tw/GM2/1e3;
  C.push(chk('3','Bearing Resistance вҖ” Beam Web','EC3-1-8 Table 3.4 / P358 В§5.5 Check 4',[
    `kвӮҒ = ${rd(k1w)}   Оұb = ${rd(abw,3)}   tw = ${Tw} mm   fu,beam = ${bm.fu} MPa`,
    `Fb,Rd = ${rd(k1w)}Г—${rd(abw,3)}Г—${bm.fu}Г—${d}Г—${Tw}/1.25 = ${rd(FbwRd)} kN`,
  ],FbwRd,Fr/1e3,'kN'));

  // 4 вҖ” Fin plate gross shear
  const VgRd_p=pm.fy*Hp*Tp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','Fin Plate вҖ” Gross Section Shear','EC3-1-1 В§6.2.6 / P358 В§5.5 Check 5',[
    `Av = hp Г— tp = ${Hp}Г—${Tp} = ${Hp*Tp} mmВІ`,
    `Vpl,Rd = fyГ—Av/(вҲҡ3Г—ОіM0) = ${pm.fy}Г—${Hp*Tp}/вҲҡ3 = ${rd(VgRd_p)} kN`,
  ],VgRd_p,fv(g.V),'kN'));

  // 5 вҖ” Fin plate net shear  [ОіM2 = 1.1 per EC3-1-1 UK NA вҖ” P358 В§5.5 Note]
  const Avnet_p=(Hp-nb*d0)*Tp;
  const VnRd_p=.9*pm.fu*Math.max(0,Avnet_p)/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','Fin Plate вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§5.5 Check 6',[
    `Anet = (hp вҲ’ nВ·dвӮҖ)Г—tp = (${Hp}вҲ’${nb}Г—${d0})Г—${Tp} = ${Avnet_p} mmВІ`,
    `Vnet,Rd = 0.9Г—fuГ—Anet/(вҲҡ3Г—ОіM2) = 0.9Г—${pm.fu}Г—${Math.max(0,Avnet_p)}/(вҲҡ3Г—1.1) = ${rd(VnRd_p)} kN`,
    `Note: ОіM2 = 1.1 per EC3-1-1 UK NA for plate cross-section fracture`,
  ],VnRd_p,fv(g.V),'kN'));

  // 6 вҖ” Fin plate block shear  [fu term: ОіM2 = 1.1]
  const Ant_p=Math.max(0,(E2p-d0/2)*Tp),Anv_p=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tp);
  const Veff_p=(pm.fu*Ant_p/GM2s+pm.fy*Anv_p/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','Fin Plate вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§5.5 Check 7',[
    `Ant = (eвӮӮp вҲ’ dвӮҖ/2)Г—tp = ${rd(Ant_p,0)} mmВІ   Anv = ${rd(Anv_p,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2 + fyВ·Anv/(вҲҡ3В·ОіM0)  (ОіM2 = 1.1 for plate fracture)`,
    `       = ${rd(pm.fu*Ant_p/GM2s/1e3)} + ${rd(pm.fy*Anv_p/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_p)} kN`,
  ],Veff_p,fv(g.V),'kN'));

  // 7 вҖ” Fin plate bending due to eccentricity
  const MEd=Vn*a/1e6,Wel=Tp*Hp*Hp/6,MRd=pm.fy*Wel/GM0/1e6;
  C.push(chk('7','Fin Plate вҖ” Bending (Eccentricity)','EC3-1-1 В§6.2.5 / P358 В§5.5 Check 8',[
    `Eccentricity a = Lp вҲ’ eвӮӮ = ${a} mm`,
    `MEd = VГ—a = ${rd(Vn/1e3)}Г—${a}/1000 = ${rd(MEd)} kNВ·m`,
    `Wel = tpГ—hpВІ/6 = ${Tp}Г—${Hp}ВІ/6 = ${rd(Wel,0)} mmВі`,
    `MRd = fyГ—Wel/ОіM0 = ${pm.fy}Г—${rd(Wel,0)}/10вҒ¶ = ${rd(MRd)} kNВ·m`,
  ],MRd,MEd,'kNВ·m'));

  // 8 вҖ” Fillet weld to support (DIRECT SHEAR ONLY per P358 Appendix C.3)
  // The fin plate weld carries vertical shear V only. The eccentricity moment is
  // resisted by the fin plate in bending (Check 7), NOT transferred back to the weld.
  const fwRd_w=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const tau_w=Vn/(2*Aw*Hp);
  C.push(chk('8','Fillet Weld to Support вҖ” Direct Shear','EC3-1-8 В§4.5.3 / P358 App.C.3',[
    `Weld leg = ${fv(g.aw)} mm   throat a = ${rd(Aw)} mm   (both sides, length = hp)`,
    `fw,Rd = fu/(вҲҡ3В·ОІwВ·ОіM2) = ${pm.fu}/(вҲҡ3Г—${pm.bw}Г—1.25) = ${rd(fwRd_w,1)} N/mmВІ`,
    `П„ = V/(2В·aВ·hp) = ${rd(Vn/1e3,0)}k/(2Г—${rd(Aw)}Г—${Hp}) = ${rd(tau_w,1)} N/mmВІ`,
    `P358 App.C.3: fin plate weld resists direct shear only вҖ” moment is carried`,
    `by the plate in bending (Check 7), not transferred back to the weld.`,
  ],fwRd_w,tau_w,'N/mmВІ'));

  // 9 вҖ” Beam web gross shear (local, at connection zone)
  const Av_bw=Hp*Tw;
  const VgRd_bw=bm.fy*Av_bw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('9','Beam Web вҖ” Gross Section Shear (Local)','EC3-1-1 В§6.2.6 / P358 В§5.5 Check 9',[
    `Local shear area: Av = hp Г— tw = ${Hp}Г—${Tw} = ${Av_bw} mmВІ`,
    `Vpl,Rd = fy,bГ—Av/(вҲҡ3Г—ОіM0) = ${bm.fy}Г—${Av_bw}/вҲҡ3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN'));

  // 10 вҖ” Beam web net shear  [ОіM2 = 1.1]
  const Avnet_bw=Math.max(0,(Hp-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('10','Beam Web вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§5.5 Check 10',[
    `Anet = (hp вҲ’ nВ·dвӮҖ)Г—tw = (${Hp}вҲ’${nb}Г—${d0})Г—${Tw} = ${Avnet_bw} mmВІ`,
    `Vnet,Rd = 0.9Г—fu,bГ—Anet/(вҲҡ3Г—ОіM2) = 0.9Г—${bm.fu}Г—${Avnet_bw}/(вҲҡ3Г—1.1) = ${rd(VnRd_bw)} kN`,
    `Note: ОіM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN'));

  // 11 вҖ” Beam web block shear  [fu term: ОіM2 = 1.1]
  const Ant_bw=Math.max(0,(E2w-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('11','Beam Web вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§5.5 Check 11',[
    `Ant = (eвӮӮw вҲ’ dвӮҖ/2)Г—tw = (${E2w}вҲ’${d0/2})Г—${Tw} = ${rd(Ant_bw,0)} mmВІ`,
    `Anv = (eвӮҒ + (nвҲ’1)pвӮҒ вҲ’ (nвҲ’0.5)dвӮҖ)Г—tw = ${rd(Anv_bw,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2 + fyВ·Anv/(вҲҡ3В·ОіM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)} + ${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `ОіM2 = 1.1 for beam web fracture (EC3-1-1 UK NA)`,
  ],Veff_bw,fv(g.V),'kN'));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcPDEP(g){
  // Partial Depth End Plate вҖ” P358 В§4.5
  // Key structural characteristic: connection rotation causes tension in top bolts,
  // so P358 В§4.5 Check 2 applies a 0.8 reduction factor to bolt shear capacity.
  const b=BOLT[g.boltSize],pm=MAT[g.platGrade],cm=MAT[g.colGrade],bm=MAT[g.beamGrade];
  const Vn=fv(g.V)*1e3,nb=fi(g.n),P1=fv(g.p1),E1=fv(g.e1),E2=fv(g.e2),Ep=fv(g.ep);
  const Tp=fv(g.tp),Hp=fv(g.hp),Tfc=fv(g.tfc),Tw=fv(g.tw),Aw=.707*fv(g.aw);
  const{d,d0,As}=b,fub=800,Fvd=Vn/nb;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)
  const C=[];

  // 1 вҖ” Bolt group shear with 0.8 tension reduction (P358 В§4.5 Check 2)
  const FvRd=.6*fub*As/GM2;
  const VRd_bolts = nb * 0.8 * FvRd;   // 0.8 factor per P358: bolts carry combined shear + tension
  C.push(chk('1','Bolt Group вҖ” Shear Resistance (with 0.8 Tension Reduction)','EC3-1-8 Table 3.4 / P358 В§4.5 Check 2',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mmВІ`,
    `Fv,Rd = 0.6Г—${fub}Г—${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `P358 В§4.5: PDEP rotation causes tension in top bolts вҖ” 0.8 reduction applied`,
    `VRd = n Г— 0.8 Г— Fv,Rd = ${nb} Г— 0.8 Г— ${rd(FvRd/1e3)} = ${rd(VRd_bolts/1e3)} kN`,
  ],VRd_bolts/1e3,fv(g.V),'kN'));

  // 2 вҖ” Bearing on end plate (demand = direct shear per bolt = V/n)
  const k1p=Math.min(2.8*E2/d0-1.7,2.5);
  const abp=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/pm.fu,1):Math.min(E1/(3*d0),fub/pm.fu,1);
  const FbpRd=Math.max(0,k1p)*Math.max(0,abp)*pm.fu*d*Tp/GM2/1e3;
  C.push(chk('2','Bearing Resistance вҖ” End Plate','EC3-1-8 Table 3.4 / P358 В§4.5 Check 3',[
    `kвӮҒ = min(2.8Г—${E2}/${d0}вҲ’1.7, 2.5) = ${rd(k1p)}`,
    `Оұb = ${rd(abp,3)}   tp = ${Tp} mm   fu,plate = ${pm.fu} MPa`,
    `Fb,Rd = ${rd(k1p)}Г—${rd(abp,3)}Г—${pm.fu}Г—${d}Г—${Tp}/1.25 = ${rd(FbpRd)} kN`,
    `Applied per bolt = V/n = ${rd(Fvd/1e3)} kN`,
  ],FbpRd,Fvd/1e3,'kN'));

  // 3 вҖ” Bearing on column flange
  const k1c=Math.min(2.8*E2/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing Resistance вҖ” Column Flange','EC3-1-8 Table 3.4 / P358 В§4.5 Check 4',[
    `kвӮҒ = ${rd(k1c)}   Оұb = ${rd(abc,3)}   tfc = ${Tfc} mm   fu,col = ${cm.fu} MPa`,
    `Fb,Rd = ${rd(FbcRd)} kN   Applied per bolt = ${rd(Fvd/1e3)} kN`,
  ],FbcRd,Fvd/1e3,'kN'));

  // 4 вҖ” End plate gross shear
  const VgRd_p=pm.fy*Hp*Tp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','End Plate вҖ” Gross Section Shear','EC3-1-1 В§6.2.6 / P358 В§4.5 Check 5',[
    `Av = hp Г— tp = ${Hp}Г—${Tp} = ${Hp*Tp} mmВІ`,
    `Vpl,Rd = ${pm.fy}Г—${Hp*Tp}/вҲҡ3 = ${rd(VgRd_p)} kN`,
  ],VgRd_p,fv(g.V),'kN'));

  // 5 вҖ” End plate net shear [ОіM2 = 1.1 per EC3-1-1 UK NA]
  const Avnet_p=Math.max(0,(Hp-nb*d0)*Tp);
  const VnRd_p=.9*pm.fu*Avnet_p/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','End Plate вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§4.5 Check 6',[
    `Anet = (${Hp} вҲ’ ${nb}Г—${d0}) Г— ${Tp} = ${Avnet_p} mmВІ`,
    `Vnet,Rd = 0.9Г—${pm.fu}Г—${Avnet_p}/(вҲҡ3Г—1.1) = ${rd(VnRd_p)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],VnRd_p,fv(g.V),'kN'));

  // 6 вҖ” End plate block shear [fu term: ОіM2 = 1.1]
  const Ant_p=Math.max(0,(E2-d0/2)*Tp);
  const Anv_p=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tp);
  const Veff_p=(pm.fu*Ant_p/GM2s+pm.fy*Anv_p/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','End Plate вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§4.5 Check 7',[
    `Ant = (eвӮӮ вҲ’ dвӮҖ/2)Г—tp = (${E2}вҲ’${d0/2})Г—${Tp} = ${rd(Ant_p,0)} mmВІ`,
    `Anv = (eвӮҒ+(nвҲ’1)pвӮҒвҲ’(nвҲ’0.5)dвӮҖ)Г—tp = ${rd(Anv_p,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2 + fyВ·Anv/(вҲҡ3В·ОіM0) = ${rd(pm.fu*Ant_p/GM2s/1e3)} + ${rd(pm.fy*Anv_p/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_p)} kN`,
    `ОіM2 = 1.1 for plate cross-section fracture (EC3-1-1 UK NA)`,
  ],Veff_p,fv(g.V),'kN'));

  // 7 вҖ” End plate bending (coexisting moment from bolt eccentricity)
  // P358 В§4.5 Check 9: low shear (VEd вүӨ 0.5 Vpl,Rd) вҖ” check moment separately.
  // High shear case: reduced moment capacity. We show both for completeness.
  const MEd_p=Vn*Ep/1e6;
  const Wel_p=Tp*Hp*Hp/6;
  const MRd_p=pm.fy*Wel_p/GM0/1e6;
  const isLowShear = fv(g.V) <= 0.5*VgRd_p;
  C.push(chk('7','End Plate вҖ” Bending (Coexisting Moment)','EC3-1-1 В§6.2.5 / P358 В§4.5 Check 9',[
    `e = bolt CL to beam web = ${Ep} mm`,
    `MEd = VГ—e = ${rd(Vn/1e3)}Г—${Ep}/1000 = ${rd(MEd_p)} kNВ·m`,
    `Wel = tpГ—hpВІ/6 = ${Tp}Г—${Hp}ВІ/6 = ${rd(Wel_p,0)} mmВі`,
    `MRd = fyГ—Wel/ОіM0 = ${rd(MRd_p)} kNВ·m`,
    `VEd/Vpl,Rd = ${rd(fv(g.V)/VgRd_p,3)} вҶ’ ${isLowShear?'LOW shear: M and V checked separately (OK)':'HIGH shear: moment capacity reduced вҖ” check interaction'}`,
  ],MRd_p,MEd_p,'kNВ·m'));

  // 8 вҖ” Weld to beam web (full-strength per P358 App. C.2 вҖ” direct shear only)
  const fwRd_p=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const fwRd_b=bm.fu/(Math.sqrt(3)*bm.bw*GM2);
  const fwRd=Math.min(fwRd_p,fwRd_b);
  const tau_w=Vn/(2*Aw*Hp);
  C.push(chk('8','Fillet Weld to Beam Web вҖ” Shear','EC3-1-8 В§4.5.3 / P358 App. C.2',[
    `Leg = ${fv(g.aw)} mm   throat a = ${rd(Aw)} mm   (both sides, length = hp)`,
    `fw,Rd = min(fu,plate, fu,beam)/(вҲҡ3В·ОІwВ·ОіM2) = min(${rd(fwRd_p,1)}, ${rd(fwRd_b,1)}) = ${rd(fwRd,1)} N/mmВІ`,
    `П„ = V/(2В·aВ·hp) = ${rd(Vn/1e3,0)}k/(2Г—${rd(Aw)}Г—${Hp}) = ${rd(tau_w,1)} N/mmВІ`,
    `P358 App. C.2: end plate weld is full-strength вҖ” direct shear only governs`,
  ],fwRd,tau_w,'N/mmВІ'));

  // 9 вҖ” Beam web gross shear (local at connection zone)
  const VgRd_bw=bm.fy*Hp*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('9','Beam Web вҖ” Gross Section Shear (Local)','EC3-1-1 В§6.2.6 / P358 В§4.5 Check 10',[
    `Local shear area: Av = hp Г— tw = ${Hp}Г—${Tw} = ${Hp*Tw} mmВІ`,
    `Vpl,Rd = ${bm.fy}Г—${Hp*Tw}/вҲҡ3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN'));

  // 10 вҖ” Beam web net shear [ОіM2 = 1.1]
  const Avnet_bw=Math.max(0,(Hp-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('10','Beam Web вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§4.5 Check 11',[
    `Anet = (${Hp}вҲ’${nb}Г—${d0})Г—${Tw} = ${Avnet_bw} mmВІ`,
    `Vnet,Rd = 0.9Г—${bm.fu}Г—${Avnet_bw}/(вҲҡ3Г—1.1) = ${rd(VnRd_bw)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN'));

  // 11 вҖ” Beam web block shear [ОіM2 = 1.1]
  const Ant_bw=Math.max(0,(E2-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('11','Beam Web вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§4.5 Check 12',[
    `Ant = (eвӮӮвҲ’dвӮҖ/2)Г—tw = ${rd(Ant_bw,0)} mmВІ   Anv = ${rd(Anv_bw,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2 + fyВ·Anv/(вҲҡ3В·ОіM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)} + ${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `ОіM2 = 1.1 for beam web fracture (EC3-1-1 UK NA)`,
  ],Veff_bw,fv(g.V),'kN'));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcFDEP(g){
  // Full Depth End Plate вҖ” P358 В§4.7
  // Plate welded to beam web AND both flanges. Web weld carries shear;
  // flange welds carry the moment couple from eccentricity.
  // Like PDEP, the 0.8 bolt reduction applies (coexisting tension from rotation).
  const b=BOLT[g.boltSize],pm=MAT[g.platGrade],cm=MAT[g.colGrade],bm=MAT[g.beamGrade];
  const Vn=fv(g.V)*1e3,nb=fi(g.n),P1=fv(g.p1),E1=fv(g.e1),E2=fv(g.e2),Ep=fv(g.ep);
  const Tp=fv(g.tp),D=fv(g.d),Tw=fv(g.tw),Tf=fv(g.tf),Bf=fv(g.bf),Tfc=fv(g.tfc);
  const Hp=D;
  const dw=D-2*Tf;     // clear web depth
  const ds=D-Tf;       // lever arm: flange CL to flange CL вүҲ dвҲ’tf
  const Aw_w=.707*fv(g.aww);
  const Aw_f=.707*fv(g.awf);
  const{d,d0,As}=b,fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)
  const C=[];

  // 1 вҖ” Bolt group shear with 0.8 reduction (P358 В§4.7 Check 2)
  // AD370 / P358 page 76 confirms FDEP uses same 0.8 reduction as PDEP.
  const FvRd=.6*fub*As/GM2;
  const VRd_bolts = nb * 0.8 * FvRd;
  C.push(chk('1','Bolt Group вҖ” Shear Resistance (0.8 Tension Reduction)','EC3-1-8 Table 3.4 / P358 В§4.7 Check 2',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mmВІ`,
    `Fv,Rd = 0.6Г—${fub}Г—${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `FDEP rotation induces tension in bolts вҖ” 0.8 reduction per P358 В§4.7 (same as PDEP)`,
    `VRd = n Г— 0.8 Г— Fv,Rd = ${nb} Г— 0.8 Г— ${rd(FvRd/1e3)} = ${rd(VRd_bolts/1e3)} kN`,
  ],VRd_bolts/1e3,fv(g.V),'kN'));

  // 2 вҖ” Bearing on end plate (demand = V/n per bolt)
  const Fvd=Vn/nb;
  const k1p=Math.min(2.8*E2/d0-1.7,2.5);
  const abp=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/pm.fu,1):Math.min(E1/(3*d0),fub/pm.fu,1);
  const FbpRd=Math.max(0,k1p)*Math.max(0,abp)*pm.fu*d*Tp/GM2/1e3;
  C.push(chk('2','Bearing Resistance вҖ” End Plate','EC3-1-8 Table 3.4 / P358 В§4.7 Check 3',[
    `kвӮҒ = ${rd(k1p)}  Оұb = ${rd(abp,3)}  tp = ${Tp} mm  fu,plate = ${pm.fu} MPa`,
    `Fb,Rd = ${rd(FbpRd)} kN   Applied per bolt = V/n = ${rd(Fvd/1e3)} kN`,
  ],FbpRd,Fvd/1e3,'kN'));

  // 3 вҖ” Bearing on column flange
  const k1c=Math.min(2.8*E2/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing Resistance вҖ” Column Flange','EC3-1-8 Table 3.4 / P358 В§4.7 Check 4',[
    `kвӮҒ = ${rd(k1c)}  Оұb = ${rd(abc,3)}  tfc = ${Tfc} mm  fu,col = ${cm.fu} MPa`,
    `Fb,Rd = ${rd(FbcRd)} kN   Applied per bolt = ${rd(Fvd/1e3)} kN`,
  ],FbcRd,Fvd/1e3,'kN'));

  // 4 вҖ” End plate gross shear (full depth = beam depth D)
  const VgRd_p=pm.fy*Hp*Tp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','End Plate вҖ” Gross Section Shear','EC3-1-1 В§6.2.6 / P358 В§4.7 Check 5',[
    `hp = d = ${D} mm  (full beam depth)`,
    `Av = hp Г— tp = ${D}Г—${Tp} = ${D*Tp} mmВІ`,
    `Vpl,Rd = ${pm.fy}Г—${D*Tp}/(вҲҡ3Г—1.0) = ${rd(VgRd_p)} kN`,
  ],VgRd_p,fv(g.V),'kN'));

  // 5 вҖ” End plate net shear [ОіM2 = 1.1 per EC3-1-1 UK NA]
  const Avnet_p=Math.max(0,(Hp-nb*d0)*Tp);
  const VnRd_p=.9*pm.fu*Avnet_p/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','End Plate вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§4.7 Check 6',[
    `Anet = (${D}вҲ’${nb}Г—${d0})Г—${Tp} = ${Avnet_p} mmВІ`,
    `Vnet,Rd = 0.9Г—${pm.fu}Г—${Avnet_p}/(вҲҡ3Г—1.1) = ${rd(VnRd_p)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],VnRd_p,fv(g.V),'kN'));

  // 6 вҖ” End plate block shear [fu term: ОіM2 = 1.1]
  const Ant_p=Math.max(0,(E2-d0/2)*Tp);
  const Anv_p=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tp);
  const Veff_p=(pm.fu*Ant_p/GM2s+pm.fy*Anv_p/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','End Plate вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§4.7 Check 7',[
    `Ant = (eвӮӮвҲ’dвӮҖ/2)Г—tp = (${E2}вҲ’${d0/2})Г—${Tp} = ${rd(Ant_p,0)} mmВІ`,
    `Anv = (eвӮҒ+(nвҲ’1)pвӮҒвҲ’(nвҲ’0.5)dвӮҖ)Г—tp = ${rd(Anv_p,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2 + fyВ·Anv/(вҲҡ3В·ОіM0)  (ОіM2 = 1.1)`,
    `       = ${rd(pm.fu*Ant_p/GM2s/1e3)} + ${rd(pm.fy*Anv_p/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_p)} kN`,
  ],Veff_p,fv(g.V),'kN'));

  // 7 вҖ” End plate bending (eccentricity from bolt CL to web weld face)
  // P358 В§4.7: flange welds restrain plate rotation, so plate bending check is
  // on the web strip: MEd = VГ—e; MRd = fyГ—Wel (using full plate hp is conservative)
  const MEd_p=Vn*Ep/1e6;
  const Wel_p=Tp*Hp*Hp/6;
  const MRd_p=pm.fy*Wel_p/GM0/1e6;
  C.push(chk('7','End Plate вҖ” Bending (Eccentricity)','EC3-1-1 В§6.2.5 / P358 В§4.7 Check 8',[
    `e (bolt CL вҶ’ beam web) = ${Ep} mm`,
    `MEd = VГ—e = ${rd(Vn/1e3)}Г—${Ep}/1000 = ${rd(MEd_p)} kNВ·m`,
    `Wel = tpГ—hpВІ/6 = ${Tp}Г—${D}ВІ/6 = ${rd(Wel_p,0)} mmВі  (hp = d = ${D} mm, conservative)`,
    `MRd = fyГ—Wel/ОіM0 = ${rd(MRd_p)} kNВ·m`,
    `Flange welds restrain rotation вҖ” conservative to use full plate section modulus`,
  ],MRd_p,MEd_p,'kNВ·m'));

  // 8 вҖ” Web fillet weld (direct shear only; moment taken by flange welds)
  const fwRd_wp=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const fwRd_wb=bm.fu/(Math.sqrt(3)*bm.bw*GM2);
  const fwRd_w=Math.min(fwRd_wp,fwRd_wb);
  const tau_w=Vn/(2*Aw_w*dw);
  C.push(chk('8','Web Fillet Weld вҖ” Direct Shear','EC3-1-8 В§4.5.3 / P358 В§4.7 / App.C.2',[
    `Web weld leg = ${fv(g.aww)} mm  throat = ${rd(Aw_w)} mm  (both sides)`,
    `Clear web: dw = dвҲ’2tf = ${D}вҲ’${2*Tf} = ${rd(dw,0)} mm`,
    `fw,Rd = min(${rd(fwRd_wp,1)}, ${rd(fwRd_wb,1)}) = ${rd(fwRd_w,1)} N/mmВІ  (weaker part governs)`,
    `П„ = V/(2В·aВ·dw) = ${rd(Vn/1e3,0)}k/(2Г—${rd(Aw_w)}Г—${rd(dw,0)}) = ${rd(tau_w,1)} N/mmВІ`,
    `Web welds: shear only вҖ” moment couple carried by flange welds (Check 9)`,
  ],fwRd_w,tau_w,'N/mmВІ'));

  // 9 вҖ” Flange fillet weld (horizontal force couple from coexisting moment)
  const Ffl=Vn*Ep/ds;
  const fwRd_fp=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const fwRd_fb=bm.fu/(Math.sqrt(3)*bm.bw*GM2);
  const fwRd_f=Math.min(fwRd_fp,fwRd_fb);
  const F_fl_Rd=fwRd_f*Aw_f*Bf;
  C.push(chk('9','Flange Fillet Weld вҖ” Horizontal Force Couple','EC3-1-8 В§4.5.3 / P358 В§4.7 Check 9',[
    `Flange weld leg = ${fv(g.awf)} mm  throat = ${rd(Aw_f)} mm  length = bf = ${Bf} mm`,
    `Lever arm: ds = dвҲ’tf = ${D}вҲ’${Tf} = ${rd(ds,0)} mm`,
    `F_fl = VВ·e/ds = ${rd(Vn/1e3,0)}kГ—${Ep}/${rd(ds,0)} = ${rd(Ffl/1e3)} kN per flange`,
    `fw,Rd = ${rd(fwRd_f,1)} N/mmВІ  вҶ’  F_fl,Rd = fw,RdГ—aГ—bf = ${rd(fwRd_f,1)}Г—${rd(Aw_f)}Г—${Bf}/1000 = ${rd(F_fl_Rd/1e3)} kN`,
  ],F_fl_Rd/1e3,Ffl/1e3,'kN'));

  // 10 вҖ” Beam web gross shear (local at connection zone)
  const VgRd_bw=bm.fy*Hp*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('10','Beam Web вҖ” Gross Section Shear (Local)','EC3-1-1 В§6.2.6 / P358 В§4.7 Check 10',[
    `Av = hp Г— tw = ${Hp}Г—${Tw} = ${Hp*Tw} mmВІ  (hp = d = full beam depth)`,
    `Vpl,Rd = ${bm.fy}Г—${Hp*Tw}/вҲҡ3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN'));

  // 11 вҖ” Beam web net shear [ОіM2 = 1.1]
  const Avnet_bw=Math.max(0,(Hp-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('11','Beam Web вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§4.7 Check 11',[
    `Anet = (${Hp}вҲ’${nb}Г—${d0})Г—${Tw} = ${Avnet_bw} mmВІ`,
    `Vnet,Rd = 0.9Г—${bm.fu}Г—${Avnet_bw}/(вҲҡ3Г—1.1) = ${rd(VnRd_bw)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN'));

  // 12 вҖ” Beam web block shear [ОіM2 = 1.1]
  const Ant_bw=Math.max(0,(E2-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('12','Beam Web вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§4.7 Check 12',[
    `Ant = (eвӮӮвҲ’dвӮҖ/2)Г—tw = ${rd(Ant_bw,0)} mmВІ   Anv = ${rd(Anv_bw,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2 + fyВ·Anv/(вҲҡ3В·ОіM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)} + ${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `ОіM2 = 1.1 for beam web fracture (EC3-1-1 UK NA)`,
  ],Veff_bw,fv(g.V),'kN'));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcDCleat(g){
  // Double Web Cleat вҖ” EC3-1-8 / ECCS Pub.126 (NOT P358 вҖ” web cleats not in P358)
  // Two angle cleats: outstanding legs bolted to column, web legs bolted to beam web.
  // Support bolt group: n bolts per cleat, each cleat carries V/2 with eccentricity e2s.
  // Web bolt group: 2n total bolts, concentric shear V.
  const b=BOLT[g.boltSize], cm=MAT[g.colGrade], bm=MAT[g.beamGrade], cl=MAT[g.cleatGrade];
  const Vn=fv(g.V)*1e3, nb=fi(g.n);
  const P1=fv(g.p1), E1=fv(g.e1), E2s=fv(g.e2s), E2w=fv(g.e2w);
  const Tc=fv(g.tc), Tw=fv(g.tw), Tfc=fv(g.tfc);
  const {d,d0,As}=b, fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)
  const hc = E1 + (nb-1)*P1 + E1;

  // Support bolt group вҖ” elastic Iy analysis (each cleat V/2, eccentricity e2s)
  let Iy=0;
  for(let i=0;i<nb;i++){const y=i*P1-(nb-1)*P1/2; Iy+=y*y;}
  const ym=(nb-1)*P1/2;
  const Vs=Vn/2, Ms=Vs*E2s, Fvd_s=Vs/nb;
  const Fhm_s=Iy>0?Ms*ym/Iy:0, Fr_s=Math.sqrt(Fvd_s**2+Fhm_s**2);

  const C=[];
  const FvRd=.6*fub*As/GM2;

  // 1 вҖ” Support bolt shear (elastic bolt group, per cleat)
  C.push(chk('1','Support Bolts вҖ” Shear Resistance (per cleat)','EC3-1-8 Table 3.4 / P358 В§8.3',[
    `Each cleat carries V/2 = ${rd(Vn/2e3)} kN with eccentricity eвӮӮ_s = ${E2s} mm`,
    `Fv,Rd = 0.6Г—800Г—${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    nb>1?`Iy = ${rd(Iy,0)} mmВІ  ymax = ${ym} mm  Ms = V/2 Г— eвӮӮ_s = ${rd(Ms/1e6)} kNВ·m`:`Single bolt`,
    `F_direct = ${rd(Fvd_s/1e3)} kNвҶ“   F_moment = ${rd(Fhm_s/1e3)} kNвҶ’`,
    `F_resultant = вҲҡ(${rd(Fvd_s/1e3)}ВІ+${rd(Fhm_s/1e3)}ВІ) = ${rd(Fr_s/1e3)} kN`,
  ],FvRd/1e3,Fr_s/1e3,'kN'));

  // 2 вҖ” Bearing on outstanding cleat leg (ОіM2 = 1.25 for bolt bearing)
  const k1s=Math.min(2.8*E2s/d0-1.7,2.5);
  const abs_=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbsRd=Math.max(0,k1s)*Math.max(0,abs_)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('2','Bearing вҖ” Outstanding Cleat Leg (support bolts)','EC3-1-8 Table 3.4 / P358 В§8.3',[
    `kвӮҒ = min(2.8Г—${E2s}/${d0}вҲ’1.7, 2.5) = ${rd(k1s)}`,
    `Оұb = ${rd(abs_,3)}   tc = ${Tc} mm   fu,cleat = ${cl.fu} MPa`,
    `Fb,Rd = ${rd(k1s)}Г—${rd(abs_,3)}Г—${cl.fu}Г—${d}Г—${Tc}/1.25 = ${rd(FbsRd)} kN`,
  ],FbsRd,Fr_s/1e3,'kN'));

  // 3 вҖ” Bearing on column flange
  const k1c=Math.min(2.8*E2s/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing вҖ” Column Flange','EC3-1-8 Table 3.4 / P358 В§8.3',[
    `kвӮҒ = ${rd(k1c)}   Оұb = ${rd(abc,3)}   tfc = ${Tfc} mm`,
    `Fb,Rd = ${rd(FbcRd)} kN`,
  ],FbcRd,Fr_s/1e3,'kN'));

  // 4 вҖ” Web bolt shear (2 cleats Г— n bolts, concentric)
  const FvRd_web_total=2*nb*FvRd;
  C.push(chk('4','Web Bolts вҖ” Total Shear Resistance (2 cleats)','EC3-1-8 Table 3.4 / P358 В§8.3',[
    `Web bolts concentric: 2 cleats Г— ${nb} bolts = ${2*nb} total`,
    `Fv,Rd,total = ${2*nb} Г— ${rd(FvRd/1e3)} = ${rd(FvRd_web_total/1e3)} kN`,
  ],FvRd_web_total/1e3,fv(g.V),'kN'));

  // 5 вҖ” Bearing on web cleat leg
  const Fvd_w=Vn/(2*nb);
  const k1w=Math.min(2.8*E2w/d0-1.7,2.5);
  const abw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbwcRd=Math.max(0,k1w)*Math.max(0,abw)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('5','Bearing вҖ” Web Cleat Leg (web bolts)','EC3-1-8 Table 3.4 / P358 В§8.3',[
    `Force per web bolt: V/(2n) = ${rd(Fvd_w/1e3)} kN`,
    `kвӮҒ = ${rd(k1w)}   Оұb = ${rd(abw,3)}   Fb,Rd = ${rd(FbwcRd)} kN`,
  ],FbwcRd,Fvd_w/1e3,'kN'));

  // 6 вҖ” Bearing on beam web
  const k1bw=Math.min(2.8*E2w/d0-1.7,2.5);
  const ab_bw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbbwRd=Math.max(0,k1bw)*Math.max(0,ab_bw)*bm.fu*d*Tw/GM2/1e3;
  C.push(chk('6','Bearing вҖ” Beam Web (web bolts)','EC3-1-8 Table 3.4 / P358 В§8.3',[
    `kвӮҒ = ${rd(k1bw)}   Оұb = ${rd(ab_bw,3)}   tw = ${Tw} mm`,
    `Fb,Rd = ${rd(FbbwRd)} kN   Applied = ${rd(Fvd_w/1e3)} kN`,
  ],FbbwRd,Fvd_w/1e3,'kN'));

  // 7 вҖ” Cleat gross section shear (per cleat, demand = V/2)
  const VgRd=cl.fy*hc*Tc/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('7','Cleat вҖ” Gross Section Shear (per cleat)','EC3-1-1 В§6.2.6 / P358 В§8.4',[
    `hc = eвӮҒ+(nвҲ’1)pвӮҒ+eвӮҒ = ${E1}+${(nb-1)*P1}+${E1} = ${hc} mm`,
    `Av = hcГ—tc = ${hc}Г—${Tc} = ${hc*Tc} mmВІ`,
    `Vpl,Rd = ${cl.fy}Г—${hc*Tc}/вҲҡ3 = ${rd(VgRd)} kN   Applied = V/2 = ${rd(fv(g.V)/2)} kN`,
  ],VgRd,fv(g.V)/2,'kN'));

  // 8 вҖ” Cleat net section shear [ОіM2 = 1.1 per EC3-1-1 UK NA]
  const Avnet=Math.max(0,(hc-nb*d0)*Tc);
  const VnRd=.9*cl.fu*Avnet/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('8','Cleat вҖ” Net Section Shear (per cleat)','EC3-1-1 В§6.2.6 / P358 В§8.4',[
    `Anet = (hcвҲ’nВ·dвӮҖ)Г—tc = (${hc}вҲ’${nb}Г—${d0})Г—${Tc} = ${Avnet} mmВІ`,
    `Vnet,Rd = 0.9Г—${cl.fu}Г—${Avnet}/(вҲҡ3Г—1.1) = ${rd(VnRd)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA (cleat cross-section fracture)`,
  ],VnRd,fv(g.V)/2,'kN'));

  // 9 вҖ” Cleat block shear (per cleat) [fu term: ОіM2 = 1.1]
  const Ant_c=Math.max(0,(E2s-d0/2)*Tc);
  const Anv_c=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tc);
  const Veff_c=(cl.fu*Ant_c/GM2s+cl.fy*Anv_c/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('9','Cleat вҖ” Block Shear (per cleat)','EC3-1-8 В§3.10.2 / P358 В§8.4',[
    `Ant = (eвӮӮ_sвҲ’dвӮҖ/2)Г—tc = (${E2s}вҲ’${d0/2})Г—${Tc} = ${rd(Ant_c,0)} mmВІ`,
    `Anv = (eвӮҒ+(nвҲ’1)pвӮҒвҲ’(nвҲ’0.5)dвӮҖ)Г—tc = ${rd(Anv_c,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2+fyВ·Anv/(вҲҡ3В·ОіM0)  (ОіM2 = 1.1)`,
    `       = ${rd(cl.fu*Ant_c/GM2s/1e3)}+${rd(cl.fy*Anv_c/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_c)} kN`,
  ],Veff_c,fv(g.V)/2,'kN'));

  // 10 вҖ” Outstanding leg bending (PLASTIC strip вҖ” P358 В§8.4)
  // P358 uses the plastic section modulus of a plate strip of width p1_eff:
  //   Wpl = tcВІ Г— p1_eff / 4   (plastic, not tcВІp/6 elastic)
  // The cantilever moment at the angle heel = Fh_crit Г— e2s
  const Fh_crit=Iy>0?Ms*ym/Iy:Vs/nb;
  const MEd_leg=Fh_crit*E2s;
  const p1_eff=nb>1?P1:2*E1;
  const Wpl_leg=Tc*Tc*p1_eff/4;           // PLASTIC strip modulus per P358 В§8.4
  const MRd_leg=cl.fy*Wpl_leg/GM0;
  C.push(chk('10','Outstanding Leg вҖ” Bending (Plastic Strip)','EC3-1-1 В§6.2.5 / P358 В§8.4',[
    `Horizontal force on critical bolt: Fh = MsВ·ymax/Iy = ${rd(Fhm_s/1e3)} kN`,
    `Cantilever arm = eвӮӮ_s = ${E2s} mm`,
    `MEd = Fh Г— eвӮӮ_s = ${rd(Fh_crit/1e3)}Г—${E2s}/1000 = ${rd(MEd_leg/1e6)} kNВ·m`,
    `Tributary width per bolt: pвӮҒ_eff = ${p1_eff} mm`,
    `P358 В§8.4 uses PLASTIC strip modulus: Wpl = tcВІГ—pвӮҒ_eff/4 = ${Tc}ВІГ—${p1_eff}/4 = ${rd(Wpl_leg,0)} mmВі`,
    `MRd = fyГ—Wpl/ОіM0 = ${cl.fy}Г—${rd(Wpl_leg,0)}/10вҒ¶ = ${rd(MRd_leg/1e6)} kNВ·m`,
  ],MRd_leg/1e6,MEd_leg/1e6,'kNВ·m'));

  // 11 вҖ” Beam web gross shear (local at connection zone, height = hc)
  const VgRd_bw=bm.fy*hc*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('11','Beam Web вҖ” Gross Section Shear (Local)','EC3-1-1 В§6.2.6 / P358 В§8.4',[
    `Local shear area: Av = hcГ—tw = ${hc}Г—${Tw} = ${hc*Tw} mmВІ`,
    `Vpl,Rd = ${bm.fy}Г—${hc*Tw}/вҲҡ3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN'));

  // 12 вҖ” Beam web net shear [ОіM2 = 1.1]
  const Avnet_bw=Math.max(0,(hc-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('12','Beam Web вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§8.4',[
    `Anet = (hcвҲ’nВ·dвӮҖ)Г—tw = (${hc}вҲ’${nb}Г—${d0})Г—${Tw} = ${Avnet_bw} mmВІ`,
    `Vnet,Rd = 0.9Г—${bm.fu}Г—${Avnet_bw}/(вҲҡ3Г—1.1) = ${rd(VnRd_bw)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN'));

  // 13 вҖ” Beam web block shear [ОіM2 = 1.1]
  const Ant_bw=Math.max(0,(E2w-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('13','Beam Web вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§8.4',[
    `Ant = (eвӮӮwвҲ’dвӮҖ/2)Г—tw = ${rd(Ant_bw,0)} mmВІ   Anv = ${rd(Anv_bw,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2+fyВ·Anv/(вҲҡ3В·ОіM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)}+${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA`,
  ],Veff_bw,fv(g.V),'kN'));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcSCleat(g){
  // Single Web Cleat вҖ” EC3-1-8 / ECCS Pub.126 (NOT P358 вҖ” web cleats not in P358)
  // One angle cleat: outstanding leg bolted to column, web leg bolted to beam web.
  // Unlike double cleat, full shear V (not V/2) on a single cleat.
  // Torsion on beam web is a concern вҖ” this check covers in-plane behaviour only.
  const b=BOLT[g.boltSize], cm=MAT[g.colGrade], bm=MAT[g.beamGrade], cl=MAT[g.cleatGrade];
  const Vn=fv(g.V)*1e3, nb=fi(g.n);
  const P1=fv(g.p1), E1=fv(g.e1), E2s=fv(g.e2s), E2w=fv(g.e2w);
  const Tc=fv(g.tc), Tw=fv(g.tw), Tfc=fv(g.tfc);
  const {d,d0,As}=b, fub=800;
  const GM2s=1.1;
  const hc=E1+(nb-1)*P1+E1;

  // Support bolt group: single cleat carries FULL V (not V/2) with eccentricity e2s
  let Iy=0;
  for(let i=0;i<nb;i++){const y=i*P1-(nb-1)*P1/2; Iy+=y*y;}
  const ym=(nb-1)*P1/2;
  const Vs=Vn, Ms=Vs*E2s, Fvd_s=Vs/nb;
  const Fhm_s=Iy>0?Ms*ym/Iy:0, Fr_s=Math.sqrt(Fvd_s**2+Fhm_s**2);
  const C=[];
  const FvRd=.6*fub*As/GM2;

  C.push(chk('1','Support Bolts вҖ” Shear Resistance (Single Cleat, Full V)','EC3-1-8 Table 3.4 / ECCS Pub.126',[
    `Single cleat: full V = ${rd(Vn/1e3)} kN with eccentricity eвӮӮ_s = ${E2s} mm`,
    `(Double cleat would carry V/2; single cleat carries full V вҖ” more critical)`,
    `Fv,Rd = 0.6Г—800Г—${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `Iy = ${rd(Iy,0)} mmВІ   ymax = ${ym} mm   Ms = VГ—eвӮӮ_s = ${rd(Ms/1e6)} kNВ·m`,
    `F_direct = ${rd(Fvd_s/1e3)} kNвҶ“   F_moment = ${rd(Fhm_s/1e3)} kNвҶ’`,
    `F_resultant = вҲҡ(${rd(Fvd_s/1e3)}ВІ+${rd(Fhm_s/1e3)}ВІ) = ${rd(Fr_s/1e3)} kN`,
  ],FvRd/1e3,Fr_s/1e3,'kN'));

  const k1s=Math.min(2.8*E2s/d0-1.7,2.5);
  const abs_=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbsRd=Math.max(0,k1s)*Math.max(0,abs_)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('2','Bearing вҖ” Outstanding Cleat Leg','EC3-1-8 Table 3.4',[
    `kвӮҒ = ${rd(k1s)}  Оұb = ${rd(abs_,3)}  Fb,Rd = ${rd(FbsRd)} kN`,
  ],FbsRd,Fr_s/1e3,'kN'));

  const k1c=Math.min(2.8*E2s/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing вҖ” Column Flange','EC3-1-8 Table 3.4',[
    `kвӮҒ = ${rd(k1c)}  Оұb = ${rd(abc,3)}  Fb,Rd = ${rd(FbcRd)} kN`,
  ],FbcRd,Fr_s/1e3,'kN'));

  // Web bolts: single cleat, n bolts carry V concentrically
  const FvRd_web_total=nb*FvRd;
  C.push(chk('4','Web Bolts вҖ” Shear Resistance (n bolts, concentric)','EC3-1-8 Table 3.4',[
    `Single cleat: ${nb} web bolts carry V = ${rd(Vn/1e3)} kN concentrically`,
    `Total Fv,Rd = ${nb}Г—${rd(FvRd/1e3)} = ${rd(FvRd_web_total/1e3)} kN`,
  ],FvRd_web_total/1e3,fv(g.V),'kN'));

  const Fvd_w=Vn/nb;
  const k1w=Math.min(2.8*E2w/d0-1.7,2.5);
  const abw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbwcRd=Math.max(0,k1w)*Math.max(0,abw)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('5','Bearing вҖ” Web Cleat Leg','EC3-1-8 Table 3.4',[
    `V/n = ${rd(Fvd_w/1e3)} kN   Fb,Rd = ${rd(FbwcRd)} kN`,
  ],FbwcRd,Fvd_w/1e3,'kN'));

  const k1bw=Math.min(2.8*E2w/d0-1.7,2.5);
  const ab_bw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbbwRd=Math.max(0,k1bw)*Math.max(0,ab_bw)*bm.fu*d*Tw/GM2/1e3;
  C.push(chk('6','Bearing вҖ” Beam Web','EC3-1-8 Table 3.4',[
    `kвӮҒ = ${rd(k1bw)}  Оұb = ${rd(ab_bw,3)}  Fb,Rd = ${rd(FbbwRd)} kN`,
  ],FbbwRd,Fvd_w/1e3,'kN'));

  // Cleat gross shear вҖ” carries full V (single cleat)
  const VgRd=cl.fy*hc*Tc/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('7','Cleat вҖ” Gross Section Shear (full V)','EC3-1-1 В§6.2.6',[
    `hc = ${hc} mm  Av = ${hc*Tc} mmВІ  Vpl,Rd = ${rd(VgRd)} kN  Applied = ${rd(fv(g.V))} kN`,
  ],VgRd,fv(g.V),'kN'));

  const Avnet=Math.max(0,(hc-nb*d0)*Tc);
  const VnRd=.9*cl.fu*Avnet/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('8','Cleat вҖ” Net Section Shear','EC3-1-1 В§6.2.6',[
    `Anet = (${hc}вҲ’${nb}Г—${d0})Г—${Tc} = ${Avnet} mmВІ  Vnet,Rd = ${rd(VnRd)} kN  (ОіM2=1.1)`,
  ],VnRd,fv(g.V),'kN'));

  const Ant_c=Math.max(0,(E2s-d0/2)*Tc);
  const Anv_c=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tc);
  const Veff_c=(cl.fu*Ant_c/GM2s+cl.fy*Anv_c/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('9','Cleat вҖ” Block Shear','EC3-1-8 В§3.10.2',[
    `Ant = ${rd(Ant_c,0)} mmВІ  Anv = ${rd(Anv_c,0)} mmВІ  Veff,Rd = ${rd(Veff_c)} kN  (ОіM2=1.1)`,
  ],Veff_c,fv(g.V),'kN'));

  // Outstanding leg bending вҖ” plastic strip (full V on one cleat)
  const Fh_crit=Iy>0?Ms*ym/Iy:Vs/nb;
  const MEd_leg=Fh_crit*E2s;
  const p1_eff=nb>1?P1:2*E1;
  const Wpl_leg=Tc*Tc*p1_eff/4;
  const MRd_leg=cl.fy*Wpl_leg/GM0;
  C.push(chk('10','Outstanding Leg вҖ” Bending (Plastic Strip)','EC3-1-1 В§6.2.5 / ECCS Pub.126',[
    `Fh = ${rd(Fhm_s/1e3)} kN  e = ${E2s} mm  MEd = ${rd(MEd_leg/1e6)} kNВ·m`,
    `Wpl = tcВІГ—p/4 = ${Tc}ВІГ—${p1_eff}/4 = ${rd(Wpl_leg,0)} mmВі  MRd = ${rd(MRd_leg/1e6)} kNВ·m`,
  ],MRd_leg/1e6,MEd_leg/1e6,'kNВ·m'));

  // Beam web checks
  const VgRd_bw=bm.fy*hc*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('11','Beam Web вҖ” Gross Shear (Local)','EC3-1-1 В§6.2.6',[
    `Av = hcГ—tw = ${hc}Г—${Tw} = ${hc*Tw} mmВІ  Vpl,Rd = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN'));

  const Avnet_bw=Math.max(0,(hc-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('12','Beam Web вҖ” Net Shear','EC3-1-1 В§6.2.6',[
    `Anet = ${Avnet_bw} mmВІ  Vnet,Rd = ${rd(VnRd_bw)} kN  (ОіM2=1.1)`,
  ],VnRd_bw,fv(g.V),'kN'));

  const Ant_bw=Math.max(0,(E2w-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('13','Beam Web вҖ” Block Shear','EC3-1-8 В§3.10.2',[
    `Ant = ${rd(Ant_bw,0)} mmВІ  Anv = ${rd(Anv_bw,0)} mmВІ  Veff,Rd = ${rd(Veff_bw)} kN  (ОіM2=1.1)`,
  ],Veff_bw,fv(g.V),'kN'));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcSplice(g){
  // Column splice вҖ” bearing type (P358 В§9)
  // Axial load transferred by direct bearing between prepared column end faces.
  // Cover plates resist: (a) shear V_Ed, (b) nominal moment V_Ed Г— L_cp/2 (P358 В§9.3)
  const b=BOLT[g.boltSize], cm=MAT[g.colGrade], pm=MAT[g.platGrade];
  const Nn=fv(g.N)*1e3, Vn=fv(g.V)*1e3;
  const nw=fi(g.nw), nf=fi(g.nf);
  const P1w=fv(g.p1w), E1w=fv(g.e1w), E2w=fv(g.e2w);
  const P1f=fv(g.p1f), E1f=fv(g.e1f), E2f=fv(g.e2f);
  const Bf=fv(g.bf), Tf=fv(g.tf), Tw=fv(g.tw), D=fv(g.d);
  const Tfp=fv(g.tfp), Bfp=fv(g.bfp), Twp=fv(g.twp), Lcp=fv(g.Lcp);
  const {d,d0,As}=b, fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)

  const dw=D-2*Tf;                    // web clear depth
  const hwp=2*E1w+(nw-1)*P1w;         // web plate height
  const Vwp=Vn/2;                     // shear per web plate

  // P358 В§9.3: nominal moment lever arm = D - tf (flange plate CL to CL)
  const lever=D-Tf;
  const M_nom=Vn*Lcp/2;               // NВ·mm
  const Ffl=M_nom/lever;              // axial force in each flange plate pair (N)

  const C=[];

  // 1 вҖ” Web plate bolt shear
  const FvRd_wb=.6*fub*As/GM2;
  const FvRd_web_total=2*nw*FvRd_wb;
  C.push(chk('1','Web Plate Bolts вҖ” Shear Resistance','EC3-1-8 Table 3.4 / P358 В§9.4',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mmВІ  Fv,Rd=${rd(FvRd_wb/1e3)} kN/bolt`,
    `2 web plates Г— ${nw} bolts = ${2*nw} bolts total, carry V_Ed = ${rd(Vn/1e3)} kN`,
    `Fv,Rd,total = ${2*nw}Г—${rd(FvRd_wb/1e3)} = ${rd(FvRd_web_total/1e3)} kN`,
  ],FvRd_web_total/1e3,fv(g.V),'kN'));

  // 2 вҖ” Bearing on web cover plate
  const Fvd_w=Vn/(2*nw);
  const k1_wp=Math.min(2.8*E2w/d0-1.7,2.5);
  const ab_wp=nw>1?Math.min(E1w/(3*d0),P1w/(3*d0)-.25,fub/pm.fu,1):Math.min(E1w/(3*d0),fub/pm.fu,1);
  const FbwpRd=Math.max(0,k1_wp)*Math.max(0,ab_wp)*pm.fu*d*Twp/GM2/1e3;
  C.push(chk('2','Bearing вҖ” Web Cover Plate','EC3-1-8 Table 3.4 / P358 В§9.4',[
    `kвӮҒ=${rd(k1_wp)}  Оұb=${rd(ab_wp,3)}  twp=${Twp} mm`,
    `Fb,Rd=${rd(FbwpRd)} kN   Applied per bolt = V/(2nw) = ${rd(Fvd_w/1e3)} kN`,
  ],FbwpRd,Fvd_w/1e3,'kN'));

  // 3 вҖ” Bearing on column web
  const ab_cw=nw>1?Math.min(E1w/(3*d0),P1w/(3*d0)-.25,fub/cm.fu,1):Math.min(E1w/(3*d0),fub/cm.fu,1);
  const FbcwRd=Math.max(0,k1_wp)*Math.max(0,ab_cw)*cm.fu*d*Tw/GM2/1e3;
  C.push(chk('3','Bearing вҖ” Column Web','EC3-1-8 Table 3.4 / P358 В§9.4',[
    `kвӮҒ=${rd(k1_wp)}  Оұb=${rd(ab_cw,3)}  tw=${Tw} mm`,
    `Fb,Rd=${rd(FbcwRd)} kN   Applied per bolt = ${rd(Fvd_w/1e3)} kN`,
  ],FbcwRd,Fvd_w/1e3,'kN'));

  // 4 вҖ” Web plate gross shear
  const Ag_wp=hwp*Twp;
  const Vg_wpRd=pm.fy*Ag_wp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','Web Plate вҖ” Gross Section Shear','EC3-1-1 В§6.2.6 / P358 В§9.4',[
    `hwp = 2eвӮҒ+(nвҲ’1)pвӮҒ = ${hwp} mm`,
    `Av = hwpГ—twp = ${Ag_wp} mmВІ`,
    `Vpl,Rd = ${pm.fy}Г—${Ag_wp}/вҲҡ3 = ${rd(Vg_wpRd)} kN   Applied per plate = ${rd(Vwp/1e3)} kN`,
  ],Vg_wpRd,Vwp/1e3,'kN'));

  // 5 вҖ” Web plate net shear [ОіM2 = 1.1 per EC3-1-1 UK NA]
  const An_wp=Math.max(0,(hwp-nw*d0)*Twp);
  const Vn_wpRd=.9*pm.fu*An_wp/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','Web Plate вҖ” Net Section Shear','EC3-1-1 В§6.2.6 / P358 В§9.4',[
    `Anet = (${hwp}вҲ’${nw}Г—${d0})Г—${Twp} = ${An_wp} mmВІ`,
    `Vnet,Rd = 0.9Г—${pm.fu}Г—${An_wp}/(вҲҡ3Г—1.1) = ${rd(Vn_wpRd)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],Vn_wpRd,Vwp/1e3,'kN'));

  // 6 вҖ” Flange plate bolts (carry nominal moment force)
  // P358 В§9.3: M_nom = V_Ed Г— L_cp/2; lever arm = D - tf (flange CL to flange CL)
  const FvRd_fb=.6*fub*As/GM2;
  const FvRd_fl_total=2*nf*FvRd_fb;
  C.push(chk('6','Flange Plate Bolts вҖ” Axial Force (Nominal Moment)','EC3-1-8 Table 3.4 / P358 В§9.3',[
    `M_nom = V_Ed Г— L_cp/2 = ${rd(Vn/1e3)}Г—${Lcp}/2 = ${rd(M_nom/1e6)} kNВ·m`,
    `Lever arm = D вҲ’ tf = ${D}вҲ’${Tf} = ${lever} mm  (flange plate CL to CL, per P358 В§9.3)`,
    `F_fl = M_nom / lever = ${rd(M_nom/1e6)}Г—10вҒ¶/${lever} = ${rd(Ffl/1e3)} kN (per flange pair)`,
    `2 flange plates Г— ${nf} bolts per plate = ${2*nf} bolts per flange`,
    `Fv,Rd,total = ${2*nf}Г—${rd(FvRd_fb/1e3)} = ${rd(FvRd_fl_total/1e3)} kN`,
  ],FvRd_fl_total/1e3,Ffl/1e3,'kN'));

  // 7 вҖ” Bearing on flange cover plate
  const Fvd_f=Ffl/(2*nf);
  const k1_fp=Math.min(2.8*E2f/d0-1.7,2.5);
  const ab_fp=nf>1?Math.min(E1f/(3*d0),P1f/(3*d0)-.25,fub/pm.fu,1):Math.min(E1f/(3*d0),fub/pm.fu,1);
  const FbfpRd=Math.max(0,k1_fp)*Math.max(0,ab_fp)*pm.fu*d*Tfp/GM2/1e3;
  C.push(chk('7','Bearing вҖ” Flange Cover Plate','EC3-1-8 Table 3.4 / P358 В§9.4',[
    `kвӮҒ=${rd(k1_fp)}  Оұb=${rd(ab_fp,3)}  tfp=${Tfp} mm`,
    `Fb,Rd=${rd(FbfpRd)} kN   Applied per bolt = F_fl/(2nf) = ${rd(Fvd_f/1e3)} kN`,
  ],FbfpRd,Fvd_f/1e3,'kN'));

  // 8 вҖ” Bearing on column flange
  const ab_cf=nf>1?Math.min(E1f/(3*d0),P1f/(3*d0)-.25,fub/cm.fu,1):Math.min(E1f/(3*d0),fub/cm.fu,1);
  const FbcfRd=Math.max(0,k1_fp)*Math.max(0,ab_cf)*cm.fu*d*Tf/GM2/1e3;
  C.push(chk('8','Bearing вҖ” Column Flange','EC3-1-8 Table 3.4 / P358 В§9.4',[
    `kвӮҒ=${rd(k1_fp)}  Оұb=${rd(ab_cf,3)}  tf=${Tf} mm`,
    `Fb,Rd=${rd(FbcfRd)} kN   Applied per bolt = ${rd(Fvd_f/1e3)} kN`,
  ],FbcfRd,Fvd_f/1e3,'kN'));

  // 9 вҖ” Flange plate gross tension
  const Ag_fp=2*Bfp*Tfp;
  const NplRd_fp=pm.fy*Ag_fp/GM0/1e3;
  C.push(chk('9','Flange Plates вҖ” Gross Tension (pair)','EC3-1-1 В§6.2.3 / P358 В§9.4',[
    `2 plates per flange (one each side): Ag = 2Г—${Bfp}Г—${Tfp} = ${Ag_fp} mmВІ`,
    `Npl,Rd = fyГ—Ag/ОіM0 = ${pm.fy}Г—${Ag_fp}/1.0/1000 = ${rd(NplRd_fp)} kN`,
    `Applied: F_fl = ${rd(Ffl/1e3)} kN`,
  ],NplRd_fp,Ffl/1e3,'kN'));

  // 10 вҖ” Flange plate NET tension [ОіM2 = 1.1, deduct 1 bolt hole per plate]
  const An_fp=Math.max(0,2*(Bfp-d0)*Tfp);
  const NnetRd_fp=.9*pm.fu*An_fp/GM2s/1e3;
  C.push(chk('10','Flange Plates вҖ” Net Section Tension (pair)','EC3-1-1 В§6.2.3 / P358 В§9.4',[
    `Anet = 2Г—(bfpвҲ’dвӮҖ)Г—tfp = 2Г—(${Bfp}вҲ’${d0})Г—${Tfp} = ${An_fp} mmВІ  (1 bolt hole per plate)`,
    `Nnet,Rd = 0.9Г—fuГ—Anet/ОіM2 = 0.9Г—${pm.fu}Г—${An_fp}/1.1/1000 = ${rd(NnetRd_fp)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA`,
  ],NnetRd_fp,Ffl/1e3,'kN'));

  // 11 вҖ” Column end bearing (direct axial compression)
  // P358 В§9.2: Пғ_bearing вүӨ fy (yield stress of column material)
  // Bearing area = full column cross-sectional area (web + flanges)
  const A_col=2*Bf*Tf+(D-2*Tf)*Tw;
  const sigma_b=Nn/A_col;
  C.push(chk('11','Column End Bearing вҖ” Direct Axial Compression','P358 В§9.2',[
    `Full column cross-section: A = 2Г—bfГ—tf + (DвҲ’2tf)Г—tw`,
    `  = 2Г—${Bf}Г—${Tf} + (${D}вҲ’${2*Tf})Г—${Tw} = ${A_col} mmВІ`,
    `Пғ_bearing = N_Ed/A = ${rd(Nn/1e3)}Г—1000/${A_col} = ${rd(sigma_b,1)} N/mmВІ`,
    `Limit per P358 В§9.2: fy = ${cm.fy} N/mmВІ  (bearing on machined faces)`,
    `Note: bearing splice requires column ends to be machined flat and square.`,
  ],cm.fy,sigma_b,'N/mmВІ'));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcBase(g){
  // Column base plate вҖ” nominally pinned (P358 В§10 / EC3-1-8 В§6.2.5)
  // Checks: bearing on grout, base plate bending,
  //         HD bolt tension (uplift from moment), HD bolt shear,
  //         weld of column to base plate.
  const Nn  = fv(g.N)*1e3;           // axial (N), +ve compression
  const Vn  = fv(g.V)*1e3;           // shear (N)
  const Mn  = fv(g.M)*1e6;           // moment (NВ·mm)
  const nhd = fi(g.nhd);
  const dhd = fv(g.dhd);
  const fub = g.hdgrade==='4.6' ? 400 : 800;
  const Ahd = fv(g.As);              // tensile stress area of HD bolt
  const ex  = fv(g.ex);              // HD bolt c/c in x (parallel to moment plane)
  const ey  = fv(g.ey);
  const tp  = fv(g.tp);
  const Bp  = fv(g.Bp);
  const Dp  = fv(g.Dp);
  const bf  = fv(g.bf);
  const dc  = fv(g.dc);
  const aw  = fv(g.aw);
  const fck = fv(g.fck);
  const pm  = MAT[g.platGrade];
  const cm  = MAT[g.colGrade];

  // в”Җв”Җ Bearing strength of grout/concrete (EC2 В§6.7 / EC3-1-8 В§6.2.5) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Design bearing strength: fj = ОІ_j Г— fcd  where fcd = fck/1.5
  // For a spread ratio вүӨ 3: use simplified fj = 0.67 Г— fck/1.5
  const fcd  = fck / 1.5;
  const beta = 0.67;
  const fj   = beta * fcd;              // N/mmВІ вҖ” grout bearing strength

  // Effective bearing area (base plate footprint)
  const A_bp = Bp * Dp;                // mmВІ

  // Maximum bearing resistance
  const N_Rd_bearing = fj * A_bp / 1e3; // kN

  // в”Җв”Җ Cantilever dimension c (base plate overhang beyond column face) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const c_x = (Bp - bf) / 2;           // overhang in x (mm)
  const c_y = (Dp - dc) / 2;           // overhang in y (mm)
  const c   = Math.max(c_x, c_y);      // governing cantilever (mm)

  // в”Җв”Җ Required plate thickness from bending в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // P358 В§10.3: tp,req = c Г— вҲҡ(3 Г— fj / fy)
  // where fj is bearing pressure under the plate (actual = N / A_bp)
  const sigma_act = Nn / A_bp;          // actual bearing pressure (N/mmВІ)
  const tp_req = c * Math.sqrt(3 * Math.max(sigma_act, 0) / pm.fy);
  const C = [];

  // в”Җв”Җ 1. Base plate bearing on grout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  C.push(chk('1','Base Plate вҖ” Bearing on Grout/Concrete','EC2 В§6.7 / EC3-1-8 В§6.2.5 / P358 В§10.3',[
    `Plate area: A_bp = B_p Г— D_p = ${Bp} Г— ${Dp} = ${A_bp} mmВІ`,
    `Concrete fck = ${fck} MPa  вҶ’  fcd = fck/1.5 = ${rd(fcd,1)} MPa`,
    `Design bearing strength: fj = ОІ_j Г— fcd = 0.67 Г— ${rd(fcd,1)} = ${rd(fj,1)} N/mmВІ`,
    `Bearing resistance: N_Rd = fj Г— A_bp = ${rd(fj,1)} Г— ${A_bp} / 1000 = ${rd(N_Rd_bearing)} kN`,
    `Applied N_Ed = ${rd(Nn/1e3)} kN`,
  ], N_Rd_bearing, Nn/1e3, 'kN'));

  // в”Җв”Җ 2. Base plate bending в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  C.push(chk('2','Base Plate вҖ” Bending Resistance','EC3-1-1 В§6.2.5 / P358 В§10.3',[
    `Bearing pressure: Пғ_act = N_Ed / A_bp = ${rd(Nn/1e3)} Г— 1000 / ${A_bp} = ${rd(sigma_act,2)} N/mmВІ`,
    `Cantilever c = max((B_pвҲ’b_f)/2, (D_pвҲ’d_c)/2) = max(${rd(c_x,1)}, ${rd(c_y,1)}) = ${rd(c,1)} mm`,
    `Required t_p,req = c Г— вҲҡ(3Пғ/fy) = ${rd(c,1)} Г— вҲҡ(3 Г— ${rd(sigma_act,2)} / ${pm.fy}) = ${rd(tp_req,1)} mm`,
    `Provided t_p = ${tp} mm  ${tp >= tp_req ? 'вң“  sufficient' : 'вң—  insufficient вҖ” increase plate thickness'}`,
  ], tp, tp_req, 'mm'));

  // в”Җв”Җ 3. HD bolt tension (from moment + uplift) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Tension in HD bolts arises from applied moment and any net uplift.
  // Simple model: T per bolt = (M_Ed / lever_arm вҲ’ N_Ed/n_hd) / n_tension
  //   lever_arm вүҲ distance between HD bolt rows = e_x (bolt c/c in bending direction)
  //   n_tension = n_hd / 2 (half the bolts in tension for moment case)
  const lever = ex;                         // tension bolt group lever arm (mm)
  const T_moment = Mn / lever;              // total tension from moment (N)
  const T_axial  = -Nn / nhd;              // uplift per bolt from axial (вҲ’ve = compression вҶ’ 0)
  const T_bolt   = Math.max(0, T_moment/nhd*2 + Math.max(0, T_axial)); // per bolt (N)
  const FtRd_hd  = 0.9 * fub * Ahd / GM2 / 1e3; // kN вҖ” EC3-1-8 Table 3.4
  // If no moment and net compression, tension = 0 вҶ’ check is trivially satisfied
  const T_dem = T_bolt / 1e3;              // kN
  C.push(chk('3','Holding-Down Bolts вҖ” Tension (Moment + Uplift)','EC3-1-8 Table 3.4 / P358 В§10.4',[
    `Lever arm вүҲ e_x = ${ex} mm   n_hd = ${nhd} bolts`,
    `T_moment = M_Ed / e_x = ${rd(Mn/1e6)} Г— 10вҒ¶ / ${ex} = ${rd(T_moment/1e3)} kN total`,
    `T_axial  = -N_Ed / n_hd = ${rd(T_axial/1e3)} kN/bolt  (вҲ’ve = compression, clamping)`,
    `T per bolt (tension side) = ${rd(T_dem)} kN`,
    `Ft,Rd = 0.9 Г— fub Г— As / ОіM2 = 0.9 Г— ${fub} Г— ${Ahd} / 1.25 = ${rd(FtRd_hd)} kN`,
    T_dem <= 0 ? `Net compression вҖ” no tension in HD bolts. Check satisfied by inspection.` : ``,
  ].filter(Boolean), Math.max(FtRd_hd, 0.001), Math.max(T_dem, 0), 'kN'));

  // в”Җв”Җ 4. HD bolt shear в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // All bolts carry shear (friction + bearing); use bearing model per EC3-1-8
  // Shear capacity: Fv,Rd = 0.6 Г— fub Г— As / ОіM2 (threads in shear plane)
  const FvRd_hd  = 0.6 * fub * Ahd / GM2 / 1e3;   // per bolt (kN)
  const FvRd_tot = nhd * FvRd_hd;                   // total (kN)
  // Combined tension-shear interaction (EC3-1-8 Table 3.4):
  //   Fv,Ed/(Fv,Rd) + Ft,Ed/(1.4Г—Ft,Rd) вүӨ 1.0
  const IV  = fv(g.V) / FvRd_tot;
  const IT  = Math.max(T_dem, 0) / (1.4 * FtRd_hd);
  const I_combined = IV + IT;
  C.push(chk('4','Holding-Down Bolts вҖ” Shear (+ Tension Interaction)','EC3-1-8 Table 3.4 / P358 В§10.4',[
    `Fv,Rd per bolt = 0.6 Г— ${fub} Г— ${Ahd} / 1.25 = ${rd(FvRd_hd)} kN`,
    `Total Fv,Rd = ${nhd} Г— ${rd(FvRd_hd)} = ${rd(FvRd_tot)} kN`,
    `Shear utilisation: V_Ed / Fv,Rd,tot = ${rd(fv(g.V))} / ${rd(FvRd_tot)} = ${rd(IV*100,1)}%`,
    `Combined interaction: Fv/Fv,Rd + Ft/(1.4Г—Ft,Rd) = ${rd(IV,3)} + ${rd(IT,3)} = ${rd(I_combined,3)}`,
  ], 1.0, I_combined, 'вҖ”'));

  // в”Җв”Җ 5. Weld of column to base plate в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Full perimeter fillet weld (all round). Resists N_Ed (axial) and V_Ed (shear).
  // Capacity uses the WEAKER of plate material and column material (EC3-1-8 В§4.5.3).
  const Aw_throat = 0.707 * aw;
  const L_weld    = 2 * (bf + dc);             // approx. weld perimeter for I-section
  const A_weld    = Aw_throat * L_weld;
  const fwRd_plate = pm.fu / (Math.sqrt(3) * pm.bw * GM2);
  const fwRd_col   = cm.fu / (Math.sqrt(3) * cm.bw * GM2);
  const fwRd       = Math.min(fwRd_plate, fwRd_col); // weaker governs
  const sigma_weld = Nn / A_weld;
  const tau_weld   = Vn / A_weld;
  const f_weld_res = Math.sqrt(sigma_weld**2 + tau_weld**2);
  C.push(chk('5','Column-to-Base-Plate Fillet Weld','EC3-1-8 В§4.5.3 / P358 В§10.5',[
    `Weld leg = ${aw} mm  throat = ${rd(Aw_throat)} mm`,
    `Perimeter: L = 2(bf+dc) = 2(${bf}+${dc}) = ${L_weld} mm`,
    `Total throat area: A_w = ${rd(Aw_throat)} Г— ${L_weld} = ${rd(A_weld,0)} mmВІ`,
    `fw,Rd (plate) = ${pm.fu}/(вҲҡ3Г—${pm.bw}Г—1.25) = ${rd(fwRd_plate,1)} N/mmВІ`,
    `fw,Rd (column) = ${cm.fu}/(вҲҡ3Г—${cm.bw}Г—1.25) = ${rd(fwRd_col,1)} N/mmВІ`,
    `fw,Rd (governs) = ${rd(fwRd,1)} N/mmВІ  (weaker of plate and column)`,
    `Пғ (axial) = N/A_w = ${rd(sigma_weld,1)} N/mmВІ`,
    `П„ (shear) = V/A_w = ${rd(tau_weld,1)} N/mmВІ`,
    `f_result = вҲҡ(ПғВІ+П„ВІ) = ${rd(f_weld_res,1)} N/mmВІ`,
  ], fwRd, f_weld_res, 'N/mmВІ'));

  return{checks:C, allPass:C.every(c=>c.pass), maxR:Math.max(...C.map(c=>c.r))};
}

function calcBrace(g){
  // Bracing connection вҖ” gusset plate, bolted brace (P358 В§11 / EC3-1-8)
  // Bracing member (flat bar or angle) bolted through gusset plate.
  // Gusset welded to supporting frame. Bolt group carries N_Ed concentrically.
  const b   = BOLT[g.boltSize];
  const gm  = MAT[g.gussGrade];
  const bm  = MAT[g.braceGrade];
  const fm  = MAT[g.frameGrade];
  const Nn  = fv(g.N)*1e3 * fv(g.sign);
  const Na  = Math.abs(Nn);
  const nb  = fi(g.n);
  const P1  = fv(g.p1), E1=fv(g.e1), E2g=fv(g.e2g), E2b=fv(g.e2b);
  const Tg  = fv(g.tg), Hg=fv(g.hg), Tb=fv(g.tb), Wb=fv(g.wb);
  const Ecc = fv(g.e);
  const Aw  = 0.707*fv(g.aw);
  const {d,d0,As} = b, fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)

  // Whitmore effective width вҖ” P358 В§11.4
  // Stress spreads at 30В° from first to last bolt. Width = 2Г—L_boltГ—tan30В° + w_brace.
  // Physical limit: can't exceed actual gusset height hg.
  const L_bolt = Math.max(0, (nb-1)*P1);
  const W_whit = 2 * L_bolt * Math.tan(30*Math.PI/180) + Wb;
  const W_eff  = Math.min(W_whit, Hg);   // governs: Whitmore or physical gusset width

  const C = [];

  // 1 вҖ” Bolt group axial shear (concentric)
  const FvRd     = 0.6*fub*As/GM2;
  const FvRd_tot = nb * FvRd;
  C.push(chk('1','Bolt Group вҖ” Axial Shear (Brace to Gusset)','EC3-1-8 Table 3.4 / P358 В§11.3',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mmВІ  fub=${fub} MPa`,
    `Fv,Rd = 0.6Г—${fub}Г—${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `Concentric axial: ${nb} bolts  Fv,Rd,total = ${nb}Г—${rd(FvRd/1e3)} = ${rd(FvRd_tot/1e3)} kN`,
  ],FvRd_tot/1e3,Na/1e3,'kN'));

  // 2 вҖ” Bearing on gusset plate
  const k1g  = Math.min(2.8*E2g/d0-1.7,2.5);
  const abg  = nb>1?Math.min(E1/(3*d0),P1/(3*d0)-0.25,fub/gm.fu,1):Math.min(E1/(3*d0),fub/gm.fu,1);
  const FbgRd = Math.max(0,k1g)*Math.max(0,abg)*gm.fu*d*Tg/GM2/1e3;
  C.push(chk('2','Bearing Resistance вҖ” Gusset Plate','EC3-1-8 Table 3.4 / P358 В§11.3',[
    `kвӮҒ = ${rd(k1g)}  Оұb = ${rd(abg,3)}  tg = ${Tg} mm`,
    `Fb,Rd = ${rd(FbgRd)} kN   Applied per bolt = N/n = ${rd(Na/1e3/nb)} kN`,
  ],FbgRd,Na/1e3/nb,'kN'));

  // 3 вҖ” Bearing on brace member
  const k1b  = Math.min(2.8*E2b/d0-1.7,2.5);
  const abb  = nb>1?Math.min(E1/(3*d0),P1/(3*d0)-0.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbbRd = Math.max(0,k1b)*Math.max(0,abb)*bm.fu*d*Tb/GM2/1e3;
  C.push(chk('3','Bearing Resistance вҖ” Brace Member','EC3-1-8 Table 3.4 / P358 В§11.3',[
    `kвӮҒ = ${rd(k1b)}  Оұb = ${rd(abb,3)}  tb = ${Tb} mm`,
    `Fb,Rd = ${rd(FbbRd)} kN   Applied per bolt = ${rd(Na/1e3/nb)} kN`,
  ],FbbRd,Na/1e3/nb,'kN'));

  // 4 вҖ” Gusset plate gross tension вҖ” Whitmore section (P358 В§11.4)
  // Effective width = min(Whitmore width, physical gusset height hg)
  const Ag_eff  = W_eff * Tg;
  const NplRd_g = gm.fy * Ag_eff / GM0 / 1e3;
  C.push(chk('4','Gusset Plate вҖ” Gross Tension (Whitmore Section)','EC3-1-1 В§6.2.3 / P358 В§11.4',[
    `Whitmore width: W = 2Г—(nвҲ’1)pвӮҒГ—tan30В° + wb = 2Г—${L_bolt}Г—tan30В° + ${Wb} = ${rd(W_whit,1)} mm`,
    `Physical gusset height: hg = ${Hg} mm`,
    `Effective width: W_eff = min(${rd(W_whit,1)}, ${Hg}) = ${rd(W_eff,1)} mm  ${W_whit>Hg?'(gusset governs)':'(Whitmore governs)'}`,
    `Ag = W_eff Г— tg = ${rd(W_eff,1)} Г— ${Tg} = ${rd(Ag_eff,0)} mmВІ`,
    `Npl,Rd = fy Г— Ag / ОіM0 = ${gm.fy} Г— ${rd(Ag_eff,0)} / 1.0 / 1000 = ${rd(NplRd_g)} kN`,
  ],NplRd_g,Na/1e3,'kN'));

  // 5 вҖ” Gusset plate net tension [ОіM2 = 1.1 per EC3-1-1 UK NA]
  // Net area deducts bolt holes across the critical section (one bolt in single row)
  const An_g    = Math.max(0,(Hg-nb*d0)*Tg);  // conservative: all holes in one section
  const NnetRd_g = 0.9*gm.fu*An_g/GM2s/1e3;
  C.push(chk('5','Gusset Plate вҖ” Net Section Tension','EC3-1-1 В§6.2.3 / P358 В§11.4',[
    `Anet = (hg вҲ’ nВ·dвӮҖ) Г— tg = (${Hg}вҲ’${nb}Г—${d0})Г—${Tg} = ${An_g} mmВІ`,
    `Nnet,Rd = 0.9Г—${gm.fu}Г—${An_g}/1.1/1000 = ${rd(NnetRd_g)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],NnetRd_g,Na/1e3,'kN'));

  // 6 вҖ” Gusset plate block shear [fu term: ОіM2 = 1.1]
  const Ant_bs = Math.max(0,(E2g-d0/2)*Tg);
  const Anv_bs = Math.max(0,(E1+(nb-1)*P1-(nb-0.5)*d0)*Tg);
  const Veff_bs = (gm.fu*Ant_bs/GM2s + gm.fy*Anv_bs/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','Gusset Plate вҖ” Block Shear','EC3-1-8 В§3.10.2 / P358 В§11.4',[
    `Ant = (eвӮӮgвҲ’dвӮҖ/2)Г—tg = (${E2g}вҲ’${d0/2})Г—${Tg} = ${rd(Ant_bs,0)} mmВІ`,
    `Anv = (eвӮҒ+(nвҲ’1)pвӮҒвҲ’(nвҲ’0.5)dвӮҖ)Г—tg = ${rd(Anv_bs,0)} mmВІ`,
    `Veff,Rd = fuВ·Ant/ОіM2 + fyВ·Anv/(вҲҡ3В·ОіM0)  (ОіM2 = 1.1)`,
    `       = ${rd(gm.fu*Ant_bs/GM2s/1e3)} + ${rd(gm.fy*Anv_bs/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bs)} kN`,
  ],Veff_bs,Na/1e3,'kN'));

  // 7 вҖ” Brace member net section tension [ОіM2 = 1.1]
  const An_b    = Math.max(0,(Wb-d0)*Tb);
  const NnetRd_b = 0.9*bm.fu*An_b/GM2s/1e3;
  C.push(chk('7','Brace Member вҖ” Net Section Tension','EC3-1-1 В§6.2.3 / P358 В§11.4',[
    `Brace: wb = ${Wb} mm  tb = ${Tb} mm  (flat bar, single bolt row)`,
    `Anet = (wbвҲ’dвӮҖ)Г—tb = (${Wb}вҲ’${d0})Г—${Tb} = ${An_b} mmВІ`,
    `Nnet,Rd = 0.9Г—${bm.fu}Г—${An_b}/1.1/1000 = ${rd(NnetRd_b)} kN`,
    `ОіM2 = 1.1 per EC3-1-1 UK NA`,
  ],NnetRd_b,Na/1e3,'kN'));

  // 8 вҖ” Gusset weld to frame вҖ” shear + in-plane moment (P358 В§11.5)
  // N_Ed runs as direct shear along the weld length hg.
  // Eccentricity e between bolt-group centroid and weld face creates in-plane moment.
  // Weld both sides: total throat area = 2Г—aГ—hg; second moment Iw = 2Г—aГ—hgВі/12.
  const A_weld_tot = 2*Aw*Hg;
  const fwRd_g   = gm.fu/(Math.sqrt(3)*gm.bw*GM2);
  const fwRd_fr  = fm.fu/(Math.sqrt(3)*fm.bw*GM2);
  const fwRd     = Math.min(fwRd_g,fwRd_fr);
  const tau_N    = Na/A_weld_tot;
  const M_w      = Na*Ecc;
  const Iw       = 2*Aw*Hg**3/12;
  const sigma_M  = M_w*(Hg/2)/Iw;
  const f_res    = Math.sqrt(tau_N**2+sigma_M**2);
  C.push(chk('8','Gusset Weld to Frame вҖ” Shear + In-Plane Moment','EC3-1-8 В§4.5.3 / P358 В§11.5',[
    `Leg = ${fv(g.aw)} mm  throat = ${rd(Aw)} mm  length = hg = ${Hg} mm (both sides)`,
    `fw,Rd = min(fu,guss, fu,frame)/(вҲҡ3В·ОІwВ·ОіM2) = ${rd(fwRd,1)} N/mmВІ`,
    `П„ = N/(2В·aВ·hg) = ${rd(Na/1e3)}k/(2Г—${rd(Aw)}Г—${Hg}) = ${rd(tau_N,1)} N/mmВІ`,
    `M_w = NВ·e = ${rd(Na/1e3)}kГ—${Ecc}/1000 = ${rd(M_w/1e6)} kNВ·m`,
    `Iw = 2В·aВ·hgВі/12 = ${rd(Iw,0)} mmвҒҙ`,
    `Пғ_M = M_wВ·(hg/2)/Iw = ${rd(sigma_M,1)} N/mmВІ`,
    `f_result = вҲҡ(П„ВІ+ПғВІ) = ${rd(f_res,1)} N/mmВІ`,
  ],fwRd,f_res,'N/mmВІ'));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

// в”Җв”Җв”Җ UI STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let activeId='fin';
const gv=id=>document.getElementById(id)?.value||'0';

// в”Җв”Җ Section auto-fill в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function secFill(pfx, role, secName){
  const s = SECTIONS[secName];
  if(!s) return;
  // role='beam': fill tw (beam web), for fdep also tf,bf,d
  // role='supp': fill tfc (col flange), and update notch info
  if(role==='beam'){
    const twEl = document.getElementById(pfx+'-tw');
    if(twEl) twEl.value = s.tw;
    // FDEP also needs d, tf, bf
    const dEl=document.getElementById(pfx+'-d');
    const tfEl=document.getElementById(pfx+'-tf');
    const bfEl=document.getElementById(pfx+'-bf');
    if(dEl) dEl.value=s.d;
    if(tfEl) tfEl.value=s.tf;
    if(bfEl) bfEl.value=s.b;
    // Update hint box
    const hint=document.getElementById(pfx+'-ecc');
    if(hint){const lp=fv(gv(pfx+'-lp')),e2=fv(gv(pfx+'-e2p')||gv(pfx+'-e2'));
      hint.textContent=`tw = ${s.tw} mm В· d = ${s.d} mm В· tf = ${s.tf} mm В· bf = ${s.b} mm`;}
  }
  if(role==='supp'){
    const tfcEl=document.getElementById(pfx+'-tfc');
    if(tfcEl) tfcEl.value=s.tf;
  }
  // Update notch box
  const beamSec=document.getElementById(pfx+'-beamSec')?.value;
  const suppSec=document.getElementById(pfx+'-suppSec')?.value;
  const notchEl=document.getElementById(pfx+'-notch');
  if(notchEl && beamSec && suppSec){
    const nc=notchCheck(beamSec,suppSec);
    if(nc){
      const b=SECTIONS[beamSec], sp=SECTIONS[suppSec];
      // Notch is required if supporting flange width means beam flange would clash
      const flangeClear = sp.tf + sp.r + 5;
      notchEl.innerHTML=`<b>Notch check вҖ” ${beamSec} into ${suppSec}</b><br>
        Min notch depth dn вүҘ tf,supp + r,supp + 5 = ${sp.tf} + ${sp.r} + 5 = ${nc.dn_min} mm<br>
        Min notch length ln вүҘ b,supp/2 + 10 = ${Math.round(sp.b/2)} + 10 = ${nc.ln_min} mm<br>
        Beam: d=${b.d} tf=${b.tf} tw=${b.tw} mm В· Support: d=${sp.d} tf=${sp.tf} b=${sp.b} mm`;
    }
  }
}

function switchJt(id){
  const jt=JOINTS.find(j=>j.id===id);
  if(!jt)return;
  activeId=id;
  document.querySelectorAll('.jt-card').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const pan=document.getElementById('input-panel');
  if(id==='fin')   pan.innerHTML=formFin();
  else if(id==='pdep')  pan.innerHTML=formPDEP();
  else if(id==='fdep')  pan.innerHTML=formFDEP();
  else if(id==='dcleat') pan.innerHTML=formDCleat();
  else if(id==='scleat') pan.innerHTML=formSCleat();
  else if(id==='splice') pan.innerHTML=formSplice();
  else if(id==='base')  pan.innerHTML=formBase();
  else if(id==='brace') pan.innerHTML=formBrace();
  showDiag(jt);
  document.getElementById('results').style.display='none';
  if(id==='fin')    setTimeout(()=>{attachFin();initSecFill('fin');},50);
  if(id==='pdep')   setTimeout(()=>{initSecFill('pdep');},50);
  if(id==='fdep')   setTimeout(()=>{initSecFill('fdep');},50);
  if(id==='dcleat') setTimeout(()=>{attachDCleat();initSecFill('dcl');},50);
  if(id==='scleat') setTimeout(()=>{attachSCleat();initSecFill('scl');},50);
  if(id==='base')   setTimeout(attachBase,50);
}

function showDiag(jt){
  const diagFns={fin:diagFin,pdep:diagPDEP,fdep:diagFDEP,
    dcleat:diagCleat,scleat:diagCleat,splice:diagSplice,base:diagBase,brace:diagBrace};
  const notP358=['dcleat','scleat'];
  const disclaimer=notP358.includes(jt.id)?
    `<div style="background:#fffdf5;border:1px solid #c47a0a;border-radius:4px;padding:7px 10px;font-size:10.5px;color:#7a4f00;margin-top:8px">
      вҡ  Web cleats are <b>not covered by SCI P358</b>. Checks based on EC3-1-8 / ECCS Pub.126.</div>`:'';
  document.getElementById('diag-area').innerHTML=`
    <div class="diag-panel">
      <div class="diag-title">${jt.label}</div>
      <div class="diag-desc">${jt.desc}</div>
      <div class="diag-wrap">${diagFns[jt.id]?diagFns[jt.id]():''}</div>
      ${disclaimer}
      <div style="color:var(--muted);font-size:10px;font-family:var(--mono);margin-top:4px">${jt.ref}</div>

function doCalc(){
  const eb=document.getElementById('err-box');
  eb.style.display='none';
  const jt=JOINTS.find(j=>j.id===activeId);
  if(!jt?.ready){eb.textContent=jt?.label+' not yet implemented.';eb.style.display='block';return;}
  try{
    let g,res,sum;
    if(activeId==='fin'){g=readFin();res=calcFin(g);sum=finSum(g);}
    else if(activeId==='pdep'){g=readPDEP();res=calcPDEP(g);sum=pdepSum(g);}
    else if(activeId==='fdep'){g=readFDEP();res=calcFDEP(g);sum=fdepSum(g);}
    else if(activeId==='dcleat'){g=readDCleat();res=calcDCleat(g);sum=dcleatSum(g);}
    else if(activeId==='scleat'){g=readSCleat();res=calcSCleat(g);sum=scleatSum(g);}
    else if(activeId==='splice'){g=readSplice();res=calcSplice(g);sum=spliceSum(g);}
    else if(activeId==='base'){g=readBase();res=calcBase(g);sum=baseSum(g);}
    else if(activeId==='brace'){g=readBrace();res=calcBrace(g);sum=braceSum(g);}
    else{g=readPDEP();res=calcPDEP(g);sum=pdepSum(g);}
    document.getElementById('diag-area').innerHTML='';
    renderRes(res,jt.label,sum);
  }catch(e){eb.textContent='Error: '+e.message;eb.style.display='block';}
}

  </div>`).join('');

switchJt('fin');
</script>
