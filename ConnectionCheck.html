<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P358 Steel Joint Design Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f4f1;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;}

/* в”Җв”Җ HEADER в”Җв”Җ */
.hdr{background:#fff;border-bottom:1px solid #e0ddd8;padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:600;font-size:16px;color:#1a1a1a;}
.logo em{color:#777;font-style:normal;}
.logo-sub{color:#999;font-size:10px;letter-spacing:1px;margin-top:2px;}
.hdr-meta{text-align:right;color:#666;font-size:11px;line-height:1.8;}
.hdr-meta b{color:#333;}
.home-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#888;text-decoration:none;transition:color .15s;}
.home-btn:hover{color:#444;}
.home-btn svg{width:12px;height:12px;}

/* в”Җв”Җ JOINT SELECTOR BAR в”Җв”Җ */
.jt-bar{background:#f5f4f1;border-bottom:1px solid #e0ddd8;padding:10px 16px 0;overflow-x:auto;}
.jt-inner{display:flex;gap:6px;min-width:max-content;padding-bottom:10px;}
.jt-card{display:flex;flex-direction:column;align-items:center;gap:5px;width:96px;
  padding:8px 6px 7px;border-radius:8px;cursor:pointer;
  border:1px solid #e0ddd8;background:#fff;
  transition:all .18s;user-select:none;}
.jt-card:hover:not(.locked){border-color:#b0a8e0;background:#fafaf8;}
.jt-card.active{border-color:#8a7fcc;background:#fff;box-shadow:0 0 0 2px rgba(138,127,204,.12);}
.jt-card.locked{opacity:.4;cursor:not-allowed;}
.jt-icon{width:70px;height:48px;display:flex;align-items:center;justify-content:center;}
.jt-icon svg{width:100%;height:100%;}
.jt-name{font-size:9.5px;font-weight:500;text-align:center;color:#666;line-height:1.3;}
.jt-card.active .jt-name{color:#1a1a1a;font-weight:600;}
.jt-tag{font-size:9px;letter-spacing:.6px;padding:1px 6px;border-radius:3px;}
.tag-done{background:#f0ede8;color:#555;}
.tag-soon{background:#fef3e2;color:#e67e22;}

/* в”Җв”Җ LAYOUT в”Җв”Җ */
.layout{display:grid;grid-template-columns:390px 1fr;min-height:calc(100vh - 112px);}
.col-l{padding:16px;border-right:1px solid #e0ddd8;overflow-y:auto;background:#fff;}
.col-r{padding:16px;overflow-y:auto;background:#f5f4f1;}

/* в”Җв”Җ CARDS & FORMS в”Җв”Җ */
.card{background:#fff;border:1px solid #e0ddd8;border-radius:10px;padding:16px 18px;margin-bottom:10px;}
.card-title{font-size:12px;font-weight:600;color:#777;letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0ede8;}
.field{margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;color:#555;font-size:11.5px;font-weight:500;margin-bottom:4px;}
.field label em{color:#999;font-weight:400;font-size:10.5px;font-style:normal;}
.iw{position:relative;}
.iw input,.iw select{width:100%;height:32px;background:#fafaf8;border:1px solid #d4d0ca;
  border-radius:6px;padding:0 34px 0 8px;color:#1a1a1a;font-size:13px;
  font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;}
.iw input:focus,.iw select:focus{border-color:#8a7fcc;box-shadow:0 0 0 2px rgba(138,127,204,.12);}
.iw .unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  color:#999;font-size:10px;pointer-events:none;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.g2 .field,.g3 .field{margin-bottom:0;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.ibox{background:#f5f4f1;border:1px solid #e0ddd8;border-radius:6px;
  padding:7px 10px;font-size:11px;color:#666;font-family:'SF Mono',Consolas,monospace;
  margin-top:9px;line-height:1.8;}

/* в”Җв”Җ BUTTONS в”Җв”Җ */
.btn-calc{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;
  padding:10px;font-size:14px;font-weight:500;font-family:inherit;
  cursor:pointer;margin-top:4px;transition:background .2s;}
.btn-calc:hover{background:#333;}
.btn-sm{background:#fff;color:#555;border:1px solid #d4d0ca;
  border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .15s;}
.btn-sm:hover{color:#1a1a1a;border-color:#999;}
.err{background:#fceaea;border:1px solid #f0b0b0;border-radius:8px;
  padding:9px 13px;color:#c0392b;font-size:12px;margin-bottom:10px;}

/* в”Җв”Җ DIAGRAM PANEL в”Җв”Җ */
.diag-panel{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0;}
.diag-title{font-weight:700;font-size:17px;color:#1a1a1a;}
.diag-desc{font-size:12px;color:#666;text-align:center;max-width:380px;line-height:1.7;}
.diag-wrap{background:#fff;border:1px solid #e0ddd8;border-radius:10px;padding:16px;width:100%;}
.diag-legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-size:11px;color:#666;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-sw{width:14px;height:10px;border-radius:2px;}

/* в”Җв”Җ RESULTS в”Җв”Җ */
.rhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.rhdr-t{font-weight:700;font-size:18px;color:#1a1a1a;}
.verdict{border-radius:8px;padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;}
.verdict.pass{background:#e8f5e1;border:1px solid #b8dda0;}
.verdict.fail{background:#fceaea;border:1px solid #f0b0b0;}
.v-lbl{font-weight:700;font-size:16px;letter-spacing:.2px;}
.verdict.pass .v-lbl{color:#2e7d22;}
.verdict.fail .v-lbl{color:#c0392b;}
.v-sub{color:#666;font-size:11px;margin-top:3px;}
.v-util{text-align:right;}
.v-util-lbl{color:#888;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
.v-util-val{font-family:'SF Mono',Consolas,monospace;font-size:22px;font-weight:600;}
.sumgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:6px;margin-bottom:12px;}
.si{background:#f5f4f1;border-radius:8px;padding:8px 10px;}
.si-k{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.3px;}
.si-v{font-family:'SF Mono',Consolas,monospace;font-size:12px;font-weight:600;margin-top:2px;color:#1a1a1a;}
.slbl{font-weight:600;font-size:11px;color:#777;letter-spacing:.05em;text-transform:uppercase;
  margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid #e0ddd8;}
.slbl:first-child{margin-top:0;}

/* в”Җв”Җ CHECK ROWS в”Җв”Җ */
.cr{background:#fff;border:1px solid #e0ddd8;border-radius:8px;margin-bottom:5px;overflow:hidden;}
.cr.pass{border-left:4px solid #2e7d22;}
.cr.fail{border-left:4px solid #c0392b;}
.crh{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;}
.crh:hover{background:#f5f4f1;}
.cr-n{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#888;min-width:18px;font-weight:600;}
.cr-name{font-size:13px;font-weight:500;flex:1;min-width:0;color:#1a1a1a;}
.cr-bw{min-width:70px;text-align:right;}
.cr-dvc{font-size:10px;color:#888;font-family:'SF Mono',Consolas,monospace;}
.cr-trk{height:3px;background:#e0ddd8;border-radius:2px;overflow:hidden;margin-top:3px;}
.cr-fill{height:100%;border-radius:2px;transition:width .4s;}
.cr-pct{font-family:'SF Mono',Consolas,monospace;font-size:12px;font-weight:700;min-width:44px;text-align:right;}
.cr-badge{font-size:10px;font-weight:700;letter-spacing:.8px;padding:2px 8px;border-radius:20px;min-width:40px;text-align:center;}
.bp{background:#e8f5e1;color:#2e7d22;}
.bf{background:#fceaea;color:#c0392b;}
.cr-arr{color:#999;font-size:11px;margin-left:2px;}
.crd{padding:0 12px 12px;border-top:1px solid #f0ede8;display:none;background:#fafaf8;}
.crd.open{display:block;}
.dref{display:inline-block;background:#f5f4f1;border-radius:4px;padding:2px 8px;
  font-size:11px;color:#555;font-family:'SF Mono',Consolas,monospace;margin:8px 0 6px;border:1px solid #e0ddd8;}
.dcalc{background:#fff;border-radius:6px;padding:10px;border:1px solid #e0ddd8;}
.dline{font-family:'SF Mono',Consolas,monospace;font-size:11.5px;padding:2.5px 0;color:#333;opacity:.9;}
.dline+.dline{border-top:1px solid rgba(0,0,0,.05);}
.dres{display:flex;justify-content:flex-end;align-items:center;gap:10px;
  margin-top:10px;padding-top:8px;border-top:1px solid #e0ddd8;}
.dres-l{color:#666;font-size:11px;}
.dres-v{font-family:'SF Mono',Consolas,monospace;font-size:15px;font-weight:700;}
.notes{background:#fff9e6;border:1px solid #e8d780;border-left:3px solid #f0a040;
  border-radius:6px;padding:12px;color:#7a4f00;font-size:11px;line-height:1.9;margin-top:12px;}
.notes b{color:#5a3a00;}

/* в”Җв”Җ CSS VARS for rc() colour function в”Җв”Җ */
:root{--pass:#2e7d22;--warn:#e67e22;--fail:#c0392b;}

@media(max-width:820px){
  .layout{grid-template-columns:1fr;}
  .col-l{border-right:none;border-bottom:1px solid #e0ddd8;}
}
.print-hdr{display:none;}
@media print{
  .no-print{display:none!important;}
  .jt-bar{display:none!important;}
  .col-l{display:none!important;}
  .layout{display:block!important;}
  .col-r{background:#fff!important;padding:0!important;}
  body{background:#fff!important;font-size:11px;}
  .card,.cr,.verdict,.notes,.si,.diag-wrap{border:1px solid #d4d0ca!important;border-radius:4px!important;}
  .crd{display:block!important;}
  .print-hdr{display:flex!important;justify-content:space-between;align-items:center;
    background:#1a1a1a;color:#fff;padding:10px 16px;margin-bottom:16px;}
  .print-hdr-title{font-size:12pt;font-weight:700;color:#fff;}
  .print-hdr-sub{font-size:8pt;color:#bbb;}
}
</style>
</head>

const UKB_SECTIONS = Object.keys(SECTIONS).filter(k=>k.includes('UKB'));
const UKC_SECTIONS = Object.keys(SECTIONS).filter(k=>k.includes('UKC'));
function secOpts(defSec){
  let h='<option value="">вҖ” manual entry вҖ”</option><optgroup label="UKB Beams">';
  UKB_SECTIONS.forEach(k=>h+=`<option${k===defSec?' selected':''}>${k}</option>`);
  h+='</optgroup><optgroup label="UKC Columns">';
  UKC_SECTIONS.forEach(k=>h+=`<option${k===defSec?' selected':''}>${k}</option>`);
  return h+'</optgroup>';
}

// Notch requirement check (P358 В§3 / Table 3.1)
// Returns {required, dn_min, ln_min, note} 
// dn_min = min notch depth, ln_min = min notch length
function notchCheck(beamSec, suppSec){
  if(!beamSec||!suppSec) return null;
  const b=SECTIONS[beamSec], s=SECTIONS[suppSec];
  if(!b||!s) return null;
  // A notch is required if the beam top flange would clash with the supporting member flange
  // Standard notch: dn вүҘ tf_supp + r_supp + 5mm clearance (to clear root of supporting flange)
  // Notch length: ln вүҘ b_supp/2 + 10mm (to clear supporting flange)
  const dn_min = s.tf + s.r + 5;
  const ln_min = s.b/2 + 10;
  // Notch required if supporting member flange depth > beam flange (i.e. would clash)
  const required = true; // conservative вҖ” always flag possibility
  return {required, dn_min: Math.ceil(dn_min), ln_min: Math.ceil(ln_min),
    note:`Notch depth dn вүҘ tf,supp+r+5 = ${s.tf}+${s.r}+5 = ${Math.ceil(dn_min)} mm. Length ln вүҘ b,supp/2+10 = ${Math.ceil(ln_min)} mm.`};
}

// Concrete hatching fill (crosshatch via pattern)
function concHatch(id){
  return `<pattern id="${id}" patternUnits="userSpaceOnUse" width="8" height="8">
    <line x1="0" y1="0" x2="8" y2="8" stroke="#999" stroke-width=".7"/>
    <line x1="8" y1="0" x2="0" y2="8" stroke="#999" stroke-width=".7"/>
  </pattern>`;
}
// Standard bolt circle: white circle + cross-hair
function bolt(cx,cy,r=6){
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#fff" stroke="#333" stroke-width="1.3"/>
    <line x1="${cx-r*.6}" y1="${cy}" x2="${cx+r*.6}" y2="${cy}" stroke="#333" stroke-width=".9"/>
    <line x1="${cx}" y1="${cy-r*.6}" x2="${cx}" y2="${cy+r*.6}" stroke="#333" stroke-width=".9"/>`;
}
function bolts(cx,r,ys){
  return ys.map(y=>bolt(cx,y,r)).join('');
}
// Fillet weld: solid black filled triangle on plate edge
function weld(x,y1,y2,side=1){
  const m=(y1+y2)/2, s=side*6;
  return `<polygon points="${x},${y1} ${x},${y2} ${x+s},${m}" ${sweld}/>`;
}
// Arrow head marker definition
function arrowMarker(id,col='#333',flip=false){
  return `<marker id="${id}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
    <polygon points="${flip?'7,3.5 0,0 0,7':'0,0 7,3.5 0,7'}" fill="${col}"/></marker>`;
}
// Dimension line with ticks
function dimLine(x1,y1,x2,y2,aid){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
    stroke="#555" stroke-width=".8" stroke-dasharray="none"
    marker-start="url(#${aid})" marker-end="url(#${aid})"/>`;
}
// Dimension tick (short perpendicular line)
function tick(x,y,horiz=false){
  return horiz
    ? `<line x1="${x}" y1="${y-4}" x2="${x}" y2="${y+4}" stroke="#555" stroke-width=".8"/>`
    : `<line x1="${x-4}" y1="${y}" x2="${x+4}" y2="${y}" stroke="#555" stroke-width=".8"/>`;
}

function weldTri(x,y1,y2,dir=1){
  const m=(y1+y2)/2, s=dir*7;
  return `<polygon points="${x},${y1} ${x},${y2} ${x+s},${m}" ${D.wld}/>`;
}
function weldH(x1,x2,y,dir=1){
  const m=(x1+x2)/2, s=dir*7;
  return `<polygon points="${x1},${y} ${x2},${y} ${m},${y+s}" ${D.wld}/>`;
}
function dimV(x,y1,y2,label,lx){
  const mid=(y1+y2)/2;
  return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#555" stroke-width="0.7"
    marker-start="url(#darrr)" marker-end="url(#darr)"/>
  <line x1="${x-3}" y1="${y1}" x2="${x+3}" y2="${y1}" stroke="#555" stroke-width="0.7"/>
  <line x1="${x-3}" y1="${y2}" x2="${x+3}" y2="${y2}" stroke="#555" stroke-width="0.7"/>
  <text ${D.sml} x="${lx}" y="${mid+3}" text-anchor="middle">${label}</text>`;
}
function dimH(x1,x2,y,label,ly){
  const mid=(x1+x2)/2;
  return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#555" stroke-width="0.7"
    marker-start="url(#darrr)" marker-end="url(#darr)"/>
  <line x1="${x1}" y1="${y-3}" x2="${x1}" y2="${y+3}" stroke="#555" stroke-width="0.7"/>

  <text ${D.sml} x="${mid}" y="${ly}" text-anchor="middle">${label}</text>`;

function slabel(x,y,txt,anchor='start'){

  return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#1a5e28" stroke-width="2" marker-end="url(#arr)"/>
  <text ${D.grn} x="${x1>x2?x1+5:x1-5}" y="${y+4}" text-anchor="${x1>x2?'start':'end'}">${lbl}</text>`;

  <text ${D.grn} x="${x+5}" y="${y1+(y2-y1)/2}" text-anchor="start">${lbl}</text>`;

// I-section: cx=web centre, y=top, d=depth, tf=flange t, tw=web t, bf=flange width
function isec(cx,y,d,tf,tw,bf){
  const hw=bf/2;
  return `<rect x="${cx-hw}" y="${y}" width="${bf}" height="${tf}" ${D.sec}/>
  <rect x="${cx-tw/2}" y="${y+tf}" width="${tw}" height="${d-2*tf}" ${D.web}/>
  <rect x="${cx-hw}" y="${y+d-tf}" width="${bf}" height="${tf}" ${D.sec}/>`;
}
// Rotated I-section (horizontal beam): cy=web centre, x=left, len=length
function isecH(x,cy,len,tf,tw,bf){
  const hw=bf/2;
  return `<rect x="${x}" y="${cy-hw}" width="${len}" height="${tf}" ${D.sec}/>
  <rect x="${x}" y="${cy-tw/2}" width="${len}" height="${tw}" ${D.web}/>
  <rect x="${x}" y="${cy+hw-tf}" width="${len}" height="${tf}" ${D.sec}/>`;
}

  <line x1="0" y1="6" x2="6" y2="0" stroke="#999" stroke-width="0.8"/>

</defs>`;
}

function diagFin(){
  // Fin plate: column (vertical UC) on left, fin plate welded to column face,
  // beam (horizontal UB) bolted through fin plate. Elevation view.
  const s=svgStart(480,300);
  // Column UC: web centred at x=48, full height
  const cc=48, ctf=14, ctw=9, cbf=52;
  // Column
  const col=`<rect x="${cc-cbf/2}" y="0" width="${cbf}" height="15" ${D.sec}/>
  <rect x="${cc-ctw/2}" y="15" width="${ctw}" height="270" ${D.web}/>
  <rect x="${cc-cbf/2}" y="285" width="${cbf}" height="15" ${D.sec}/>`;
  // Fin plate: welded to right face of column flange at x=72
  const px=cc+cbf/2, ph=150, ptop=75, ptw=12, plp=80;
  const plate=`<rect x="${px}" y="${ptop}" width="${plp}" height="${ph}" ${D.plt}/>`;
  const welds=weldTri(px,ptop,ptop+ph,-1)+weldTri(px,ptop,ptop+ph,1);
  // 3 bolts at x = px+50 (e2=50 from col face, so bolt at px+50)
  const bx=px+50, e1=25, p1=50;
  const bolts=bolt(bx,ptop+e1)+bolt(bx,ptop+e1+p1)+bolt(bx,ptop+e1+2*p1);
  // Beam UB: horizontal, web centre at y=150, from x=px+12 to right edge
  const bcy=150, btf=14, btw=9, bbf=80, blen=310;
  const beam=isecH(px+ptw,bcy,blen,btf,btw,bbf);
  // Dimensions
  const dims=
    dimV(px+plp+12, ptop, ptop+e1, 'eвӮҒ', px+plp+22)+
    dimV(px+plp+12, ptop+e1, ptop+e1+p1, 'pвӮҒ', px+plp+22)+
    dimV(px+plp+12, ptop+e1+p1, ptop+e1+2*p1, 'pвӮҒ', px+plp+22)+
    dimH(px, bx, ptop+ph+18, 'eвӮӮ', ptop+ph+30)+
    dimH(px, px+plp, ptop+ph+40, 'L_p', ptop+ph+52)+
    dimH(px, px+plp+btw, ptop-22, 'a = L_p вҲ’ eвӮӮ', ptop-10);
  // Labels
  const labs=
    label(2, 150,'Column (UC)')+
    label(px+20, ptop-8,'Fin plate')+
    slabel(px+2, ptop+ph+8,'weld')+
    label(px+ptw+blen/2, bcy-bbf/2-5,'Beam (UB)', 'middle')+
    `<text ${D.grn} x="465" y="148" text-anchor="end">V вҶ’</text>`+
    `<line x1="430" y1="150" x2="460" y2="150" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>`;
  return s+col+plate+welds+bolts+beam+dims+labs+'</svg>';
}

function diagPDEP(){
  // PDEP: column flange on left, end plate welded to beam web, bolts into col flange
  const s=svgStart(480,300);
  // Column: show just the flange (connection to flange face)
  const cflange=`<rect x="0" y="0" width="20" height="300" ${D.sec}/>
  <rect x="20" y="0" width="28" height="16" fill="#cdd8e0" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="20" y="284" width="28" height="16" fill="#cdd8e0" stroke="#1a1a1a" stroke-width="1"/>`;
  // End plate: partial depth, welded to beam web
  // Plate sits from y=75 to y=225 (150mm height), 12mm thick, face at x=48
  const epx=48, eph=150, eptop=75, eptk=14;
  const endplate=`<rect x="${epx}" y="${eptop}" width="${eptk}" height="${eph}" ${D.plt}/>`;
  // Bolts through plate into col flange: 3 bolts
  const bx=epx+7, e1=25, p1=50;
  const bolts=bolt(bx,eptop+e1)+bolt(bx,eptop+e1+p1)+bolt(bx,eptop+e1+2*p1);
  // Beam UB: from x=epx+eptk rightwards, web centre at y=150
  const bcy=150, btf=16, btw=9, bbf=100, blen=320;
  const beam=isecH(epx+eptk,bcy,blen,btf,btw,bbf);
  // Weld: beam web to plate right face
  const wx=epx+eptk;
  const welds=weldTri(wx,eptop,eptop+eph,1)+weldTri(wx,eptop,eptop+eph,-1);
  // Plate stops short of flanges annotation
  const annot=`<line x1="${epx}" y1="${eptop}" x2="${epx-22}" y2="${eptop-18}" stroke="#555" stroke-width="0.8"/>
  <text ${D.sml} x="${epx-26}" y="${eptop-22}" text-anchor="end">plate short</text>
  <text ${D.sml} x="${epx-26}" y="${eptop-12}" text-anchor="end">of flanges</text>
  <line x1="${epx}" y1="${eptop+eph}" x2="${epx-22}" y2="${eptop+eph+18}" stroke="#555" stroke-width="0.8"/>
  <text ${D.sml} x="${epx-26}" y="${eptop+eph+28}" text-anchor="end">partial depth</text>`;
  // Dimensions
  const dims=
    dimV(epx+eptk+blen-8, eptop, eptop+e1, 'eвӮҒ', epx+eptk+blen+6)+
    dimV(epx+eptk+blen-8, eptop+e1, eptop+e1+p1, 'pвӮҒ', epx+eptk+blen+6)+
    dimV(epx+eptk+blen-8, eptop+e1+p1, eptop+e1+2*p1, 'pвӮҒ', epx+eptk+blen+6)+
    dimH(bx, wx, eptop+eph+22, 'e', eptop+eph+34)+
    dimV(epx+eptk+blen-8, eptop, eptop+eph, 'h_p', epx+eptk+blen+26);
  const labs=
    label(2, 148,'Column (UC)')+
    label(epx+2, eptop-8,'End plate (partial)')+
    label(epx+eptk+blen/2, bcy-bbf/2-5,'Beam (UB)','middle')+
    `<text ${D.grn} x="475" y="148" text-anchor="end">V вҶ’</text>`+
    `<line x1="440" y1="150" x2="470" y2="150" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>`;
  return s+cflange+endplate+bolts+beam+welds+annot+dims+labs+'</svg>';
}

function diagFDEP(){
  // FDEP: full depth plate вҖ” welded to web AND both flanges
  const s=svgStart(480,320);
  const cflange=`<rect x="0" y="0" width="20" height="320" ${D.sec}/>
  <rect x="20" y="0" width="28" height="16" fill="#cdd8e0" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="20" y="304" width="28" height="16" fill="#cdd8e0" stroke="#1a1a1a" stroke-width="1"/>`;
  // Beam: full depth 250mm, tf=16, tw=9, bf=120
  const bcy=160, btf=16, btw=9, bbf=120, bd=250, blen=320;
  const btop=bcy-bd/2, bbot=bcy+bd/2;
  const beam=`<rect x="62" y="${btop}" width="${blen}" height="${btf}" ${D.sec}/>
  <rect x="62" y="${btop+btf}" width="${blen}" height="${bd-2*btf}" ${D.web}/>
  <rect x="62" y="${bbot-btf}" width="${blen}" height="${btf}" ${D.sec}/>`;
  // Full depth end plate: same height as beam
  const epx=48, eptk=12;
  const endplate=`<rect x="${epx}" y="${btop}" width="${eptk}" height="${bd}" ${D.plt}/>`;
  // 4 bolts
  const bx=epx+6;
  const bolts=bolt(bx,btop+20)+bolt(bx,btop+70)+bolt(bx,bbot-70)+bolt(bx,bbot-20);
  // Welds: web weld (thick line), flange welds (top and bottom)
  const webweld=`<rect x="${epx+eptk-1}" y="${btop+btf}" width="4" height="${bd-2*btf}" fill="#1a1a1a"/>
  <text ${D.sml} x="${epx-2}" y="${bcy}" text-anchor="end" writing-mode="tb" transform="rotate(-90,${epx-8},${bcy})">web weld</text>`;
  const flgweld=weldH(epx+eptk,epx+eptk+80,btop+btf,-1)+weldH(epx+eptk,epx+eptk+80,bbot-btf,1);
  const fwlabs=`<line x1="${epx+eptk+40}" y1="${btop+btf}" x2="${epx+eptk+40}" y2="${btop-12}" stroke="#555" stroke-width="0.7"/>
  <text ${D.sml} x="${epx+eptk+42}" y="${btop-2}">flange weld</text>
  <line x1="${epx+eptk+40}" y1="${bbot-btf}" x2="${epx+eptk+40}" y2="${bbot+12}" stroke="#555" stroke-width="0.7"/>
  <text ${D.sml} x="${epx+eptk+42}" y="${bbot+20}">flange weld</text>`;
  const dims=
    dimV(62+blen+8, btop, btop+btf, 't_f', 62+blen+22)+
    dimV(62+blen+8, btop, bbot, 'd', 62+blen+38)+
    dimV(62+blen+8, btop+btf, bbot-btf, 'd_w', 62+blen+54)+
    dimH(bx, epx+eptk, bbot+30, 'e', bbot+42);
  const labs=
    label(2,160,'Column')+label(62+blen/2, btop-8,'Beam (UB)','middle')+
    label(epx+2, btop-10,'Full depth end plate')+
    `<text ${D.grn} x="476" y="158" text-anchor="end">V вҶ’</text>`+
    `<line x1="440" y1="160" x2="472" y2="160" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>`;
  return s+cflange+beam+endplate+bolts+webweld+flgweld+fwlabs+dims+labs+'</svg>';
}

function diagCleat(){
  // Double angle cleat: col on left, two angle cleats, beam on right
  const s=svgStart(480,300);
  // Column UC
  const cc=50, ctf=14, ctw=9, cbf=52;
  const col=`<rect x="${cc-cbf/2}" y="0" width="${cbf}" height="15" ${D.sec}/>
  <rect x="${cc-ctw/2}" y="15" width="${ctw}" height="270" ${D.web}/>
  <rect x="${cc-cbf/2}" y="285" width="${cbf}" height="15" ${D.sec}/>`;
  // Angle cleats: outstanding leg to column, web leg to beam
  // Show as two L-shapes. Outstanding leg: from col face x=76 inward, vertical
  // Web leg: from x=76+outleg horizontal
  const cx=cc+cbf/2; // col right face = 76
  const outleg=10, webleg=60, tc=10;
  const hc=140, ytop=80;
  // Near cleat (solid)
  const cleat1=`<rect x="${cx}" y="${ytop}" width="${outleg}" height="${hc}" ${D.plt}/>
  <rect x="${cx+outleg}" y="${ytop+hc/2-tc/2-25}" width="${webleg}" height="${tc}" ${D.plt}/>
  <rect x="${cx+outleg}" y="${ytop+hc/2-tc/2+25}" width="${webleg}" height="${tc}" ${D.plt}/>`;
  // Far cleat (dashed вҖ” shown offset slightly)
  const cleat2=`<rect x="${cx+2}" y="${ytop}" width="${outleg}" height="${hc}" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="${cx+outleg+2}" y="${ytop+hc/2-tc/2-25}" width="${webleg}" height="${tc}" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="${cx+outleg+2}" y="${ytop+hc/2-tc/2+25}" width="${webleg}" height="${tc}" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>`;
  // Support bolts (outstanding leg into column): 3 bolts
  const sbx=cx+outleg/2, e1=22, p1=48;
  const sbolts=bolt(sbx,ytop+e1)+bolt(sbx,ytop+e1+p1)+bolt(sbx,ytop+e1+2*p1);
  // Web bolts: through web legs and beam web
  const wbx=cx+outleg+webleg/2;
  const wbolts=bolt(wbx,ytop+hc/2-25)+bolt(wbx,ytop+hc/2+25);
  // Beam
  const bcy=150, btf=14, btw=8, bbf=90, blen=290;
  const beam=isecH(cx+outleg+webleg,bcy,blen,btf,btw,bbf);
  // Labels
  const labs=
    label(2,148,'Column (UC)')+
    label(cx+2,ytop-8,'Angle cleats Г—2')+
    slabel(cx,ytop+hc/2,'L_out','start')+
    `<line x1="${sbx-14}" y1="${ytop+e1}" x2="${sbx-28}" y2="${ytop+e1-16}" stroke="#555" stroke-width="0.7"/>
    <text ${D.sml} x="${sbx-30}" y="${ytop+e1-18}" text-anchor="end">support bolts</text>`+
    `<line x1="${wbx+10}" y1="${ytop+hc/2-25}" x2="${wbx+26}" y2="${ytop+hc/2-36}" stroke="#555" stroke-width="0.7"/>
    <text ${D.sml} x="${wbx+28}" y="${ytop+hc/2-38}">web bolts</text>`+
    label(cx+outleg+webleg+blen/2,bcy-bbf/2-5,'Beam (UB)','middle')+
    `<rect x="${cx+outleg+webleg+30}" y="258" width="90" height="14" fill="#f0f9f2" stroke="#1a5e28" stroke-width="0.8" rx="2"/>
    <text ${D.sml} x="${cx+outleg+webleg+75}" y="269" text-anchor="middle" fill="#1a5e28">No site welds</text>`+
    `<text ${D.grn} x="475" y="148" text-anchor="end">V вҶ’</text>`+
    `<line x1="440" y1="150" x2="472" y2="150" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>`;
  return s+col+cleat2+cleat1+sbolts+wbolts+beam+labs+'</svg>';
}

  const cx=cc+cbf/2;
  const outleg=10, webleg=60, tc=10, hc=100, ytop=100;
  const cleat=`<rect x="${cx}" y="${ytop}" width="${outleg}" height="${hc}" ${D.plt}/>
  <rect x="${cx+outleg}" y="${ytop+hc/2-tc/2}" width="${webleg}" height="${tc}" ${D.plt}/>`;
  const sbx=cx+outleg/2, e1=22, p1=56;
  const sbolts=bolt(sbx,ytop+e1)+bolt(sbx,ytop+e1+p1);
  const wbolts=bolt(cx+outleg+webleg/2, ytop+hc/2);
  const bcy=150, btf=14, btw=8, bbf=80, blen=300;

    <text ${D.sml} x="${cx+outleg+webleg+75}" y="269" text-anchor="middle" fill="#1a5e28">No site welds</text>`+
    `<rect x="${cx+outleg+webleg+30}" y="238" width="90" height="14" fill="#fff8ed" stroke="#c47a0a" stroke-width="0.8" rx="2"/>
    <text ${D.sml} x="${cx+outleg+webleg+75}" y="249" text-anchor="middle" fill="#c47a0a">Full V on one cleat</text>`+

    `<line x1="440" y1="150" x2="472" y2="150" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>`;
  return s+col+cleat+sbolts+wbolts+beam+labs+'</svg>';

function diagSplice(){
  // Column splice: upper + lower column, web plates, flange plates, bearing gap
  const s=svgStart(480,340);
  const cx=240, ctf=14, ctw=9, cbf=110, gap=14;
  const upBot=148, loTop=upBot+gap;
  // Upper column (top half)
  const upper=`<rect x="${cx-cbf/2}" y="10" width="${cbf}" height="${ctf}" ${D.sec}/>
  <rect x="${cx-ctw/2}" y="${10+ctf}" width="${ctw}" height="${upBot-10-ctf}" ${D.web}/>
  <rect x="${cx-cbf/2}" y="${upBot-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;
  // Lower column
  const lower=`<rect x="${cx-cbf/2}" y="${loTop}" width="${cbf}" height="${ctf}" ${D.sec}/>
  <rect x="${cx-ctw/2}" y="${loTop+ctf}" width="${ctw}" height="${310-loTop-ctf}" ${D.web}/>
  <rect x="${cx-cbf/2}" y="${310-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;
  // Bearing gap line
  const bg=`<line x1="${cx-cbf/2-10}" y1="${upBot}" x2="${cx+cbf/2+10}" y2="${upBot}" stroke="#555" stroke-width="0.8" stroke-dasharray="5,3"/>
  <line x1="${cx-cbf/2-10}" y1="${loTop}" x2="${cx+cbf/2+10}" y2="${loTop}" stroke="#555" stroke-width="0.8" stroke-dasharray="5,3"/>
  <text ${D.sml} x="${cx+cbf/2+14}" y="${upBot+gap/2+3}">bearing gap</text>`;
  // Web cover plates (both sides): thin plates covering the gap zone
  const wpw=8, wph=90, wpx1=cx-ctw/2-wpw, wpx2=cx+ctw/2;
  const wpy=upBot-wph/2;
  const webplates=`<rect x="${wpx1}" y="${wpy}" width="${wpw}" height="${wph}" ${D.plt}/>
  <rect x="${wpx2}" y="${wpy}" width="${wpw}" height="${wph}" ${D.plt}/>`;
  const wbolts=bolt(wpx1+wpw/2,wpy+22)+bolt(wpx1+wpw/2,wpy+45)+bolt(wpx1+wpw/2,wpy+68)+
    bolt(wpx2+wpw/2,wpy+22)+bolt(wpx2+wpw/2,wpy+45)+bolt(wpx2+wpw/2,wpy+68);
  // Flange cover plates: top pair
  const fpw=36, fptk=9;
  const fpy1=upBot-ctf-fptk, fpy2=loTop+ctf;
  const fpx1=cx-cbf/2-2, fpx2=cx+cbf/2-fpw+2;
  const fplates=`<rect x="${fpx1}" y="${fpy1}" width="${fpw}" height="${fptk}" ${D.plt}/>
  <rect x="${fpx2}" y="${fpy1}" width="${fpw}" height="${fptk}" ${D.plt}/>
  <rect x="${fpx1}" y="${fpy2}" width="${fpw}" height="${fptk}" ${D.plt}/>
  <rect x="${fpx2}" y="${fpy2}" width="${fpw}" height="${fptk}" ${D.plt}/>`;
  const fbolts=bolt(fpx1+18,fpy1+fptk/2)+bolt(fpx2+18,fpy1+fptk/2)+
    bolt(fpx1+18,fpy2+fptk/2)+bolt(fpx2+18,fpy2+fptk/2);
  // Force arrows
  const forces=`<line x1="${cx}" y1="10" x2="${cx}" y2="30" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>
  <text ${D.grn} x="${cx+6}" y="24">N</text>
  <line x1="${cx+100}" y1="${upBot+gap/2}" x2="${cx+78}" y2="${upBot+gap/2}" stroke="#1a5e28" stroke-width="2" marker-end="url(#arr)"/>
  <text ${D.grn} x="${cx+104}" y="${upBot+gap/2+4}">V</text>`;
  // Labels
  const labs=
    label(cx-cbf/2-60, 80,'Upper column')+
    label(cx-cbf/2-60, 260,'Lower column')+
    `<line x1="${cx-cbf/2-4}" y1="${wpy+20}" x2="${cx-cbf/2-38}" y2="${wpy}" stroke="#555" stroke-width="0.7"/>
    <text ${D.sml} x="${cx-cbf/2-42}" y="${wpy-2}" text-anchor="end">Web cover plates</text>`+
    `<line x1="${fpx1+fpw/2}" y1="${fpy1}" x2="${fpx1+fpw/2}" y2="${fpy1-16}" stroke="#555" stroke-width="0.7"/>
    <text ${D.sml} x="${fpx1+fpw/2}" y="${fpy1-20}" text-anchor="middle">Flange plates</text>`+
    dimH(wpx1,wpx2+wpw,340,`L_cp = ${gap} + plates`,352);
  return s+upper+lower+bg+webplates+wbolts+fplates+fbolts+forces+labs+'</svg>';
}

function diagBase(){
  // Column base: column sitting on base plate, HD bolts, concrete, grout
  const s=svgStart(420,340);
  const cx=210, ctf=14, ctw=9, cbf=100;
  const cbot=190; // bottom of column
  // Column
  const col=`<rect x="${cx-cbf/2}" y="10" width="${cbf}" height="${ctf}" ${D.sec}/>
  <rect x="${cx-ctw/2}" y="${10+ctf}" width="${ctw}" height="${cbot-10-ctf}" ${D.web}/>
  <rect x="${cx-cbf/2}" y="${cbot-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;
  // Weld at column foot (fillet triangles)
  const weld_base=weldH(cx-cbf/2,cx-ctw/2,cbot,1)+weldH(cx+ctw/2,cx+cbf/2,cbot,1);
  // Base plate
  const bpw=180, bph=16, bpx=cx-bpw/2, bpy=cbot;
  const baseplate=`<rect x="${bpx}" y="${bpy}" width="${bpw}" height="${bph}" ${D.plt}/>`;
  // Grout
  const gpy=bpy+bph;
  const grout=`<rect x="${bpx-10}" y="${gpy}" width="${bpw+20}" height="12" fill="#e8e8e8" stroke="#888" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text ${D.sml} x="${cx}" y="${gpy+9}" text-anchor="middle">grout</text>`;
  // Concrete
  const cony=gpy+12;
  const conc=`<rect x="${bpx-30}" y="${cony}" width="${bpw+60}" height="60" ${D.hat} stroke="#777" stroke-width="1"/>
  <text ${D.sml} x="${cx}" y="${cony+35}" text-anchor="middle">Concrete foundation</text>`;
  // HD bolts (4 off вҖ” show 2 in this elevation)
  const hdx1=bpx+25, hdx2=bpx+bpw-25;
  const hdbolts=`<line x1="${hdx1}" y1="${bpy}" x2="${hdx1}" y2="${cony+50}" stroke="#444" stroke-width="3"/>
  <line x1="${hdx2}" y1="${bpy}" x2="${hdx2}" y2="${cony+50}" stroke="#444" stroke-width="3"/>
  ${bolt(hdx1,bpy+bph/2,6)} ${bolt(hdx2,bpy+bph/2,6)}`;
  // Cantilever c dimension
  const cdims=
    dimH(bpx, cx-cbf/2, bpy+bph+30, 'c', bpy+bph+42)+
    dimH(cx+cbf/2, bpx+bpw, bpy+bph+30, 'c', bpy+bph+42)+
    dimH(bpx, bpx+bpw, cony+72, 'B_p', cony+84)+
    dimV(bpx-38, bpy, bpy+bph, 't_p', bpx-48);
  // Forces
  const forces=`<line x1="${cx}" y1="10" x2="${cx}" y2="30" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>
  <text ${D.grn} x="${cx+6}" y="24">N</text>
  <line x1="${cx+80}" y1="${cbot-60}" x2="${cx+58}" y2="${cbot-60}" stroke="#1a5e28" stroke-width="2" marker-end="url(#arr)"/>
  <text ${D.grn} x="${cx+84}" y="${cbot-56}">V</text>`;
  const labs=
    label(cx-cbf/2-50, 100,'Column')+
    label(bpx+2, bpy-6,'Base plate')+
    `<line x1="${hdx1-8}" y1="${cony+30}" x2="${hdx1-30}" y2="${cony+40}" stroke="#555" stroke-width="0.7"/>
    <text ${D.sml} x="${hdx1-34}" y="${cony+44}" text-anchor="end">HD bolts</text>`;
  return s+col+weld_base+baseplate+grout+conc+hdbolts+cdims+forces+labs+'</svg>';
}

function diagBrace(){
  // Bracing: supporting frame bottom + column left, triangular gusset, diagonal brace, bolts
  const s=svgStart(480,320);
  // Supporting beam (horizontal, bottom)
  const beamH=`<rect x="0" y="228" width="480" height="16" ${D.sec}/>
  <rect x="0" y="244" width="480" height="40" ${D.web}/>
  <rect x="0" y="284" width="480" height="16" ${D.sec}/>`;
  // Supporting column (vertical, left)
  const colV=`<rect x="0" y="0" width="16" height="244" ${D.sec}/>
  <rect x="16" y="0" width="30" height="244" ${D.web}/>`;
  // Gusset plate (triangle): top-left to bottom-right along beam + up left
  const gpoly=`<polygon points="46,228 240,228 240,100" ${D.plt}/>`;
  // Weld on beam top flange
  const gw1=weldH(46,240,228,-1);
  // Weld on column right face (vertical)
  const gw2=weldTri(46,100,228,1);
  // Brace member (flat bar diagonal)
  const ba=Math.atan2(240-46,228-100); // angle
  const bl=Math.sqrt((240-46)**2+(228-100)**2);
  const bw=18;
  const brace=`<g transform="rotate(${-ba*180/Math.PI} 240 100)">
  <rect x="${240-bl}" y="${100-bw/2}" width="${bl}" height="${bw}" ${D.sec}/>
  </g>`;
  // Bolts along brace near gusset (3 bolts, spaced along brace direction)
  const p1=55, e1=40;
  const bdx=Math.cos(ba), bdy=-Math.sin(ba);
  const b0x=240-e1*bdx, b0y=100+e1*bdy;
  const bbolts=
    bolt(b0x,b0y)+
    bolt(b0x-p1*bdx,b0y+p1*bdy)+
    bolt(b0x-2*p1*bdx,b0y+2*p1*bdy);
  // Force arrow along brace
  const forces=`<line x1="${240+50*bdx}" y1="${100-50*bdy}" x2="${240+20*bdx}" y2="${100-20*bdy}" stroke="#1a5e28" stroke-width="2.5" marker-end="url(#arr)"/>
  <text ${D.grn} x="${240+58*bdx}" y="${100-50*bdy+4}">N</text>`;
  // Eccentricity: bolt group CG to weld line
  const ecx=b0x-p1*bdx, ecy=b0y+p1*bdy;
  const ecc=`<line x1="${ecx}" y1="${ecy}" x2="${ecx}" y2="228" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="${ecx}" y1="244" x2="240" y2="244" stroke="#555" stroke-width="0.8" marker-start="url(#darrr)" marker-end="url(#darr)"/>
  <text ${D.sml} x="${(ecx+240)/2}" y="256" text-anchor="middle">e</text>`;
  // hg dimension
  const hgdim=dimV(255,100,228,'h_g',268);
  // Labels
  const labs=
    slabel(50,100,'Gusset plate')+
    slabel(300,150,'Bracing member')+
    `<line x1="${b0x-10}" y1="${b0y+10}" x2="${b0x+30}" y2="${b0y-30}" stroke="#555" stroke-width="0.7"/>
    <text ${D.sml} x="${b0x+32}" y="${b0y-32}">bolt group</text>`;
  return s+beamH+colV+gpoly+gw1+gw2+brace+bbolts+forces+ecc+hgdim+labs+'</svg>';
}

const DIAGRAMS={
  fin:diagFin, pdep:diagPDEP, fdep:diagFDEP,
  dcleat:diagCleat, scleat:diagSCleat,
  splice:diagSplice, base:diagBase, brace:diagBrace,
};
