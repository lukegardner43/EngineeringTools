// ─── CALCULATIONS ─────────────────────────────────────────────
const fv=v=>parseFloat(v)||0, fi=v=>Math.max(1,parseInt(v)||1);
const rd=(v,d=2)=>(+v).toFixed(d), esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const rc=r=>r>1?'var(--fail)':r>.85?'var(--warn)':'var(--pass)';
function chk(id,name,ref,lines,cap,dem,unit,latex){const r=cap>0?dem/cap:999;return{id,name,ref,lines,cap,dem,unit,r,pass:r<=1,latex:latex||null};}

function calcFin(g){
  const b=BOLT[g.boltSize],pm=MAT[g.platGrade],bm=MAT[g.beamGrade];
  const Vn=fv(g.V)*1e3,nb=fi(g.n),P1=fv(g.p1),E1=fv(g.e1),E2p=fv(g.e2p),E2w=fv(g.e2w);
  const Tp=fv(g.tp),Hp=fv(g.hp),Lp=fv(g.lp),Tw=fv(g.tw),Aw=.707*fv(g.aw);
  const{d,d0,As}=b,fub=800,a=Lp-E2p;
  // γM2 = 1.25 for bolts/welds (EC3-1-8 UK NA); = 1.1 for plate cross-section fracture (EC3-1-1 UK NA)
  const GM2s=1.1;  // section fracture (net shear, block shear on plates)
  let Iy=0;for(let i=0;i<nb;i++){const y=i*P1-(nb-1)*P1/2;Iy+=y*y;}
  const ym=(nb-1)*P1/2,M=Vn*a,Fvd=Vn/nb,Fhm=Iy>0?M*ym/Iy:0,Fr=Math.sqrt(Fvd*Fvd+Fhm*Fhm);
  const C=[];

  // 1 — Bolt group shear (elastic in-plane analysis, equivalent to P358 α-β for n2=1)
  const FvRd=.6*fub*As/GM2;
  const beta_check = 6*a/(nb*(nb+1)*P1);
  C.push(chk('1','Bolt Group — Shear Resistance','EC3-1-8 Table 3.4 / P358 §5.5 Check 2',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mm²  Fv,Rd = 0.6×${fub}×${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `Eccentricity z = a = Lp − e₂ = ${Lp} − ${E2p} = ${a} mm`,
    `Elastic analysis (≡ P358 β-method: β = 6z/[n(n+1)p₁] = ${rd(beta_check,3)})`,
    `Iy = Σyi² = ${rd(Iy,0)} mm²   ymax = ${ym} mm`,
    `F_direct = V/n = ${rd(Fvd/1e3)} kN   F_moment = V·a·ymax/Iy = ${rd(Fhm/1e3)} kN`,
    `F_resultant = √(${rd(Fvd/1e3)}²+${rd(Fhm/1e3)}²) = ${rd(Fr/1e3)} kN`,
  ],FvRd/1e3,Fr/1e3,'kN',`F_{v,Rd}=\\dfrac{0.6\\times${fub}\\times${As}}{1.25}=${rd(FvRd/1e3)}\\text{ kN/bolt}`));

  // 2 — Bearing on fin plate
  const k1p=Math.min(2.8*E2p/d0-1.7,2.5),abp=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/pm.fu,1):Math.min(E1/(3*d0),fub/pm.fu,1);
  const FbpRd=Math.max(0,k1p)*Math.max(0,abp)*pm.fu*d*Tp/GM2/1e3;
  C.push(chk('2','Bearing Resistance — Fin Plate','EC3-1-8 Table 3.4 / P358 §5.5 Check 3',[
    `k₁ = min(2.8×${E2p}/${d0}−1.7, 2.5) = ${rd(k1p)}`,
    `αb = min(e₁/3d₀${nb>1?`, p₁/3d₀−¼`:``, `fub/fu`}, 1) = ${rd(abp,3)}`,
    `Fb,Rd = ${rd(k1p)}×${rd(abp,3)}×${pm.fu}×${d}×${Tp}/1.25 = ${rd(FbpRd)} kN`,
  ],FbpRd,Fr/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1p)}\\times${rd(abp,3)}\\times${pm.fu}\\times${d}\\times${Tp}}{1.25}=${rd(FbpRd)}\\text{ kN}`));

  // 3 — Bearing on beam web
  const k1w=Math.min(2.8*E2w/d0-1.7,2.5),abw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbwRd=Math.max(0,k1w)*Math.max(0,abw)*bm.fu*d*Tw/GM2/1e3;
  C.push(chk('3','Bearing Resistance — Beam Web','EC3-1-8 Table 3.4 / P358 §5.5 Check 4',[
    `k₁ = ${rd(k1w)}   αb = ${rd(abw,3)}   tw = ${Tw} mm   fu,beam = ${bm.fu} MPa`,
    `Fb,Rd = ${rd(k1w)}×${rd(abw,3)}×${bm.fu}×${d}×${Tw}/1.25 = ${rd(FbwRd)} kN`,
  ],FbwRd,Fr/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1w)}\\times${rd(abw,3)}\\times${bm.fu}\\times${d}\\times${Tw}}{1.25}=${rd(FbwRd)}\\text{ kN}`));

  // 4 — Fin plate gross shear
  const VgRd_p=pm.fy*Hp*Tp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','Fin Plate — Gross Section Shear','EC3-1-1 §6.2.6 / P358 §5.5 Check 5',[
    `Av = hp × tp = ${Hp}×${Tp} = ${Hp*Tp} mm²`,
    `Vpl,Rd = fy×Av/(√3×γM0) = ${pm.fy}×${Hp*Tp}/√3 = ${rd(VgRd_p)} kN`,
  ],VgRd_p,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${pm.fy}\\times${Hp*Tp}}{\\sqrt{3}\\times1.0}=${rd(VgRd_p)}\\text{ kN}`));

  // 5 — Fin plate net shear  [γM2 = 1.1 per EC3-1-1 UK NA — P358 §5.5 Note]
  const Avnet_p=(Hp-nb*d0)*Tp;
  const VnRd_p=.9*pm.fu*Math.max(0,Avnet_p)/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','Fin Plate — Net Section Shear','EC3-1-1 §6.2.6 / P358 §5.5 Check 6',[
    `Anet = (hp − n·d₀)×tp = (${Hp}−${nb}×${d0})×${Tp} = ${Avnet_p} mm²`,
    `Vnet,Rd = 0.9×fu×Anet/(√3×γM2) = 0.9×${pm.fu}×${Math.max(0,Avnet_p)}/(√3×1.1) = ${rd(VnRd_p)} kN`,
    `Note: γM2 = 1.1 per EC3-1-1 UK NA for plate cross-section fracture`,
  ],VnRd_p,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${pm.fu}\\times${Math.max(0,Avnet_p)}}{\\sqrt{3}\\times1.1}=${rd(VnRd_p)}\\text{ kN}`));

  // 6 — Fin plate block shear  [fu term: γM2 = 1.1]
  const Ant_p=Math.max(0,(E2p-d0/2)*Tp),Anv_p=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tp);
  const Veff_p=(pm.fu*Ant_p/GM2s+pm.fy*Anv_p/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','Fin Plate — Block Shear','EC3-1-8 §3.10.2 / P358 §5.5 Check 7',[
    `Ant = (e₂p − d₀/2)×tp = ${rd(Ant_p,0)} mm²   Anv = ${rd(Anv_p,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2 + fy·Anv/(√3·γM0)  (γM2 = 1.1 for plate fracture)`,
    `       = ${rd(pm.fu*Ant_p/GM2s/1e3)} + ${rd(pm.fy*Anv_p/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_p)} kN`,
  ],Veff_p,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${pm.fu}\\times${rd(Ant_p,0)}}{1.1}+\\dfrac{${pm.fy}\\times${rd(Anv_p,0)}}{\\sqrt{3}}=${rd(Veff_p)}\\text{ kN}`));

  // 7 — Fin plate bending due to eccentricity
  const MEd=Vn*a/1e6,Wel=Tp*Hp*Hp/6,MRd=pm.fy*Wel/GM0/1e6;
  C.push(chk('7','Fin Plate — Bending (Eccentricity)','EC3-1-1 §6.2.5 / P358 §5.5 Check 8',[
    `Eccentricity a = Lp − e₂ = ${a} mm`,
    `MEd = V×a = ${rd(Vn/1e3)}×${a}/1000 = ${rd(MEd)} kN·m`,
    `Wel = tp×hp²/6 = ${Tp}×${Hp}²/6 = ${rd(Wel,0)} mm³`,
    `MRd = fy×Wel/γM0 = ${pm.fy}×${rd(Wel,0)}/10⁶ = ${rd(MRd)} kN·m`,
  ],MRd,MEd,'kN·m',`M_{Rd}=\\dfrac{${pm.fy}\\times${rd(Wel,0)}}{\\gamma_{M0}\\times10^6}=${rd(MRd)}\\text{ kN\\cdot m}`));

  // 8 — Fillet weld to support (DIRECT SHEAR ONLY per P358 Appendix C.3)
  // The fin plate weld carries vertical shear V only. The eccentricity moment is
  // resisted by the fin plate in bending (Check 7), NOT transferred back to the weld.
  const fwRd_w=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const tau_w=Vn/(2*Aw*Hp);
  C.push(chk('8','Fillet Weld to Support — Direct Shear','EC3-1-8 §4.5.3 / P358 App.C.3',[
    `Weld leg = ${fv(g.aw)} mm   throat a = ${rd(Aw)} mm   (both sides, length = hp)`,
    `fw,Rd = fu/(√3·βw·γM2) = ${pm.fu}/(√3×${pm.bw}×1.25) = ${rd(fwRd_w,1)} N/mm²`,
    `τ = V/(2·a·hp) = ${rd(Vn/1e3,0)}k/(2×${rd(Aw)}×${Hp}) = ${rd(tau_w,1)} N/mm²`,
    `P358 App.C.3: fin plate weld resists direct shear only — moment is carried`,
    `by the plate in bending (Check 7), not transferred back to the weld.`,
  ],fwRd_w,tau_w,'N/mm²',`f_{w,Rd}=\\dfrac{${pm.fu}}{\\sqrt{3}\\times${pm.bw}\\times1.25}=${rd(fwRd_w,1)}\\text{ N/mm}^2`));

  // 9 — Beam web gross shear (local, at connection zone)
  const Av_bw=Hp*Tw;
  const VgRd_bw=bm.fy*Av_bw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('9','Beam Web — Gross Section Shear (Local)','EC3-1-1 §6.2.6 / P358 §5.5 Check 9',[
    `Local shear area: Av = hp × tw = ${Hp}×${Tw} = ${Av_bw} mm²`,
    `Vpl,Rd = fy,b×Av/(√3×γM0) = ${bm.fy}×${Av_bw}/√3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${bm.fy}\\times${Av_bw}}{\\sqrt{3}\\times1.0}=${rd(VgRd_bw)}\\text{ kN}`));

  // 10 — Beam web net shear  [γM2 = 1.1]
  const Avnet_bw=Math.max(0,(Hp-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('10','Beam Web — Net Section Shear','EC3-1-1 §6.2.6 / P358 §5.5 Check 10',[
    `Anet = (hp − n·d₀)×tw = (${Hp}−${nb}×${d0})×${Tw} = ${Avnet_bw} mm²`,
    `Vnet,Rd = 0.9×fu,b×Anet/(√3×γM2) = 0.9×${bm.fu}×${Avnet_bw}/(√3×1.1) = ${rd(VnRd_bw)} kN`,
    `Note: γM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${bm.fu}\\times${Avnet_bw}}{\\sqrt{3}\\times1.1}=${rd(VnRd_bw)}\\text{ kN}`));

  // 11 — Beam web block shear  [fu term: γM2 = 1.1]
  const Ant_bw=Math.max(0,(E2w-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('11','Beam Web — Block Shear','EC3-1-8 §3.10.2 / P358 §5.5 Check 11',[
    `Ant = (e₂w − d₀/2)×tw = (${E2w}−${d0/2})×${Tw} = ${rd(Ant_bw,0)} mm²`,
    `Anv = (e₁ + (n−1)p₁ − (n−0.5)d₀)×tw = ${rd(Anv_bw,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2 + fy·Anv/(√3·γM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)} + ${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `γM2 = 1.1 for beam web fracture (EC3-1-1 UK NA)`,
  ],Veff_bw,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${bm.fu}\\times${rd(Ant_bw,0)}}{1.1}+\\dfrac{${bm.fy}\\times${rd(Anv_bw,0)}}{\\sqrt{3}}=${rd(Veff_bw)}\\text{ kN}`));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcPDEP(g){
  // Partial Depth End Plate — P358 §4.5
  // Key structural characteristic: connection rotation causes tension in top bolts,
  // so P358 §4.5 Check 2 applies a 0.8 reduction factor to bolt shear capacity.
  const b=BOLT[g.boltSize],pm=MAT[g.platGrade],cm=MAT[g.colGrade],bm=MAT[g.beamGrade];
  const Vn=fv(g.V)*1e3,nb=fi(g.n),P1=fv(g.p1),E1=fv(g.e1),E2=fv(g.e2),Ep=fv(g.ep);
  const Tp=fv(g.tp),Hp=fv(g.hp),Tfc=fv(g.tfc),Tw=fv(g.tw),Aw=.707*fv(g.aw);
  const{d,d0,As}=b,fub=800,Fvd=Vn/nb;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)
  const C=[];

  // 1 — Bolt group shear with 0.8 tension reduction (P358 §4.5 Check 2)
  const FvRd=.6*fub*As/GM2;
  const VRd_bolts = nb * 0.8 * FvRd;   // 0.8 factor per P358: bolts carry combined shear + tension
  C.push(chk('1','Bolt Group — Shear Resistance (with 0.8 Tension Reduction)','EC3-1-8 Table 3.4 / P358 §4.5 Check 2',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mm²`,
    `Fv,Rd = 0.6×${fub}×${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `P358 §4.5: PDEP rotation causes tension in top bolts — 0.8 reduction applied`,
    `VRd = n × 0.8 × Fv,Rd = ${nb} × 0.8 × ${rd(FvRd/1e3)} = ${rd(VRd_bolts/1e3)} kN`,
  ],VRd_bolts/1e3,fv(g.V),'kN',`V_{Rd}=${nb}\\times0.8\\times${rd(FvRd/1e3)}=${rd(VRd_bolts/1e3)}\\text{ kN}`));

  // 2 — Bearing on end plate (demand = direct shear per bolt = V/n)
  const k1p=Math.min(2.8*E2/d0-1.7,2.5);
  const abp=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/pm.fu,1):Math.min(E1/(3*d0),fub/pm.fu,1);
  const FbpRd=Math.max(0,k1p)*Math.max(0,abp)*pm.fu*d*Tp/GM2/1e3;
  C.push(chk('2','Bearing Resistance — End Plate','EC3-1-8 Table 3.4 / P358 §4.5 Check 3',[
    `k₁ = min(2.8×${E2}/${d0}−1.7, 2.5) = ${rd(k1p)}`,
    `αb = ${rd(abp,3)}   tp = ${Tp} mm   fu,plate = ${pm.fu} MPa`,
    `Fb,Rd = ${rd(k1p)}×${rd(abp,3)}×${pm.fu}×${d}×${Tp}/1.25 = ${rd(FbpRd)} kN`,
    `Applied per bolt = V/n = ${rd(Fvd/1e3)} kN`,
  ],FbpRd,Fvd/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1p)}\\times${rd(abp,3)}\\times${pm.fu}\\times${d}\\times${Tp}}{1.25}=${rd(FbpRd)}\\text{ kN}`));

  // 3 — Bearing on column flange
  const k1c=Math.min(2.8*E2/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing Resistance — Column Flange','EC3-1-8 Table 3.4 / P358 §4.5 Check 4',[
    `k₁ = ${rd(k1c)}   αb = ${rd(abc,3)}   tfc = ${Tfc} mm   fu,col = ${cm.fu} MPa`,
    `Fb,Rd = ${rd(FbcRd)} kN   Applied per bolt = ${rd(Fvd/1e3)} kN`,
  ],FbcRd,Fvd/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1c)}\\times${rd(abc,3)}\\times${cm.fu}\\times${d}\\times${Tfc}}{1.25}=${rd(FbcRd)}\\text{ kN}`));

  // 4 — End plate gross shear
  const VgRd_p=pm.fy*Hp*Tp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','End Plate — Gross Section Shear','EC3-1-1 §6.2.6 / P358 §4.5 Check 5',[
    `Av = hp × tp = ${Hp}×${Tp} = ${Hp*Tp} mm²`,
    `Vpl,Rd = ${pm.fy}×${Hp*Tp}/√3 = ${rd(VgRd_p)} kN`,
  ],VgRd_p,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${pm.fy}\\times${Hp*Tp}}{\\sqrt{3}\\times1.0}=${rd(VgRd_p)}\\text{ kN}`));

  // 5 — End plate net shear [γM2 = 1.1 per EC3-1-1 UK NA]
  const Avnet_p=Math.max(0,(Hp-nb*d0)*Tp);
  const VnRd_p=.9*pm.fu*Avnet_p/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','End Plate — Net Section Shear','EC3-1-1 §6.2.6 / P358 §4.5 Check 6',[
    `Anet = (${Hp} − ${nb}×${d0}) × ${Tp} = ${Avnet_p} mm²`,
    `Vnet,Rd = 0.9×${pm.fu}×${Avnet_p}/(√3×1.1) = ${rd(VnRd_p)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],VnRd_p,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${pm.fu}\\times${Avnet_p}}{\\sqrt{3}\\times1.1}=${rd(VnRd_p)}\\text{ kN}`));

  // 6 — End plate block shear [fu term: γM2 = 1.1]
  const Ant_p=Math.max(0,(E2-d0/2)*Tp);
  const Anv_p=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tp);
  const Veff_p=(pm.fu*Ant_p/GM2s+pm.fy*Anv_p/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','End Plate — Block Shear','EC3-1-8 §3.10.2 / P358 §4.5 Check 7',[
    `Ant = (e₂ − d₀/2)×tp = (${E2}−${d0/2})×${Tp} = ${rd(Ant_p,0)} mm²`,
    `Anv = (e₁+(n−1)p₁−(n−0.5)d₀)×tp = ${rd(Anv_p,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2 + fy·Anv/(√3·γM0) = ${rd(pm.fu*Ant_p/GM2s/1e3)} + ${rd(pm.fy*Anv_p/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_p)} kN`,
    `γM2 = 1.1 for plate cross-section fracture (EC3-1-1 UK NA)`,
  ],Veff_p,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${pm.fu}\\times${rd(Ant_p,0)}}{1.1}+\\dfrac{${pm.fy}\\times${rd(Anv_p,0)}}{\\sqrt{3}}=${rd(Veff_p)}\\text{ kN}`));

  // 7 — End plate bending (coexisting moment from bolt eccentricity)
  // P358 §4.5 Check 9: low shear (VEd ≤ 0.5 Vpl,Rd) — check moment separately.
  // High shear case: reduced moment capacity. We show both for completeness.
  const MEd_p=Vn*Ep/1e6;
  const Wel_p=Tp*Hp*Hp/6;
  const MRd_p=pm.fy*Wel_p/GM0/1e6;
  const isLowShear = fv(g.V) <= 0.5*VgRd_p;
  C.push(chk('7','End Plate — Bending (Coexisting Moment)','EC3-1-1 §6.2.5 / P358 §4.5 Check 9',[
    `e = bolt CL to beam web = ${Ep} mm`,
    `MEd = V×e = ${rd(Vn/1e3)}×${Ep}/1000 = ${rd(MEd_p)} kN·m`,
    `Wel = tp×hp²/6 = ${Tp}×${Hp}²/6 = ${rd(Wel_p,0)} mm³`,
    `MRd = fy×Wel/γM0 = ${rd(MRd_p)} kN·m`,
    `VEd/Vpl,Rd = ${rd(fv(g.V)/VgRd_p,3)} → ${isLowShear?'LOW shear: M and V checked separately (OK)':'HIGH shear: moment capacity reduced — check interaction'}`,
  ],MRd_p,MEd_p,'kN·m',`M_{Rd}=\\dfrac{${pm.fy}\\times${rd(Wel_p,0)}}{\\gamma_{M0}\\times10^6}=${rd(MRd_p)}\\text{ kN\\cdot m}`));

  // 8 — Weld to beam web (full-strength per P358 App. C.2 — direct shear only)
  const fwRd_p=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const fwRd_b=bm.fu/(Math.sqrt(3)*bm.bw*GM2);
  const fwRd=Math.min(fwRd_p,fwRd_b);
  const tau_w=Vn/(2*Aw*Hp);
  C.push(chk('8','Fillet Weld to Beam Web — Shear','EC3-1-8 §4.5.3 / P358 App. C.2',[
    `Leg = ${fv(g.aw)} mm   throat a = ${rd(Aw)} mm   (both sides, length = hp)`,
    `fw,Rd = min(fu,plate, fu,beam)/(√3·βw·γM2) = min(${rd(fwRd_p,1)}, ${rd(fwRd_b,1)}) = ${rd(fwRd,1)} N/mm²`,
    `τ = V/(2·a·hp) = ${rd(Vn/1e3,0)}k/(2×${rd(Aw)}×${Hp}) = ${rd(tau_w,1)} N/mm²`,
    `P358 App. C.2: end plate weld is full-strength — direct shear only governs`,
  ],fwRd,tau_w,'N/mm²',`f_{w,Rd}=\\dfrac{${Math.min(pm.fu,bm.fu)}}{\\sqrt{3}\\times${fwRd===fwRd_p?pm.bw:bm.bw}\\times1.25}=${rd(fwRd,1)}\\text{ N/mm}^2`));

  // 9 — Beam web gross shear (local at connection zone)
  const VgRd_bw=bm.fy*Hp*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('9','Beam Web — Gross Section Shear (Local)','EC3-1-1 §6.2.6 / P358 §4.5 Check 10',[
    `Local shear area: Av = hp × tw = ${Hp}×${Tw} = ${Hp*Tw} mm²`,
    `Vpl,Rd = ${bm.fy}×${Hp*Tw}/√3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${bm.fy}\\times${Hp*Tw}}{\\sqrt{3}\\times1.0}=${rd(VgRd_bw)}\\text{ kN}`));

  // 10 — Beam web net shear [γM2 = 1.1]
  const Avnet_bw=Math.max(0,(Hp-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('10','Beam Web — Net Section Shear','EC3-1-1 §6.2.6 / P358 §4.5 Check 11',[
    `Anet = (${Hp}−${nb}×${d0})×${Tw} = ${Avnet_bw} mm²`,
    `Vnet,Rd = 0.9×${bm.fu}×${Avnet_bw}/(√3×1.1) = ${rd(VnRd_bw)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${bm.fu}\\times${Avnet_bw}}{\\sqrt{3}\\times1.1}=${rd(VnRd_bw)}\\text{ kN}`));

  // 11 — Beam web block shear [γM2 = 1.1]
  const Ant_bw=Math.max(0,(E2-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('11','Beam Web — Block Shear','EC3-1-8 §3.10.2 / P358 §4.5 Check 12',[
    `Ant = (e₂−d₀/2)×tw = ${rd(Ant_bw,0)} mm²   Anv = ${rd(Anv_bw,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2 + fy·Anv/(√3·γM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)} + ${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `γM2 = 1.1 for beam web fracture (EC3-1-1 UK NA)`,
  ],Veff_bw,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${bm.fu}\\times${rd(Ant_bw,0)}}{1.1}+\\dfrac{${bm.fy}\\times${rd(Anv_bw,0)}}{\\sqrt{3}}=${rd(Veff_bw)}\\text{ kN}`));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcFDEP(g){
  // Full Depth End Plate — P358 §4.7
  // Plate welded to beam web AND both flanges. Web weld carries shear;
  // flange welds carry the moment couple from eccentricity.
  // Like PDEP, the 0.8 bolt reduction applies (coexisting tension from rotation).
  const b=BOLT[g.boltSize],pm=MAT[g.platGrade],cm=MAT[g.colGrade],bm=MAT[g.beamGrade];
  const Vn=fv(g.V)*1e3,nb=fi(g.n),P1=fv(g.p1),E1=fv(g.e1),E2=fv(g.e2),Ep=fv(g.ep);
  const Tp=fv(g.tp),D=fv(g.d),Tw=fv(g.tw),Tf=fv(g.tf),Bf=fv(g.bf),Tfc=fv(g.tfc);
  const Hp=D;
  const dw=D-2*Tf;     // clear web depth
  const ds=D-Tf;       // lever arm: flange CL to flange CL ≈ d−tf
  const Aw_w=.707*fv(g.aww);
  const Aw_f=.707*fv(g.awf);
  const{d,d0,As}=b,fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)
  const C=[];

  // 1 — Bolt group shear with 0.8 reduction (P358 §4.7 Check 2)
  // AD370 / P358 page 76 confirms FDEP uses same 0.8 reduction as PDEP.
  const FvRd=.6*fub*As/GM2;
  const VRd_bolts = nb * 0.8 * FvRd;
  C.push(chk('1','Bolt Group — Shear Resistance (0.8 Tension Reduction)','EC3-1-8 Table 3.4 / P358 §4.7 Check 2',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mm²`,
    `Fv,Rd = 0.6×${fub}×${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `FDEP rotation induces tension in bolts — 0.8 reduction per P358 §4.7 (same as PDEP)`,
    `VRd = n × 0.8 × Fv,Rd = ${nb} × 0.8 × ${rd(FvRd/1e3)} = ${rd(VRd_bolts/1e3)} kN`,
  ],VRd_bolts/1e3,fv(g.V),'kN',`V_{Rd}=${nb}\\times0.8\\times${rd(FvRd/1e3)}=${rd(VRd_bolts/1e3)}\\text{ kN}`));

  // 2 — Bearing on end plate (demand = V/n per bolt)
  const Fvd=Vn/nb;
  const k1p=Math.min(2.8*E2/d0-1.7,2.5);
  const abp=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/pm.fu,1):Math.min(E1/(3*d0),fub/pm.fu,1);
  const FbpRd=Math.max(0,k1p)*Math.max(0,abp)*pm.fu*d*Tp/GM2/1e3;
  C.push(chk('2','Bearing Resistance — End Plate','EC3-1-8 Table 3.4 / P358 §4.7 Check 3',[
    `k₁ = ${rd(k1p)}  αb = ${rd(abp,3)}  tp = ${Tp} mm  fu,plate = ${pm.fu} MPa`,
    `Fb,Rd = ${rd(FbpRd)} kN   Applied per bolt = V/n = ${rd(Fvd/1e3)} kN`,
  ],FbpRd,Fvd/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1p)}\\times${rd(abp,3)}\\times${pm.fu}\\times${d}\\times${Tp}}{1.25}=${rd(FbpRd)}\\text{ kN}`));

  // 3 — Bearing on column flange
  const k1c=Math.min(2.8*E2/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing Resistance — Column Flange','EC3-1-8 Table 3.4 / P358 §4.7 Check 4',[
    `k₁ = ${rd(k1c)}  αb = ${rd(abc,3)}  tfc = ${Tfc} mm  fu,col = ${cm.fu} MPa`,
    `Fb,Rd = ${rd(FbcRd)} kN   Applied per bolt = ${rd(Fvd/1e3)} kN`,
  ],FbcRd,Fvd/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1c)}\\times${rd(abc,3)}\\times${cm.fu}\\times${d}\\times${Tfc}}{1.25}=${rd(FbcRd)}\\text{ kN}`));

  // 4 — End plate gross shear (full depth = beam depth D)
  const VgRd_p=pm.fy*Hp*Tp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','End Plate — Gross Section Shear','EC3-1-1 §6.2.6 / P358 §4.7 Check 5',[
    `hp = d = ${D} mm  (full beam depth)`,
    `Av = hp × tp = ${D}×${Tp} = ${D*Tp} mm²`,
    `Vpl,Rd = ${pm.fy}×${D*Tp}/(√3×1.0) = ${rd(VgRd_p)} kN`,
  ],VgRd_p,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${pm.fy}\\times${D*Tp}}{\\sqrt{3}\\times1.0}=${rd(VgRd_p)}\\text{ kN}`));

  // 5 — End plate net shear [γM2 = 1.1 per EC3-1-1 UK NA]
  const Avnet_p=Math.max(0,(Hp-nb*d0)*Tp);
  const VnRd_p=.9*pm.fu*Avnet_p/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','End Plate — Net Section Shear','EC3-1-1 §6.2.6 / P358 §4.7 Check 6',[
    `Anet = (${D}−${nb}×${d0})×${Tp} = ${Avnet_p} mm²`,
    `Vnet,Rd = 0.9×${pm.fu}×${Avnet_p}/(√3×1.1) = ${rd(VnRd_p)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],VnRd_p,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${pm.fu}\\times${Avnet_p}}{\\sqrt{3}\\times1.1}=${rd(VnRd_p)}\\text{ kN}`));

  // 6 — End plate block shear [fu term: γM2 = 1.1]
  const Ant_p=Math.max(0,(E2-d0/2)*Tp);
  const Anv_p=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tp);
  const Veff_p=(pm.fu*Ant_p/GM2s+pm.fy*Anv_p/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','End Plate — Block Shear','EC3-1-8 §3.10.2 / P358 §4.7 Check 7',[
    `Ant = (e₂−d₀/2)×tp = (${E2}−${d0/2})×${Tp} = ${rd(Ant_p,0)} mm²`,
    `Anv = (e₁+(n−1)p₁−(n−0.5)d₀)×tp = ${rd(Anv_p,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2 + fy·Anv/(√3·γM0)  (γM2 = 1.1)`,
    `       = ${rd(pm.fu*Ant_p/GM2s/1e3)} + ${rd(pm.fy*Anv_p/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_p)} kN`,
  ],Veff_p,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${pm.fu}\\times${rd(Ant_p,0)}}{1.1}+\\dfrac{${pm.fy}\\times${rd(Anv_p,0)}}{\\sqrt{3}}=${rd(Veff_p)}\\text{ kN}`));

  // 7 — End plate bending (eccentricity from bolt CL to web weld face)
  // P358 §4.7: flange welds restrain plate rotation, so plate bending check is
  // on the web strip: MEd = V×e; MRd = fy×Wel (using full plate hp is conservative)
  const MEd_p=Vn*Ep/1e6;
  const Wel_p=Tp*Hp*Hp/6;
  const MRd_p=pm.fy*Wel_p/GM0/1e6;
  C.push(chk('7','End Plate — Bending (Eccentricity)','EC3-1-1 §6.2.5 / P358 §4.7 Check 8',[
    `e (bolt CL → beam web) = ${Ep} mm`,
    `MEd = V×e = ${rd(Vn/1e3)}×${Ep}/1000 = ${rd(MEd_p)} kN·m`,
    `Wel = tp×hp²/6 = ${Tp}×${D}²/6 = ${rd(Wel_p,0)} mm³  (hp = d = ${D} mm, conservative)`,
    `MRd = fy×Wel/γM0 = ${rd(MRd_p)} kN·m`,
    `Flange welds restrain rotation — conservative to use full plate section modulus`,
  ],MRd_p,MEd_p,'kN·m',`M_{Rd}=\\dfrac{${pm.fy}\\times${rd(Wel_p,0)}}{\\gamma_{M0}\\times10^6}=${rd(MRd_p)}\\text{ kN\\cdot m}`));

  // 8 — Web fillet weld (direct shear only; moment taken by flange welds)
  const fwRd_wp=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const fwRd_wb=bm.fu/(Math.sqrt(3)*bm.bw*GM2);
  const fwRd_w=Math.min(fwRd_wp,fwRd_wb);
  const tau_w=Vn/(2*Aw_w*dw);
  C.push(chk('8','Web Fillet Weld — Direct Shear','EC3-1-8 §4.5.3 / P358 §4.7 / App.C.2',[
    `Web weld leg = ${fv(g.aww)} mm  throat = ${rd(Aw_w)} mm  (both sides)`,
    `Clear web: dw = d−2tf = ${D}−${2*Tf} = ${rd(dw,0)} mm`,
    `fw,Rd = min(${rd(fwRd_wp,1)}, ${rd(fwRd_wb,1)}) = ${rd(fwRd_w,1)} N/mm²  (weaker part governs)`,
    `τ = V/(2·a·dw) = ${rd(Vn/1e3,0)}k/(2×${rd(Aw_w)}×${rd(dw,0)}) = ${rd(tau_w,1)} N/mm²`,
    `Web welds: shear only — moment couple carried by flange welds (Check 9)`,
  ],fwRd_w,tau_w,'N/mm²',`f_{w,Rd}=\\dfrac{${Math.min(pm.fu,bm.fu)}}{\\sqrt{3}\\times${fwRd_w===fwRd_wp?pm.bw:bm.bw}\\times1.25}=${rd(fwRd_w,1)}\\text{ N/mm}^2`));

  // 9 — Flange fillet weld (horizontal force couple from coexisting moment)
  const Ffl=Vn*Ep/ds;
  const fwRd_fp=pm.fu/(Math.sqrt(3)*pm.bw*GM2);
  const fwRd_fb=bm.fu/(Math.sqrt(3)*bm.bw*GM2);
  const fwRd_f=Math.min(fwRd_fp,fwRd_fb);
  const F_fl_Rd=fwRd_f*Aw_f*Bf;
  C.push(chk('9','Flange Fillet Weld — Horizontal Force Couple','EC3-1-8 §4.5.3 / P358 §4.7 Check 9',[
    `Flange weld leg = ${fv(g.awf)} mm  throat = ${rd(Aw_f)} mm  length = bf = ${Bf} mm`,
    `Lever arm: ds = d−tf = ${D}−${Tf} = ${rd(ds,0)} mm`,
    `F_fl = V·e/ds = ${rd(Vn/1e3,0)}k×${Ep}/${rd(ds,0)} = ${rd(Ffl/1e3)} kN per flange`,
    `fw,Rd = ${rd(fwRd_f,1)} N/mm²  →  F_fl,Rd = fw,Rd×a×bf = ${rd(fwRd_f,1)}×${rd(Aw_f)}×${Bf}/1000 = ${rd(F_fl_Rd/1e3)} kN`,
  ],F_fl_Rd/1e3,Ffl/1e3,'kN',`F_{fl,Rd}=f_{w,Rd}\\times a_f\\times b_f=${rd(fwRd_f,1)}\\times${rd(Aw_f)}\\times${Bf}/1000=${rd(F_fl_Rd/1e3)}\\text{ kN}`));

  // 10 — Beam web gross shear (local at connection zone)
  const VgRd_bw=bm.fy*Hp*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('10','Beam Web — Gross Section Shear (Local)','EC3-1-1 §6.2.6 / P358 §4.7 Check 10',[
    `Av = hp × tw = ${Hp}×${Tw} = ${Hp*Tw} mm²  (hp = d = full beam depth)`,
    `Vpl,Rd = ${bm.fy}×${Hp*Tw}/√3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${bm.fy}\\times${Hp*Tw}}{\\sqrt{3}\\times1.0}=${rd(VgRd_bw)}\\text{ kN}`));

  // 11 — Beam web net shear [γM2 = 1.1]
  const Avnet_bw=Math.max(0,(Hp-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('11','Beam Web — Net Section Shear','EC3-1-1 §6.2.6 / P358 §4.7 Check 11',[
    `Anet = (${Hp}−${nb}×${d0})×${Tw} = ${Avnet_bw} mm²`,
    `Vnet,Rd = 0.9×${bm.fu}×${Avnet_bw}/(√3×1.1) = ${rd(VnRd_bw)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${bm.fu}\\times${Avnet_bw}}{\\sqrt{3}\\times1.1}=${rd(VnRd_bw)}\\text{ kN}`));

  // 12 — Beam web block shear [γM2 = 1.1]
  const Ant_bw=Math.max(0,(E2-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('12','Beam Web — Block Shear','EC3-1-8 §3.10.2 / P358 §4.7 Check 12',[
    `Ant = (e₂−d₀/2)×tw = ${rd(Ant_bw,0)} mm²   Anv = ${rd(Anv_bw,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2 + fy·Anv/(√3·γM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)} + ${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `γM2 = 1.1 for beam web fracture (EC3-1-1 UK NA)`,
  ],Veff_bw,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${bm.fu}\\times${rd(Ant_bw,0)}}{1.1}+\\dfrac{${bm.fy}\\times${rd(Anv_bw,0)}}{\\sqrt{3}}=${rd(Veff_bw)}\\text{ kN}`));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcDCleat(g){
  // Double Web Cleat — EC3-1-8 / ECCS Pub.126 (NOT P358 — web cleats not in P358)
  // Two angle cleats: outstanding legs bolted to column, web legs bolted to beam web.
  // Support bolt group: n bolts per cleat, each cleat carries V/2 with eccentricity e2s.
  // Web bolt group: 2n total bolts, concentric shear V.
  const b=BOLT[g.boltSize], cm=MAT[g.colGrade], bm=MAT[g.beamGrade], cl=MAT[g.cleatGrade];
  const Vn=fv(g.V)*1e3, nb=fi(g.n);
  const P1=fv(g.p1), E1=fv(g.e1), E2s=fv(g.e2s), E2w=fv(g.e2w);
  const Tc=fv(g.tc), Tw=fv(g.tw), Tfc=fv(g.tfc);
  const {d,d0,As}=b, fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)
  const hc = E1 + (nb-1)*P1 + E1;

  // Support bolt group — elastic Iy analysis (each cleat V/2, eccentricity e2s)
  let Iy=0;
  for(let i=0;i<nb;i++){const y=i*P1-(nb-1)*P1/2; Iy+=y*y;}
  const ym=(nb-1)*P1/2;
  const Vs=Vn/2, Ms=Vs*E2s, Fvd_s=Vs/nb;
  const Fhm_s=Iy>0?Ms*ym/Iy:0, Fr_s=Math.sqrt(Fvd_s**2+Fhm_s**2);

  const C=[];
  const FvRd=.6*fub*As/GM2;

  // 1 — Support bolt shear (elastic bolt group, per cleat)
  C.push(chk('1','Support Bolts — Shear Resistance (per cleat)','EC3-1-8 Table 3.4 / P358 §8.3',[
    `Each cleat carries V/2 = ${rd(Vn/2e3)} kN with eccentricity e₂_s = ${E2s} mm`,
    `Fv,Rd = 0.6×800×${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    nb>1?`Iy = ${rd(Iy,0)} mm²  ymax = ${ym} mm  Ms = V/2 × e₂_s = ${rd(Ms/1e6)} kN·m`:`Single bolt`,
    `F_direct = ${rd(Fvd_s/1e3)} kN↓   F_moment = ${rd(Fhm_s/1e3)} kN→`,
    `F_resultant = √(${rd(Fvd_s/1e3)}²+${rd(Fhm_s/1e3)}²) = ${rd(Fr_s/1e3)} kN`,
  ],FvRd/1e3,Fr_s/1e3,'kN',`F_{v,Rd}=\\dfrac{0.6\\times800\\times${As}}{1.25}=${rd(FvRd/1e3)}\\text{ kN/bolt}`));

  // 2 — Bearing on outstanding cleat leg (γM2 = 1.25 for bolt bearing)
  const k1s=Math.min(2.8*E2s/d0-1.7,2.5);
  const abs_=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbsRd=Math.max(0,k1s)*Math.max(0,abs_)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('2','Bearing — Outstanding Cleat Leg (support bolts)','EC3-1-8 Table 3.4 / P358 §8.3',[
    `k₁ = min(2.8×${E2s}/${d0}−1.7, 2.5) = ${rd(k1s)}`,
    `αb = ${rd(abs_,3)}   tc = ${Tc} mm   fu,cleat = ${cl.fu} MPa`,
    `Fb,Rd = ${rd(k1s)}×${rd(abs_,3)}×${cl.fu}×${d}×${Tc}/1.25 = ${rd(FbsRd)} kN`,
  ],FbsRd,Fr_s/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1s)}\\times${rd(abs_,3)}\\times${cl.fu}\\times${d}\\times${Tc}}{1.25}=${rd(FbsRd)}\\text{ kN}`));

  // 3 — Bearing on column flange
  const k1c=Math.min(2.8*E2s/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing — Column Flange','EC3-1-8 Table 3.4 / P358 §8.3',[
    `k₁ = ${rd(k1c)}   αb = ${rd(abc,3)}   tfc = ${Tfc} mm`,
    `Fb,Rd = ${rd(FbcRd)} kN`,
  ],FbcRd,Fr_s/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1c)}\\times${rd(abc,3)}\\times${cm.fu}\\times${d}\\times${Tfc}}{1.25}=${rd(FbcRd)}\\text{ kN}`));

  // 4 — Web bolt shear (2 cleats × n bolts, concentric)
  const FvRd_web_total=2*nb*FvRd;
  C.push(chk('4','Web Bolts — Total Shear Resistance (2 cleats)','EC3-1-8 Table 3.4 / P358 §8.3',[
    `Web bolts concentric: 2 cleats × ${nb} bolts = ${2*nb} total`,
    `Fv,Rd,total = ${2*nb} × ${rd(FvRd/1e3)} = ${rd(FvRd_web_total/1e3)} kN`,
  ],FvRd_web_total/1e3,fv(g.V),'kN',`F_{v,Rd,tot}=${2*nb}\\times${rd(FvRd/1e3)}=${rd(FvRd_web_total/1e3)}\\text{ kN}`));

  // 5 — Bearing on web cleat leg
  const Fvd_w=Vn/(2*nb);
  const k1w=Math.min(2.8*E2w/d0-1.7,2.5);
  const abw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbwcRd=Math.max(0,k1w)*Math.max(0,abw)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('5','Bearing — Web Cleat Leg (web bolts)','EC3-1-8 Table 3.4 / P358 §8.3',[
    `Force per web bolt: V/(2n) = ${rd(Fvd_w/1e3)} kN`,
    `k₁ = ${rd(k1w)}   αb = ${rd(abw,3)}   Fb,Rd = ${rd(FbwcRd)} kN`,
  ],FbwcRd,Fvd_w/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1w)}\\times${rd(abw,3)}\\times${cl.fu}\\times${d}\\times${Tc}}{1.25}=${rd(FbwcRd)}\\text{ kN}`));

  // 6 — Bearing on beam web
  const k1bw=Math.min(2.8*E2w/d0-1.7,2.5);
  const ab_bw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbbwRd=Math.max(0,k1bw)*Math.max(0,ab_bw)*bm.fu*d*Tw/GM2/1e3;
  C.push(chk('6','Bearing — Beam Web (web bolts)','EC3-1-8 Table 3.4 / P358 §8.3',[
    `k₁ = ${rd(k1bw)}   αb = ${rd(ab_bw,3)}   tw = ${Tw} mm`,
    `Fb,Rd = ${rd(FbbwRd)} kN   Applied = ${rd(Fvd_w/1e3)} kN`,
  ],FbbwRd,Fvd_w/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1bw)}\\times${rd(ab_bw,3)}\\times${bm.fu}\\times${d}\\times${Tw}}{1.25}=${rd(FbbwRd)}\\text{ kN}`));

  // 7 — Cleat gross section shear (per cleat, demand = V/2)
  const VgRd=cl.fy*hc*Tc/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('7','Cleat — Gross Section Shear (per cleat)','EC3-1-1 §6.2.6 / P358 §8.4',[
    `hc = e₁+(n−1)p₁+e₁ = ${E1}+${(nb-1)*P1}+${E1} = ${hc} mm`,
    `Av = hc×tc = ${hc}×${Tc} = ${hc*Tc} mm²`,
    `Vpl,Rd = ${cl.fy}×${hc*Tc}/√3 = ${rd(VgRd)} kN   Applied = V/2 = ${rd(fv(g.V)/2)} kN`,
  ],VgRd,fv(g.V)/2,'kN',`V_{pl,Rd}=\\dfrac{${cl.fy}\\times${hc*Tc}}{\\sqrt{3}\\times1.0}=${rd(VgRd)}\\text{ kN}`));

  // 8 — Cleat net section shear [γM2 = 1.1 per EC3-1-1 UK NA]
  const Avnet=Math.max(0,(hc-nb*d0)*Tc);
  const VnRd=.9*cl.fu*Avnet/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('8','Cleat — Net Section Shear (per cleat)','EC3-1-1 §6.2.6 / P358 §8.4',[
    `Anet = (hc−n·d₀)×tc = (${hc}−${nb}×${d0})×${Tc} = ${Avnet} mm²`,
    `Vnet,Rd = 0.9×${cl.fu}×${Avnet}/(√3×1.1) = ${rd(VnRd)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA (cleat cross-section fracture)`,
  ],VnRd,fv(g.V)/2,'kN',`V_{net,Rd}=\\dfrac{0.9\\times${cl.fu}\\times${Avnet}}{\\sqrt{3}\\times1.1}=${rd(VnRd)}\\text{ kN}`));

  // 9 — Cleat block shear (per cleat) [fu term: γM2 = 1.1]
  const Ant_c=Math.max(0,(E2s-d0/2)*Tc);
  const Anv_c=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tc);
  const Veff_c=(cl.fu*Ant_c/GM2s+cl.fy*Anv_c/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('9','Cleat — Block Shear (per cleat)','EC3-1-8 §3.10.2 / P358 §8.4',[
    `Ant = (e₂_s−d₀/2)×tc = (${E2s}−${d0/2})×${Tc} = ${rd(Ant_c,0)} mm²`,
    `Anv = (e₁+(n−1)p₁−(n−0.5)d₀)×tc = ${rd(Anv_c,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2+fy·Anv/(√3·γM0)  (γM2 = 1.1)`,
    `       = ${rd(cl.fu*Ant_c/GM2s/1e3)}+${rd(cl.fy*Anv_c/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_c)} kN`,
  ],Veff_c,fv(g.V)/2,'kN',`V_{eff,Rd}=\\dfrac{${cl.fu}\\times${rd(Ant_c,0)}}{1.1}+\\dfrac{${cl.fy}\\times${rd(Anv_c,0)}}{\\sqrt{3}}=${rd(Veff_c)}\\text{ kN}`));

  // 10 — Outstanding leg bending (PLASTIC strip — P358 §8.4)
  // P358 uses the plastic section modulus of a plate strip of width p1_eff:
  //   Wpl = tc² × p1_eff / 4   (plastic, not tc²p/6 elastic)
  // The cantilever moment at the angle heel = Fh_crit × e2s
  const Fh_crit=Iy>0?Ms*ym/Iy:Vs/nb;
  const MEd_leg=Fh_crit*E2s;
  const p1_eff=nb>1?P1:2*E1;
  const Wpl_leg=Tc*Tc*p1_eff/4;           // PLASTIC strip modulus per P358 §8.4
  const MRd_leg=cl.fy*Wpl_leg/GM0;
  C.push(chk('10','Outstanding Leg — Bending (Plastic Strip)','EC3-1-1 §6.2.5 / P358 §8.4',[
    `Horizontal force on critical bolt: Fh = Ms·ymax/Iy = ${rd(Fhm_s/1e3)} kN`,
    `Cantilever arm = e₂_s = ${E2s} mm`,
    `MEd = Fh × e₂_s = ${rd(Fh_crit/1e3)}×${E2s}/1000 = ${rd(MEd_leg/1e6)} kN·m`,
    `Tributary width per bolt: p₁_eff = ${p1_eff} mm`,
    `P358 §8.4 uses PLASTIC strip modulus: Wpl = tc²×p₁_eff/4 = ${Tc}²×${p1_eff}/4 = ${rd(Wpl_leg,0)} mm³`,
    `MRd = fy×Wpl/γM0 = ${cl.fy}×${rd(Wpl_leg,0)}/10⁶ = ${rd(MRd_leg/1e6)} kN·m`,
  ],MRd_leg/1e6,MEd_leg/1e6,'kN·m',`M_{Rd}=\\dfrac{${cl.fy}\\times${rd(Wpl_leg,0)}}{\\gamma_{M0}\\times10^6}=${rd(MRd_leg/1e6)}\\text{ kN\\cdot m}`));

  // 11 — Beam web gross shear (local at connection zone, height = hc)
  const VgRd_bw=bm.fy*hc*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('11','Beam Web — Gross Section Shear (Local)','EC3-1-1 §6.2.6 / P358 §8.4',[
    `Local shear area: Av = hc×tw = ${hc}×${Tw} = ${hc*Tw} mm²`,
    `Vpl,Rd = ${bm.fy}×${hc*Tw}/√3 = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${bm.fy}\\times${hc*Tw}}{\\sqrt{3}\\times1.0}=${rd(VgRd_bw)}\\text{ kN}`));

  // 12 — Beam web net shear [γM2 = 1.1]
  const Avnet_bw=Math.max(0,(hc-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('12','Beam Web — Net Section Shear','EC3-1-1 §6.2.6 / P358 §8.4',[
    `Anet = (hc−n·d₀)×tw = (${hc}−${nb}×${d0})×${Tw} = ${Avnet_bw} mm²`,
    `Vnet,Rd = 0.9×${bm.fu}×${Avnet_bw}/(√3×1.1) = ${rd(VnRd_bw)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA`,
  ],VnRd_bw,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${bm.fu}\\times${Avnet_bw}}{\\sqrt{3}\\times1.1}=${rd(VnRd_bw)}\\text{ kN}`));

  // 13 — Beam web block shear [γM2 = 1.1]
  const Ant_bw=Math.max(0,(E2w-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('13','Beam Web — Block Shear','EC3-1-8 §3.10.2 / P358 §8.4',[
    `Ant = (e₂w−d₀/2)×tw = ${rd(Ant_bw,0)} mm²   Anv = ${rd(Anv_bw,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2+fy·Anv/(√3·γM0) = ${rd(bm.fu*Ant_bw/GM2s/1e3)}+${rd(bm.fy*Anv_bw/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bw)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA`,
  ],Veff_bw,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${bm.fu}\\times${rd(Ant_bw,0)}}{1.1}+\\dfrac{${bm.fy}\\times${rd(Anv_bw,0)}}{\\sqrt{3}}=${rd(Veff_bw)}\\text{ kN}`));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcSCleat(g){
  // Single Web Cleat — EC3-1-8 / ECCS Pub.126 (NOT P358 — web cleats not in P358)
  // One angle cleat: outstanding leg bolted to column, web leg bolted to beam web.
  // Unlike double cleat, full shear V (not V/2) on a single cleat.
  // Torsion on beam web is a concern — this check covers in-plane behaviour only.
  const b=BOLT[g.boltSize], cm=MAT[g.colGrade], bm=MAT[g.beamGrade], cl=MAT[g.cleatGrade];
  const Vn=fv(g.V)*1e3, nb=fi(g.n);
  const P1=fv(g.p1), E1=fv(g.e1), E2s=fv(g.e2s), E2w=fv(g.e2w);
  const Tc=fv(g.tc), Tw=fv(g.tw), Tfc=fv(g.tfc);
  const {d,d0,As}=b, fub=800;
  const GM2s=1.1;
  const hc=E1+(nb-1)*P1+E1;

  // Support bolt group: single cleat carries FULL V (not V/2) with eccentricity e2s
  let Iy=0;
  for(let i=0;i<nb;i++){const y=i*P1-(nb-1)*P1/2; Iy+=y*y;}
  const ym=(nb-1)*P1/2;
  const Vs=Vn, Ms=Vs*E2s, Fvd_s=Vs/nb;
  const Fhm_s=Iy>0?Ms*ym/Iy:0, Fr_s=Math.sqrt(Fvd_s**2+Fhm_s**2);
  const C=[];
  const FvRd=.6*fub*As/GM2;

  C.push(chk('1','Support Bolts — Shear Resistance (Single Cleat, Full V)','EC3-1-8 Table 3.4 / ECCS Pub.126',[
    `Single cleat: full V = ${rd(Vn/1e3)} kN with eccentricity e₂_s = ${E2s} mm`,
    `(Double cleat would carry V/2; single cleat carries full V — more critical)`,
    `Fv,Rd = 0.6×800×${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `Iy = ${rd(Iy,0)} mm²   ymax = ${ym} mm   Ms = V×e₂_s = ${rd(Ms/1e6)} kN·m`,
    `F_direct = ${rd(Fvd_s/1e3)} kN↓   F_moment = ${rd(Fhm_s/1e3)} kN→`,
    `F_resultant = √(${rd(Fvd_s/1e3)}²+${rd(Fhm_s/1e3)}²) = ${rd(Fr_s/1e3)} kN`,
  ],FvRd/1e3,Fr_s/1e3,'kN',`F_{v,Rd}=\\dfrac{0.6\\times800\\times${As}}{1.25}=${rd(FvRd/1e3)}\\text{ kN/bolt}`));

  const k1s=Math.min(2.8*E2s/d0-1.7,2.5);
  const abs_=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbsRd=Math.max(0,k1s)*Math.max(0,abs_)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('2','Bearing — Outstanding Cleat Leg','EC3-1-8 Table 3.4',[
    `k₁ = ${rd(k1s)}  αb = ${rd(abs_,3)}  Fb,Rd = ${rd(FbsRd)} kN`,
  ],FbsRd,Fr_s/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1s)}\\times${rd(abs_,3)}\\times${cl.fu}\\times${d}\\times${Tc}}{1.25}=${rd(FbsRd)}\\text{ kN}`));

  const k1c=Math.min(2.8*E2s/d0-1.7,2.5);
  const abc=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cm.fu,1):Math.min(E1/(3*d0),fub/cm.fu,1);
  const FbcRd=Math.max(0,k1c)*Math.max(0,abc)*cm.fu*d*Tfc/GM2/1e3;
  C.push(chk('3','Bearing — Column Flange','EC3-1-8 Table 3.4',[
    `k₁ = ${rd(k1c)}  αb = ${rd(abc,3)}  Fb,Rd = ${rd(FbcRd)} kN`,
  ],FbcRd,Fr_s/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1c)}\\times${rd(abc,3)}\\times${cm.fu}\\times${d}\\times${Tfc}}{1.25}=${rd(FbcRd)}\\text{ kN}`));

  // Web bolts: single cleat, n bolts carry V concentrically
  const FvRd_web_total=nb*FvRd;
  C.push(chk('4','Web Bolts — Shear Resistance (n bolts, concentric)','EC3-1-8 Table 3.4',[
    `Single cleat: ${nb} web bolts carry V = ${rd(Vn/1e3)} kN concentrically`,
    `Total Fv,Rd = ${nb}×${rd(FvRd/1e3)} = ${rd(FvRd_web_total/1e3)} kN`,
  ],FvRd_web_total/1e3,fv(g.V),'kN',`F_{v,Rd,tot}=${nb}\\times${rd(FvRd/1e3)}=${rd(FvRd_web_total/1e3)}\\text{ kN}`));

  const Fvd_w=Vn/nb;
  const k1w=Math.min(2.8*E2w/d0-1.7,2.5);
  const abw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/cl.fu,1):Math.min(E1/(3*d0),fub/cl.fu,1);
  const FbwcRd=Math.max(0,k1w)*Math.max(0,abw)*cl.fu*d*Tc/GM2/1e3;
  C.push(chk('5','Bearing — Web Cleat Leg','EC3-1-8 Table 3.4',[
    `V/n = ${rd(Fvd_w/1e3)} kN   Fb,Rd = ${rd(FbwcRd)} kN`,
  ],FbwcRd,Fvd_w/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1w)}\\times${rd(abw,3)}\\times${cl.fu}\\times${d}\\times${Tc}}{1.25}=${rd(FbwcRd)}\\text{ kN}`));

  const k1bw=Math.min(2.8*E2w/d0-1.7,2.5);
  const ab_bw=nb>1?Math.min(E1/(3*d0),P1/(3*d0)-.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbbwRd=Math.max(0,k1bw)*Math.max(0,ab_bw)*bm.fu*d*Tw/GM2/1e3;
  C.push(chk('6','Bearing — Beam Web','EC3-1-8 Table 3.4',[
    `k₁ = ${rd(k1bw)}  αb = ${rd(ab_bw,3)}  Fb,Rd = ${rd(FbbwRd)} kN`,
  ],FbbwRd,Fvd_w/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1bw)}\\times${rd(ab_bw,3)}\\times${bm.fu}\\times${d}\\times${Tw}}{1.25}=${rd(FbbwRd)}\\text{ kN}`));

  // Cleat gross shear — carries full V (single cleat)
  const VgRd=cl.fy*hc*Tc/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('7','Cleat — Gross Section Shear (full V)','EC3-1-1 §6.2.6',[
    `hc = ${hc} mm  Av = ${hc*Tc} mm²  Vpl,Rd = ${rd(VgRd)} kN  Applied = ${rd(fv(g.V))} kN`,
  ],VgRd,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${cl.fy}\\times${hc*Tc}}{\\sqrt{3}\\times1.0}=${rd(VgRd)}\\text{ kN}`));

  const Avnet=Math.max(0,(hc-nb*d0)*Tc);
  const VnRd=.9*cl.fu*Avnet/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('8','Cleat — Net Section Shear','EC3-1-1 §6.2.6',[
    `Anet = (${hc}−${nb}×${d0})×${Tc} = ${Avnet} mm²  Vnet,Rd = ${rd(VnRd)} kN  (γM2=1.1)`,
  ],VnRd,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${cl.fu}\\times${Avnet}}{\\sqrt{3}\\times1.1}=${rd(VnRd)}\\text{ kN}`));

  const Ant_c=Math.max(0,(E2s-d0/2)*Tc);
  const Anv_c=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tc);
  const Veff_c=(cl.fu*Ant_c/GM2s+cl.fy*Anv_c/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('9','Cleat — Block Shear','EC3-1-8 §3.10.2',[
    `Ant = ${rd(Ant_c,0)} mm²  Anv = ${rd(Anv_c,0)} mm²  Veff,Rd = ${rd(Veff_c)} kN  (γM2=1.1)`,
  ],Veff_c,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${cl.fu}\\times${rd(Ant_c,0)}}{1.1}+\\dfrac{${cl.fy}\\times${rd(Anv_c,0)}}{\\sqrt{3}}=${rd(Veff_c)}\\text{ kN}`));

  // Outstanding leg bending — plastic strip (full V on one cleat)
  const Fh_crit=Iy>0?Ms*ym/Iy:Vs/nb;
  const MEd_leg=Fh_crit*E2s;
  const p1_eff=nb>1?P1:2*E1;
  const Wpl_leg=Tc*Tc*p1_eff/4;
  const MRd_leg=cl.fy*Wpl_leg/GM0;
  C.push(chk('10','Outstanding Leg — Bending (Plastic Strip)','EC3-1-1 §6.2.5 / ECCS Pub.126',[
    `Fh = ${rd(Fhm_s/1e3)} kN  e = ${E2s} mm  MEd = ${rd(MEd_leg/1e6)} kN·m`,
    `Wpl = tc²×p/4 = ${Tc}²×${p1_eff}/4 = ${rd(Wpl_leg,0)} mm³  MRd = ${rd(MRd_leg/1e6)} kN·m`,
  ],MRd_leg/1e6,MEd_leg/1e6,'kN·m',`M_{Rd}=\\dfrac{${cl.fy}\\times${rd(Wpl_leg,0)}}{\\gamma_{M0}\\times10^6}=${rd(MRd_leg/1e6)}\\text{ kN\\cdot m}`));

  // Beam web checks
  const VgRd_bw=bm.fy*hc*Tw/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('11','Beam Web — Gross Shear (Local)','EC3-1-1 §6.2.6',[
    `Av = hc×tw = ${hc}×${Tw} = ${hc*Tw} mm²  Vpl,Rd = ${rd(VgRd_bw)} kN`,
  ],VgRd_bw,fv(g.V),'kN',`V_{pl,Rd}=\\dfrac{${bm.fy}\\times${hc*Tw}}{\\sqrt{3}\\times1.0}=${rd(VgRd_bw)}\\text{ kN}`));

  const Avnet_bw=Math.max(0,(hc-nb*d0)*Tw);
  const VnRd_bw=.9*bm.fu*Avnet_bw/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('12','Beam Web — Net Shear','EC3-1-1 §6.2.6',[
    `Anet = ${Avnet_bw} mm²  Vnet,Rd = ${rd(VnRd_bw)} kN  (γM2=1.1)`,
  ],VnRd_bw,fv(g.V),'kN',`V_{net,Rd}=\\dfrac{0.9\\times${bm.fu}\\times${Avnet_bw}}{\\sqrt{3}\\times1.1}=${rd(VnRd_bw)}\\text{ kN}`));

  const Ant_bw=Math.max(0,(E2w-d0/2)*Tw);
  const Anv_bw=Math.max(0,(E1+(nb-1)*P1-(nb-.5)*d0)*Tw);
  const Veff_bw=(bm.fu*Ant_bw/GM2s+bm.fy*Anv_bw/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('13','Beam Web — Block Shear','EC3-1-8 §3.10.2',[
    `Ant = ${rd(Ant_bw,0)} mm²  Anv = ${rd(Anv_bw,0)} mm²  Veff,Rd = ${rd(Veff_bw)} kN  (γM2=1.1)`,
  ],Veff_bw,fv(g.V),'kN',`V_{eff,Rd}=\\dfrac{${bm.fu}\\times${rd(Ant_bw,0)}}{1.1}+\\dfrac{${bm.fy}\\times${rd(Anv_bw,0)}}{\\sqrt{3}}=${rd(Veff_bw)}\\text{ kN}`));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcSplice(g){
  // Column splice — bearing type (P358 §9)
  // Axial load transferred by direct bearing between prepared column end faces.
  // Cover plates resist: (a) shear V_Ed, (b) nominal moment V_Ed × L_cp/2 (P358 §9.3)
  const b=BOLT[g.boltSize], cm=MAT[g.colGrade], pm=MAT[g.platGrade];
  const Nn=fv(g.N)*1e3, Vn=fv(g.V)*1e3;
  const nw=fi(g.nw), nf=fi(g.nf);
  const P1w=fv(g.p1w), E1w=fv(g.e1w), E2w=fv(g.e2w);
  const P1f=fv(g.p1f), E1f=fv(g.e1f), E2f=fv(g.e2f);
  const Bf=fv(g.bf), Tf=fv(g.tf), Tw=fv(g.tw), D=fv(g.d);
  const Tfp=fv(g.tfp), Bfp=fv(g.bfp), Twp=fv(g.twp), Lcp=fv(g.Lcp);
  const {d,d0,As}=b, fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)

  const dw=D-2*Tf;                    // web clear depth
  const hwp=2*E1w+(nw-1)*P1w;         // web plate height
  const Vwp=Vn/2;                     // shear per web plate

  // P358 §9.3: nominal moment lever arm = D - tf (flange plate CL to CL)
  const lever=D-Tf;
  const M_nom=Vn*Lcp/2;               // N·mm
  const Ffl=M_nom/lever;              // axial force in each flange plate pair (N)

  const C=[];

  // 1 — Web plate bolt shear
  const FvRd_wb=.6*fub*As/GM2;
  const FvRd_web_total=2*nw*FvRd_wb;
  C.push(chk('1','Web Plate Bolts — Shear Resistance','EC3-1-8 Table 3.4 / P358 §9.4',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mm²  Fv,Rd=${rd(FvRd_wb/1e3)} kN/bolt`,
    `2 web plates × ${nw} bolts = ${2*nw} bolts total, carry V_Ed = ${rd(Vn/1e3)} kN`,
    `Fv,Rd,total = ${2*nw}×${rd(FvRd_wb/1e3)} = ${rd(FvRd_web_total/1e3)} kN`,
  ],FvRd_web_total/1e3,fv(g.V),'kN',`F_{v,Rd,tot}=${2*nw}\\times${rd(FvRd_wb/1e3)}=${rd(FvRd_web_total/1e3)}\\text{ kN}`));

  // 2 — Bearing on web cover plate
  const Fvd_w=Vn/(2*nw);
  const k1_wp=Math.min(2.8*E2w/d0-1.7,2.5);
  const ab_wp=nw>1?Math.min(E1w/(3*d0),P1w/(3*d0)-.25,fub/pm.fu,1):Math.min(E1w/(3*d0),fub/pm.fu,1);
  const FbwpRd=Math.max(0,k1_wp)*Math.max(0,ab_wp)*pm.fu*d*Twp/GM2/1e3;
  C.push(chk('2','Bearing — Web Cover Plate','EC3-1-8 Table 3.4 / P358 §9.4',[
    `k₁=${rd(k1_wp)}  αb=${rd(ab_wp,3)}  twp=${Twp} mm`,
    `Fb,Rd=${rd(FbwpRd)} kN   Applied per bolt = V/(2nw) = ${rd(Fvd_w/1e3)} kN`,
  ],FbwpRd,Fvd_w/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1_wp)}\\times${rd(ab_wp,3)}\\times${pm.fu}\\times${d}\\times${Twp}}{1.25}=${rd(FbwpRd)}\\text{ kN}`));

  // 3 — Bearing on column web
  const ab_cw=nw>1?Math.min(E1w/(3*d0),P1w/(3*d0)-.25,fub/cm.fu,1):Math.min(E1w/(3*d0),fub/cm.fu,1);
  const FbcwRd=Math.max(0,k1_wp)*Math.max(0,ab_cw)*cm.fu*d*Tw/GM2/1e3;
  C.push(chk('3','Bearing — Column Web','EC3-1-8 Table 3.4 / P358 §9.4',[
    `k₁=${rd(k1_wp)}  αb=${rd(ab_cw,3)}  tw=${Tw} mm`,
    `Fb,Rd=${rd(FbcwRd)} kN   Applied per bolt = ${rd(Fvd_w/1e3)} kN`,
  ],FbcwRd,Fvd_w/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1_wp)}\\times${rd(ab_cw,3)}\\times${cm.fu}\\times${d}\\times${Tw}}{1.25}=${rd(FbcwRd)}\\text{ kN}`));

  // 4 — Web plate gross shear
  const Ag_wp=hwp*Twp;
  const Vg_wpRd=pm.fy*Ag_wp/(Math.sqrt(3)*GM0)/1e3;
  C.push(chk('4','Web Plate — Gross Section Shear','EC3-1-1 §6.2.6 / P358 §9.4',[
    `hwp = 2e₁+(n−1)p₁ = ${hwp} mm`,
    `Av = hwp×twp = ${Ag_wp} mm²`,
    `Vpl,Rd = ${pm.fy}×${Ag_wp}/√3 = ${rd(Vg_wpRd)} kN   Applied per plate = ${rd(Vwp/1e3)} kN`,
  ],Vg_wpRd,Vwp/1e3,'kN',`V_{pl,Rd}=\\dfrac{${pm.fy}\\times${Ag_wp}}{\\sqrt{3}\\times1.0}=${rd(Vg_wpRd)}\\text{ kN}`));

  // 5 — Web plate net shear [γM2 = 1.1 per EC3-1-1 UK NA]
  const An_wp=Math.max(0,(hwp-nw*d0)*Twp);
  const Vn_wpRd=.9*pm.fu*An_wp/(Math.sqrt(3)*GM2s)/1e3;
  C.push(chk('5','Web Plate — Net Section Shear','EC3-1-1 §6.2.6 / P358 §9.4',[
    `Anet = (${hwp}−${nw}×${d0})×${Twp} = ${An_wp} mm²`,
    `Vnet,Rd = 0.9×${pm.fu}×${An_wp}/(√3×1.1) = ${rd(Vn_wpRd)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],Vn_wpRd,Vwp/1e3,'kN',`V_{net,Rd}=\\dfrac{0.9\\times${pm.fu}\\times${An_wp}}{\\sqrt{3}\\times1.1}=${rd(Vn_wpRd)}\\text{ kN}`));

  // 6 — Flange plate bolts (carry nominal moment force)
  // P358 §9.3: M_nom = V_Ed × L_cp/2; lever arm = D - tf (flange CL to flange CL)
  const FvRd_fb=.6*fub*As/GM2;
  const FvRd_fl_total=2*nf*FvRd_fb;
  C.push(chk('6','Flange Plate Bolts — Axial Force (Nominal Moment)','EC3-1-8 Table 3.4 / P358 §9.3',[
    `M_nom = V_Ed × L_cp/2 = ${rd(Vn/1e3)}×${Lcp}/2 = ${rd(M_nom/1e6)} kN·m`,
    `Lever arm = D − tf = ${D}−${Tf} = ${lever} mm  (flange plate CL to CL, per P358 §9.3)`,
    `F_fl = M_nom / lever = ${rd(M_nom/1e6)}×10⁶/${lever} = ${rd(Ffl/1e3)} kN (per flange pair)`,
    `2 flange plates × ${nf} bolts per plate = ${2*nf} bolts per flange`,
    `Fv,Rd,total = ${2*nf}×${rd(FvRd_fb/1e3)} = ${rd(FvRd_fl_total/1e3)} kN`,
  ],FvRd_fl_total/1e3,Ffl/1e3,'kN',`F_{fl}=\\dfrac{M_{nom}}{d-t_f}=\\dfrac{${rd(M_nom/1e6)}\\times10^6}{${lever}}=${rd(Ffl/1e3)}\\text{ kN}`));

  // 7 — Bearing on flange cover plate
  const Fvd_f=Ffl/(2*nf);
  const k1_fp=Math.min(2.8*E2f/d0-1.7,2.5);
  const ab_fp=nf>1?Math.min(E1f/(3*d0),P1f/(3*d0)-.25,fub/pm.fu,1):Math.min(E1f/(3*d0),fub/pm.fu,1);
  const FbfpRd=Math.max(0,k1_fp)*Math.max(0,ab_fp)*pm.fu*d*Tfp/GM2/1e3;
  C.push(chk('7','Bearing — Flange Cover Plate','EC3-1-8 Table 3.4 / P358 §9.4',[
    `k₁=${rd(k1_fp)}  αb=${rd(ab_fp,3)}  tfp=${Tfp} mm`,
    `Fb,Rd=${rd(FbfpRd)} kN   Applied per bolt = F_fl/(2nf) = ${rd(Fvd_f/1e3)} kN`,
  ],FbfpRd,Fvd_f/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1_fp)}\\times${rd(ab_fp,3)}\\times${pm.fu}\\times${d}\\times${Tfp}}{1.25}=${rd(FbfpRd)}\\text{ kN}`));

  // 8 — Bearing on column flange
  const ab_cf=nf>1?Math.min(E1f/(3*d0),P1f/(3*d0)-.25,fub/cm.fu,1):Math.min(E1f/(3*d0),fub/cm.fu,1);
  const FbcfRd=Math.max(0,k1_fp)*Math.max(0,ab_cf)*cm.fu*d*Tf/GM2/1e3;
  C.push(chk('8','Bearing — Column Flange','EC3-1-8 Table 3.4 / P358 §9.4',[
    `k₁=${rd(k1_fp)}  αb=${rd(ab_cf,3)}  tf=${Tf} mm`,
    `Fb,Rd=${rd(FbcfRd)} kN   Applied per bolt = ${rd(Fvd_f/1e3)} kN`,
  ],FbcfRd,Fvd_f/1e3,'kN',`F_{b,Rd}=\\dfrac{${rd(k1_fp)}\\times${rd(ab_cf,3)}\\times${cm.fu}\\times${d}\\times${Tf}}{1.25}=${rd(FbcfRd)}\\text{ kN}`));

  // 9 — Flange plate gross tension
  const Ag_fp=2*Bfp*Tfp;
  const NplRd_fp=pm.fy*Ag_fp/GM0/1e3;
  C.push(chk('9','Flange Plates — Gross Tension (pair)','EC3-1-1 §6.2.3 / P358 §9.4',[
    `2 plates per flange (one each side): Ag = 2×${Bfp}×${Tfp} = ${Ag_fp} mm²`,
    `Npl,Rd = fy×Ag/γM0 = ${pm.fy}×${Ag_fp}/1.0/1000 = ${rd(NplRd_fp)} kN`,
    `Applied: F_fl = ${rd(Ffl/1e3)} kN`,
  ],NplRd_fp,Ffl/1e3,'kN',`N_{pl,Rd}=\\dfrac{${pm.fy}\\times${Ag_fp}}{\\gamma_{M0}\\times1000}=${rd(NplRd_fp)}\\text{ kN}`));

  // 10 — Flange plate NET tension [γM2 = 1.1, deduct 1 bolt hole per plate]
  const An_fp=Math.max(0,2*(Bfp-d0)*Tfp);
  const NnetRd_fp=.9*pm.fu*An_fp/GM2s/1e3;
  C.push(chk('10','Flange Plates — Net Section Tension (pair)','EC3-1-1 §6.2.3 / P358 §9.4',[
    `Anet = 2×(bfp−d₀)×tfp = 2×(${Bfp}−${d0})×${Tfp} = ${An_fp} mm²  (1 bolt hole per plate)`,
    `Nnet,Rd = 0.9×fu×Anet/γM2 = 0.9×${pm.fu}×${An_fp}/1.1/1000 = ${rd(NnetRd_fp)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA`,
  ],NnetRd_fp,Ffl/1e3,'kN',`N_{net,Rd}=\\dfrac{0.9\\times${pm.fu}\\times${An_fp}}{1.1\\times1000}=${rd(NnetRd_fp)}\\text{ kN}`));

  // 11 — Column end bearing (direct axial compression)
  // P358 §9.2: σ_bearing ≤ fy (yield stress of column material)
  // Bearing area = full column cross-sectional area (web + flanges)
  const A_col=2*Bf*Tf+(D-2*Tf)*Tw;
  const sigma_b=Nn/A_col;
  C.push(chk('11','Column End Bearing — Direct Axial Compression','P358 §9.2',[
    `Full column cross-section: A = 2×bf×tf + (D−2tf)×tw`,
    `  = 2×${Bf}×${Tf} + (${D}−${2*Tf})×${Tw} = ${A_col} mm²`,
    `σ_bearing = N_Ed/A = ${rd(Nn/1e3)}×1000/${A_col} = ${rd(sigma_b,1)} N/mm²`,
    `Limit per P358 §9.2: fy = ${cm.fy} N/mm²  (bearing on machined faces)`,
    `Note: bearing splice requires column ends to be machined flat and square.`,
  ],cm.fy,sigma_b,'N/mm²',`\\sigma=\\dfrac{N_{Ed}}{A_{col}}=\\dfrac{${rd(Nn/1e3)}\\times10^3}{${A_col}}=${rd(sigma_b,1)}\\text{ N/mm}^2`));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

function calcBase(g){
  // Column base plate — nominally pinned (P358 §10 / EC3-1-8 §6.2.5)
  // Checks: bearing on grout, base plate bending,
  //         HD bolt tension (uplift from moment), HD bolt shear,
  //         weld of column to base plate.
  const Nn  = fv(g.N)*1e3;           // axial (N), +ve compression
  const Vn  = fv(g.V)*1e3;           // shear (N)
  const Mn  = fv(g.M)*1e6;           // moment (N·mm)
  const nhd = fi(g.nhd);
  const dhd = fv(g.dhd);
  const fub = g.hdgrade==='4.6' ? 400 : 800;
  const Ahd = fv(g.As);              // tensile stress area of HD bolt
  const ex  = fv(g.ex);              // HD bolt c/c in x (parallel to moment plane)
  const ey  = fv(g.ey);
  const tp  = fv(g.tp);
  const Bp  = fv(g.Bp);
  const Dp  = fv(g.Dp);
  const bf  = fv(g.bf);
  const dc  = fv(g.dc);
  const aw  = fv(g.aw);
  const fck = fv(g.fck);
  const pm  = MAT[g.platGrade];
  const cm  = MAT[g.colGrade];

  // ── Bearing strength of grout/concrete (EC2 §6.7 / EC3-1-8 §6.2.5) ────────
  // Design bearing strength: fj = β_j × fcd  where fcd = fck/1.5
  // For a spread ratio ≤ 3: use simplified fj = 0.67 × fck/1.5
  const fcd  = fck / 1.5;
  const beta = 0.67;
  const fj   = beta * fcd;              // N/mm² — grout bearing strength

  // Effective bearing area (base plate footprint)
  const A_bp = Bp * Dp;                // mm²

  // Maximum bearing resistance
  const N_Rd_bearing = fj * A_bp / 1e3; // kN

  // ── Cantilever dimension c (base plate overhang beyond column face) ────────
  const c_x = (Bp - bf) / 2;           // overhang in x (mm)
  const c_y = (Dp - dc) / 2;           // overhang in y (mm)
  const c   = Math.max(c_x, c_y);      // governing cantilever (mm)

  // ── Required plate thickness from bending ────────────────────────────────
  // P358 §10.3: tp,req = c × √(3 × fj / fy)
  // where fj is bearing pressure under the plate (actual = N / A_bp)
  const sigma_act = Nn / A_bp;          // actual bearing pressure (N/mm²)
  const tp_req = c * Math.sqrt(3 * Math.max(sigma_act, 0) / pm.fy);
  const C = [];

  // ── 1. Base plate bearing on grout ──────────────────────────────────────
  C.push(chk('1','Base Plate — Bearing on Grout/Concrete','EC2 §6.7 / EC3-1-8 §6.2.5 / P358 §10.3',[
    `Plate area: A_bp = B_p × D_p = ${Bp} × ${Dp} = ${A_bp} mm²`,
    `Concrete fck = ${fck} MPa  →  fcd = fck/1.5 = ${rd(fcd,1)} MPa`,
    `Design bearing strength: fj = β_j × fcd = 0.67 × ${rd(fcd,1)} = ${rd(fj,1)} N/mm²`,
    `Bearing resistance: N_Rd = fj × A_bp = ${rd(fj,1)} × ${A_bp} / 1000 = ${rd(N_Rd_bearing)} kN`,
    `Applied N_Ed = ${rd(Nn/1e3)} kN`,
  ], N_Rd_bearing, Nn/1e3, 'kN',`N_{Rd}=f_j\\times A_{bp}=\\dfrac{0.67\\times${rd(fcd,1)}\\times${A_bp}}{1000}=${rd(N_Rd_bearing)}\\text{ kN}`));

  // ── 2. Base plate bending ────────────────────────────────────────────────
  C.push(chk('2','Base Plate — Bending Resistance','EC3-1-1 §6.2.5 / P358 §10.3',[
    `Bearing pressure: σ_act = N_Ed / A_bp = ${rd(Nn/1e3)} × 1000 / ${A_bp} = ${rd(sigma_act,2)} N/mm²`,
    `Cantilever c = max((B_p−b_f)/2, (D_p−d_c)/2) = max(${rd(c_x,1)}, ${rd(c_y,1)}) = ${rd(c,1)} mm`,
    `Required t_p,req = c × √(3σ/fy) = ${rd(c,1)} × √(3 × ${rd(sigma_act,2)} / ${pm.fy}) = ${rd(tp_req,1)} mm`,
    `Provided t_p = ${tp} mm  ${tp >= tp_req ? '✓  sufficient' : '✗  insufficient — increase plate thickness'}`,
  ], tp, tp_req, 'mm',`t_{p,req}=${rd(c,1)}\\sqrt{\\dfrac{3\\times${rd(sigma_act,2)}}{${pm.fy}}}=${rd(tp_req,1)}\\text{ mm}`));

  // ── 3. HD bolt tension (from moment + uplift) ────────────────────────────
  // Tension in HD bolts arises from applied moment and any net uplift.
  // Simple model: T per bolt = (M_Ed / lever_arm − N_Ed/n_hd) / n_tension
  //   lever_arm ≈ distance between HD bolt rows = e_x (bolt c/c in bending direction)
  //   n_tension = n_hd / 2 (half the bolts in tension for moment case)
  const lever = ex;                         // tension bolt group lever arm (mm)
  const T_moment = Mn / lever;              // total tension from moment (N)
  const T_axial  = -Nn / nhd;              // uplift per bolt from axial (−ve = compression → 0)
  const T_bolt   = Math.max(0, T_moment/nhd*2 + Math.max(0, T_axial)); // per bolt (N)
  const FtRd_hd  = 0.9 * fub * Ahd / GM2 / 1e3; // kN — EC3-1-8 Table 3.4
  // If no moment and net compression, tension = 0 → check is trivially satisfied
  const T_dem = T_bolt / 1e3;              // kN
  C.push(chk('3','Holding-Down Bolts — Tension (Moment + Uplift)','EC3-1-8 Table 3.4 / P358 §10.4',[
    `Lever arm ≈ e_x = ${ex} mm   n_hd = ${nhd} bolts`,
    `T_moment = M_Ed / e_x = ${rd(Mn/1e6)} × 10⁶ / ${ex} = ${rd(T_moment/1e3)} kN total`,
    `T_axial  = -N_Ed / n_hd = ${rd(T_axial/1e3)} kN/bolt  (−ve = compression, clamping)`,
    `T per bolt (tension side) = ${rd(T_dem)} kN`,
    `Ft,Rd = 0.9 × fub × As / γM2 = 0.9 × ${fub} × ${Ahd} / 1.25 = ${rd(FtRd_hd)} kN`,
    T_dem <= 0 ? `Net compression — no tension in HD bolts. Check satisfied by inspection.` : ``,
  ].filter(Boolean), Math.max(FtRd_hd, 0.001), Math.max(T_dem, 0), 'kN',`F_{t,Rd}=\\dfrac{0.9\\times${fub}\\times${Ahd}}{1.25\\times1000}=${rd(FtRd_hd)}\\text{ kN}`));

  // ── 4. HD bolt shear ──────────────────────────────────────────────────────
  // All bolts carry shear (friction + bearing); use bearing model per EC3-1-8
  // Shear capacity: Fv,Rd = 0.6 × fub × As / γM2 (threads in shear plane)
  const FvRd_hd  = 0.6 * fub * Ahd / GM2 / 1e3;   // per bolt (kN)
  const FvRd_tot = nhd * FvRd_hd;                   // total (kN)
  // Combined tension-shear interaction (EC3-1-8 Table 3.4):
  //   Fv,Ed/(Fv,Rd) + Ft,Ed/(1.4×Ft,Rd) ≤ 1.0
  const IV  = fv(g.V) / FvRd_tot;
  const IT  = Math.max(T_dem, 0) / (1.4 * FtRd_hd);
  const I_combined = IV + IT;
  C.push(chk('4','Holding-Down Bolts — Shear (+ Tension Interaction)','EC3-1-8 Table 3.4 / P358 §10.4',[
    `Fv,Rd per bolt = 0.6 × ${fub} × ${Ahd} / 1.25 = ${rd(FvRd_hd)} kN`,
    `Total Fv,Rd = ${nhd} × ${rd(FvRd_hd)} = ${rd(FvRd_tot)} kN`,
    `Shear utilisation: V_Ed / Fv,Rd,tot = ${rd(fv(g.V))} / ${rd(FvRd_tot)} = ${rd(IV*100,1)}%`,
    `Combined interaction: Fv/Fv,Rd + Ft/(1.4×Ft,Rd) = ${rd(IV,3)} + ${rd(IT,3)} = ${rd(I_combined,3)}`,
  ], 1.0, I_combined, '—',`\\dfrac{V_{Ed}}{F_{v,Rd,tot}}+\\dfrac{F_{t,Ed}}{1.4F_{t,Rd}}=${rd(IV,3)}+${rd(IT,3)}=${rd(I_combined,3)}\\leq1.0`));

  // ── 5. Weld of column to base plate ──────────────────────────────────────
  // Full perimeter fillet weld (all round). Resists N_Ed (axial) and V_Ed (shear).
  // Capacity uses the WEAKER of plate material and column material (EC3-1-8 §4.5.3).
  const Aw_throat = 0.707 * aw;
  const L_weld    = 2 * (bf + dc);             // approx. weld perimeter for I-section
  const A_weld    = Aw_throat * L_weld;
  const fwRd_plate = pm.fu / (Math.sqrt(3) * pm.bw * GM2);
  const fwRd_col   = cm.fu / (Math.sqrt(3) * cm.bw * GM2);
  const fwRd       = Math.min(fwRd_plate, fwRd_col); // weaker governs
  const sigma_weld = Nn / A_weld;
  const tau_weld   = Vn / A_weld;
  const f_weld_res = Math.sqrt(sigma_weld**2 + tau_weld**2);
  C.push(chk('5','Column-to-Base-Plate Fillet Weld','EC3-1-8 §4.5.3 / P358 §10.5',[
    `Weld leg = ${aw} mm  throat = ${rd(Aw_throat)} mm`,
    `Perimeter: L = 2(bf+dc) = 2(${bf}+${dc}) = ${L_weld} mm`,
    `Total throat area: A_w = ${rd(Aw_throat)} × ${L_weld} = ${rd(A_weld,0)} mm²`,
    `fw,Rd (plate) = ${pm.fu}/(√3×${pm.bw}×1.25) = ${rd(fwRd_plate,1)} N/mm²`,
    `fw,Rd (column) = ${cm.fu}/(√3×${cm.bw}×1.25) = ${rd(fwRd_col,1)} N/mm²`,
    `fw,Rd (governs) = ${rd(fwRd,1)} N/mm²  (weaker of plate and column)`,
    `σ (axial) = N/A_w = ${rd(sigma_weld,1)} N/mm²`,
    `τ (shear) = V/A_w = ${rd(tau_weld,1)} N/mm²`,
    `f_result = √(σ²+τ²) = ${rd(f_weld_res,1)} N/mm²`,
  ], fwRd, f_weld_res, 'N/mm²',`f_{result}=\\sqrt{\\sigma^2+\\tau^2}=\\sqrt{${rd(sigma_weld,1)}^2+${rd(tau_weld,1)}^2}=${rd(f_weld_res,1)}\\text{ N/mm}^2`));

  return{checks:C, allPass:C.every(c=>c.pass), maxR:Math.max(...C.map(c=>c.r))};
}

function calcBrace(g){
  // Bracing connection — gusset plate, bolted brace (P358 §11 / EC3-1-8)
  // Bracing member (flat bar or angle) bolted through gusset plate.
  // Gusset welded to supporting frame. Bolt group carries N_Ed concentrically.
  const b   = BOLT[g.boltSize];
  const gm  = MAT[g.gussGrade];
  const bm  = MAT[g.braceGrade];
  const fm  = MAT[g.frameGrade];
  const Nn  = fv(g.N)*1e3 * fv(g.sign);
  const Na  = Math.abs(Nn);
  const nb  = fi(g.n);
  const P1  = fv(g.p1), E1=fv(g.e1), E2g=fv(g.e2g), E2b=fv(g.e2b);
  const Tg  = fv(g.tg), Hg=fv(g.hg), Tb=fv(g.tb), Wb=fv(g.wb);
  const Ecc = fv(g.e);
  const Aw  = 0.707*fv(g.aw);
  const {d,d0,As} = b, fub=800;
  const GM2s=1.1;  // section fracture (EC3-1-1 UK NA)

  // Whitmore effective width — P358 §11.4
  // Stress spreads at 30° from first to last bolt. Width = 2×L_bolt×tan30° + w_brace.
  // Physical limit: can't exceed actual gusset height hg.
  const L_bolt = Math.max(0, (nb-1)*P1);
  const W_whit = 2 * L_bolt * Math.tan(30*Math.PI/180) + Wb;
  const W_eff  = Math.min(W_whit, Hg);   // governs: Whitmore or physical gusset width

  const C = [];

  // 1 — Bolt group axial shear (concentric)
  const FvRd     = 0.6*fub*As/GM2;
  const FvRd_tot = nb * FvRd;
  C.push(chk('1','Bolt Group — Axial Shear (Brace to Gusset)','EC3-1-8 Table 3.4 / P358 §11.3',[
    `Bolt ${g.boltSize} Gr.8.8  As=${As} mm²  fub=${fub} MPa`,
    `Fv,Rd = 0.6×${fub}×${As}/1.25 = ${rd(FvRd/1e3)} kN/bolt`,
    `Concentric axial: ${nb} bolts  Fv,Rd,total = ${nb}×${rd(FvRd/1e3)} = ${rd(FvRd_tot/1e3)} kN`,
  ],FvRd_tot/1e3,Na/1e3,'kN',`F_{v,Rd,tot}=${nb}\\times${rd(FvRd/1e3)}=${rd(FvRd_tot/1e3)}\\text{ kN}`));

  // 2 — Bearing on gusset plate
  const k1g  = Math.min(2.8*E2g/d0-1.7,2.5);
  const abg  = nb>1?Math.min(E1/(3*d0),P1/(3*d0)-0.25,fub/gm.fu,1):Math.min(E1/(3*d0),fub/gm.fu,1);
  const FbgRd = Math.max(0,k1g)*Math.max(0,abg)*gm.fu*d*Tg/GM2/1e3;
  C.push(chk('2','Bearing Resistance — Gusset Plate','EC3-1-8 Table 3.4 / P358 §11.3',[
    `k₁ = ${rd(k1g)}  αb = ${rd(abg,3)}  tg = ${Tg} mm`,
    `Fb,Rd = ${rd(FbgRd)} kN   Applied per bolt = N/n = ${rd(Na/1e3/nb)} kN`,
  ],FbgRd,Na/1e3/nb,'kN',`F_{b,Rd}=\\dfrac{${rd(k1g)}\\times${rd(abg,3)}\\times${gm.fu}\\times${d}\\times${Tg}}{1.25}=${rd(FbgRd)}\\text{ kN}`));

  // 3 — Bearing on brace member
  const k1b  = Math.min(2.8*E2b/d0-1.7,2.5);
  const abb  = nb>1?Math.min(E1/(3*d0),P1/(3*d0)-0.25,fub/bm.fu,1):Math.min(E1/(3*d0),fub/bm.fu,1);
  const FbbRd = Math.max(0,k1b)*Math.max(0,abb)*bm.fu*d*Tb/GM2/1e3;
  C.push(chk('3','Bearing Resistance — Brace Member','EC3-1-8 Table 3.4 / P358 §11.3',[
    `k₁ = ${rd(k1b)}  αb = ${rd(abb,3)}  tb = ${Tb} mm`,
    `Fb,Rd = ${rd(FbbRd)} kN   Applied per bolt = ${rd(Na/1e3/nb)} kN`,
  ],FbbRd,Na/1e3/nb,'kN',`F_{b,Rd}=\\dfrac{${rd(k1b)}\\times${rd(abb,3)}\\times${bm.fu}\\times${d}\\times${Tb}}{1.25}=${rd(FbbRd)}\\text{ kN}`));

  // 4 — Gusset plate gross tension — Whitmore section (P358 §11.4)
  // Effective width = min(Whitmore width, physical gusset height hg)
  const Ag_eff  = W_eff * Tg;
  const NplRd_g = gm.fy * Ag_eff / GM0 / 1e3;
  C.push(chk('4','Gusset Plate — Gross Tension (Whitmore Section)','EC3-1-1 §6.2.3 / P358 §11.4',[
    `Whitmore width: W = 2×(n−1)p₁×tan30° + wb = 2×${L_bolt}×tan30° + ${Wb} = ${rd(W_whit,1)} mm`,
    `Physical gusset height: hg = ${Hg} mm`,
    `Effective width: W_eff = min(${rd(W_whit,1)}, ${Hg}) = ${rd(W_eff,1)} mm  ${W_whit>Hg?'(gusset governs)':'(Whitmore governs)'}`,
    `Ag = W_eff × tg = ${rd(W_eff,1)} × ${Tg} = ${rd(Ag_eff,0)} mm²`,
    `Npl,Rd = fy × Ag / γM0 = ${gm.fy} × ${rd(Ag_eff,0)} / 1.0 / 1000 = ${rd(NplRd_g)} kN`,
  ],NplRd_g,Na/1e3,'kN',`N_{pl,Rd}=\\dfrac{${gm.fy}\\times${rd(Ag_eff,0)}}{1.0\\times1000}=${rd(NplRd_g)}\\text{ kN}\\;(W_{eff}=${rd(W_eff,1)}\\text{ mm})`));

  // 5 — Gusset plate net tension [γM2 = 1.1 per EC3-1-1 UK NA]
  // Net area deducts bolt holes across the critical section (one bolt in single row)
  const An_g    = Math.max(0,(Hg-nb*d0)*Tg);  // conservative: all holes in one section
  const NnetRd_g = 0.9*gm.fu*An_g/GM2s/1e3;
  C.push(chk('5','Gusset Plate — Net Section Tension','EC3-1-1 §6.2.3 / P358 §11.4',[
    `Anet = (hg − n·d₀) × tg = (${Hg}−${nb}×${d0})×${Tg} = ${An_g} mm²`,
    `Nnet,Rd = 0.9×${gm.fu}×${An_g}/1.1/1000 = ${rd(NnetRd_g)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA (plate cross-section fracture)`,
  ],NnetRd_g,Na/1e3,'kN',`N_{net,Rd}=\\dfrac{0.9\\times${gm.fu}\\times${An_g}}{1.1\\times1000}=${rd(NnetRd_g)}\\text{ kN}`));

  // 6 — Gusset plate block shear [fu term: γM2 = 1.1]
  const Ant_bs = Math.max(0,(E2g-d0/2)*Tg);
  const Anv_bs = Math.max(0,(E1+(nb-1)*P1-(nb-0.5)*d0)*Tg);
  const Veff_bs = (gm.fu*Ant_bs/GM2s + gm.fy*Anv_bs/(Math.sqrt(3)*GM0))/1e3;
  C.push(chk('6','Gusset Plate — Block Shear','EC3-1-8 §3.10.2 / P358 §11.4',[
    `Ant = (e₂g−d₀/2)×tg = (${E2g}−${d0/2})×${Tg} = ${rd(Ant_bs,0)} mm²`,
    `Anv = (e₁+(n−1)p₁−(n−0.5)d₀)×tg = ${rd(Anv_bs,0)} mm²`,
    `Veff,Rd = fu·Ant/γM2 + fy·Anv/(√3·γM0)  (γM2 = 1.1)`,
    `       = ${rd(gm.fu*Ant_bs/GM2s/1e3)} + ${rd(gm.fy*Anv_bs/(Math.sqrt(3)*GM0)/1e3)} = ${rd(Veff_bs)} kN`,
  ],Veff_bs,Na/1e3,'kN',`V_{eff,Rd}=\\dfrac{${gm.fu}\\times${rd(Ant_bs,0)}}{1.1}+\\dfrac{${gm.fy}\\times${rd(Anv_bs,0)}}{\\sqrt{3}}=${rd(Veff_bs)}\\text{ kN}`));

  // 7 — Brace member net section tension [γM2 = 1.1]
  const An_b    = Math.max(0,(Wb-d0)*Tb);
  const NnetRd_b = 0.9*bm.fu*An_b/GM2s/1e3;
  C.push(chk('7','Brace Member — Net Section Tension','EC3-1-1 §6.2.3 / P358 §11.4',[
    `Brace: wb = ${Wb} mm  tb = ${Tb} mm  (flat bar, single bolt row)`,
    `Anet = (wb−d₀)×tb = (${Wb}−${d0})×${Tb} = ${An_b} mm²`,
    `Nnet,Rd = 0.9×${bm.fu}×${An_b}/1.1/1000 = ${rd(NnetRd_b)} kN`,
    `γM2 = 1.1 per EC3-1-1 UK NA`,
  ],NnetRd_b,Na/1e3,'kN',`N_{net,Rd}=\\dfrac{0.9\\times${bm.fu}\\times${An_b}}{1.1\\times1000}=${rd(NnetRd_b)}\\text{ kN}`));

  // 8 — Gusset weld to frame — shear + in-plane moment (P358 §11.5)
  // N_Ed runs as direct shear along the weld length hg.
  // Eccentricity e between bolt-group centroid and weld face creates in-plane moment.
  // Weld both sides: total throat area = 2×a×hg; second moment Iw = 2×a×hg³/12.
  const A_weld_tot = 2*Aw*Hg;
  const fwRd_g   = gm.fu/(Math.sqrt(3)*gm.bw*GM2);
  const fwRd_fr  = fm.fu/(Math.sqrt(3)*fm.bw*GM2);
  const fwRd     = Math.min(fwRd_g,fwRd_fr);
  const tau_N    = Na/A_weld_tot;
  const M_w      = Na*Ecc;
  const Iw       = 2*Aw*Hg**3/12;
  const sigma_M  = M_w*(Hg/2)/Iw;
  const f_res    = Math.sqrt(tau_N**2+sigma_M**2);
  C.push(chk('8','Gusset Weld to Frame — Shear + In-Plane Moment','EC3-1-8 §4.5.3 / P358 §11.5',[
    `Leg = ${fv(g.aw)} mm  throat = ${rd(Aw)} mm  length = hg = ${Hg} mm (both sides)`,
    `fw,Rd = min(fu,guss, fu,frame)/(√3·βw·γM2) = ${rd(fwRd,1)} N/mm²`,
    `τ = N/(2·a·hg) = ${rd(Na/1e3)}k/(2×${rd(Aw)}×${Hg}) = ${rd(tau_N,1)} N/mm²`,
    `M_w = N·e = ${rd(Na/1e3)}k×${Ecc}/1000 = ${rd(M_w/1e6)} kN·m`,
    `Iw = 2·a·hg³/12 = ${rd(Iw,0)} mm⁴`,
    `σ_M = M_w·(hg/2)/Iw = ${rd(sigma_M,1)} N/mm²`,
    `f_result = √(τ²+σ²) = ${rd(f_res,1)} N/mm²`,
  ],fwRd,f_res,'N/mm²',`f_{result}=\\sqrt{\\tau_N^2+\\sigma_M^2}=\\sqrt{${rd(tau_N,1)}^2+${rd(sigma_M,1)}^2}=${rd(f_res,1)}\\text{ N/mm}^2`));

  return{checks:C,allPass:C.every(c=>c.pass),maxR:Math.max(...C.map(c=>c.r))};
}

// ─── UI STATE ─────────────────────────────────────────────────
let activeId='fin';
const gv=id=>document.getElementById(id)?.value||'0';

// ── Section auto-fill ──────────────────────────────────────────
function secFill(pfx, role, secName){
  const s = SECTIONS[secName];
  if(!s) return;
  // role='beam': fill tw (beam web), for fdep also tf,bf,d
  // role='supp': fill tfc (col flange), and update notch info
  if(role==='beam'){
    const twEl = document.getElementById(pfx+'-tw');
    if(twEl) twEl.value = s.tw;
    // FDEP also needs d, tf, bf
    const dEl=document.getElementById(pfx+'-d');
    const tfEl=document.getElementById(pfx+'-tf');
    const bfEl=document.getElementById(pfx+'-bf');
    if(dEl) dEl.value=s.d;
    if(tfEl) tfEl.value=s.tf;
    if(bfEl) bfEl.value=s.b;
    // Update hint box
    const hint=document.getElementById(pfx+'-ecc');
    if(hint){const lp=fv(gv(pfx+'-lp')),e2=fv(gv(pfx+'-e2p')||gv(pfx+'-e2'));
      hint.textContent=`tw = ${s.tw} mm · d = ${s.d} mm · tf = ${s.tf} mm · bf = ${s.b} mm`;}
  }
  if(role==='supp'){
    const tfcEl=document.getElementById(pfx+'-tfc');
    if(tfcEl) tfcEl.value=s.tf;
  }
  // Update notch box
  const beamSec=document.getElementById(pfx+'-beamSec')?.value;
  const suppSec=document.getElementById(pfx+'-suppSec')?.value;
  const notchEl=document.getElementById(pfx+'-notch');
  if(notchEl && beamSec && suppSec){
    const nc=notchCheck(beamSec,suppSec);
    if(nc){
      const b=SECTIONS[beamSec], sp=SECTIONS[suppSec];
      // Notch is required if supporting flange width means beam flange would clash
      const flangeClear = sp.tf + sp.r + 5;
      notchEl.innerHTML=`<b>Notch check — ${beamSec} into ${suppSec}</b><br>
        Min notch depth dn ≥ tf,supp + r,supp + 5 = ${sp.tf} + ${sp.r} + 5 = ${nc.dn_min} mm<br>
        Min notch length ln ≥ b,supp/2 + 10 = ${Math.round(sp.b/2)} + 10 = ${nc.ln_min} mm<br>
        Beam: d=${b.d} tf=${b.tf} tw=${b.tw} mm · Support: d=${sp.d} tf=${sp.tf} b=${sp.b} mm`;
    }
  }
}

// Trigger secFill on initial load after form rendered
function initSecFill(pfx){
  const bs=document.getElementById(pfx+'-beamSec');
  const ss=document.getElementById(pfx+'-suppSec');
  if(bs&&bs.value) secFill(pfx,'beam',bs.value);
  if(ss&&ss.value) secFill(pfx,'supp',ss.value);
}

function switchJt(id){
  const jt=JOINTS.find(j=>j.id===id);
  if(!jt)return;
  activeId=id;
  document.querySelectorAll('.jt-card').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const pan=document.getElementById('input-panel');
  if(id==='fin')   pan.innerHTML=formFin();
  else if(id==='pdep')  pan.innerHTML=formPDEP();
  else if(id==='fdep')  pan.innerHTML=formFDEP();
  else if(id==='dcleat') pan.innerHTML=formDCleat();
  else if(id==='scleat') pan.innerHTML=formSCleat();
  else if(id==='splice') pan.innerHTML=formSplice();
  else if(id==='base')  pan.innerHTML=formBase();
  else if(id==='brace') pan.innerHTML=formBrace();
  showDiag(jt);
  document.getElementById('results').style.display='none';
  if(id==='fin')    setTimeout(()=>{attachFin();initSecFill('fin');},50);
  if(id==='pdep')   setTimeout(()=>{initSecFill('pdep');},50);
  if(id==='fdep')   setTimeout(()=>{initSecFill('fdep');},50);
  if(id==='dcleat') setTimeout(()=>{attachDCleat();initSecFill('dcl');},50);
  if(id==='scleat') setTimeout(()=>{attachSCleat();initSecFill('scl');},50);
  if(id==='base')   setTimeout(attachBase,50);
}

function showDiag(jt){
  const diagFns={fin:diagFin,pdep:diagPDEP,fdep:diagFDEP,
    dcleat:diagCleat,scleat:diagSCleat,splice:diagSplice,base:diagBase,brace:diagBrace};
  const notP358=['dcleat','scleat'];
  const disclaimer=notP358.includes(jt.id)?
    `<div style="background:#fffdf5;border:1px solid #c47a0a;border-radius:4px;padding:7px 10px;font-size:10.5px;color:#7a4f00;margin-top:8px">
      ⚠ Web cleats are <b>not covered by SCI P358</b>. Checks based on EC3-1-8 / ECCS Pub.126.</div>`:'';
  document.getElementById('diag-area').innerHTML=`
    <div class="diag-panel">
      <div class="diag-title">${jt.label}</div>
      <div class="diag-desc">${jt.desc}</div>
      <div class="diag-wrap">${diagFns[jt.id]?diagFns[jt.id]():''}</div>
      ${disclaimer}
      <div style="color:var(--muted);font-size:10px;font-family:var(--mono);margin-top:4px">${jt.ref}</div>
    </div>`;
}

function doCalc(){
  const eb=document.getElementById('err-box');
  eb.style.display='none';
  const jt=JOINTS.find(j=>j.id===activeId);
  if(!jt?.ready){eb.textContent=jt?.label+' not yet implemented.';eb.style.display='block';return;}
  try{
    let g,res,sum;
    if(activeId==='fin'){g=readFin();res=calcFin(g);sum=finSum(g);}
    else if(activeId==='pdep'){g=readPDEP();res=calcPDEP(g);sum=pdepSum(g);}
    else if(activeId==='fdep'){g=readFDEP();res=calcFDEP(g);sum=fdepSum(g);}
    else if(activeId==='dcleat'){g=readDCleat();res=calcDCleat(g);sum=dcleatSum(g);}
    else if(activeId==='scleat'){g=readSCleat();res=calcSCleat(g);sum=scleatSum(g);}
    else if(activeId==='splice'){g=readSplice();res=calcSplice(g);sum=spliceSum(g);}
    else if(activeId==='base'){g=readBase();res=calcBase(g);sum=baseSum(g);}
    else if(activeId==='brace'){g=readBrace();res=calcBrace(g);sum=braceSum(g);}
    else{g=readPDEP();res=calcPDEP(g);sum=pdepSum(g);}
    document.getElementById('diag-area').innerHTML='';
    renderRes(res,jt.label,sum);
  }catch(e){eb.textContent='Error: '+e.message;eb.style.display='block';}
}

function finSum(g){const a=fv(g.lp)-fv(g.e2p);return[['V_Ed',g.V+' kN'],['Bolts',g.n+'×'+g.boltSize],['Pitch p₁',g.p1+' mm'],['Eccen. a',a+' mm'],['Plate',g.hp+'×'+g.lp+'×'+g.tp+' mm'],['t_w',g.tw+' mm'],['Weld leg',g.aw+' mm'],['Plate',g.platGrade],['Beam',g.beamGrade]];}
function pdepSum(g){return[['V_Ed',g.V+' kN'],['Bolts',g.n+'×'+g.boltSize],['Pitch p₁',g.p1+' mm'],['Bolt-weld e',g.ep+' mm'],['Plate',g.hp+'×'+g.tp+' mm'],['t_fc',g.tfc+' mm'],['Weld leg',g.aw+' mm'],['Plate',g.platGrade],['Column',g.colGrade],['Beam',g.beamGrade]];}
function fdepSum(g){return[['V_Ed',g.V+' kN'],['Bolts',g.n+'×'+g.boltSize],['Pitch p₁',g.p1+' mm'],['Bolt-weld e',g.ep+' mm'],['Beam depth d',g.d+' mm'],['Web t_w',g.tw+' mm'],['Flange t_f',g.tf+' mm'],['Flange b_f',g.bf+' mm'],['Web weld',g.aww+' mm'],['Flange weld',g.awf+' mm'],['Plate',g.platGrade],['Column',g.colGrade],['Beam',g.beamGrade]];}
function dcleatSum(g){const hc=fv(g.e1)+(fi(g.n)-1)*fv(g.p1)+fv(g.e1);
  return[['V_Ed',g.V+' kN'],['Double cleat','2×('+g.n+'×'+g.boltSize+')'],['Pitch p₁',g.p1+' mm'],
  ['Gauge e₂_s',g.e2s+' mm'],['Cleat h_c',rd(hc,0)+' mm'],['Cleat t_c',g.tc+' mm'],
  ['Cleat',g.cleatGrade],['Column',g.colGrade],['Beam',g.beamGrade]];}
function scleatSum(g){const hc=fv(g.e1)+(fi(g.n)-1)*fv(g.p1)+fv(g.e1);
  return[['V_Ed',g.V+' kN'],['Single cleat','1×('+g.n+'×'+g.boltSize+')'],['Pitch p₁',g.p1+' mm'],
  ['Gauge e₂_s',g.e2s+' mm'],['Cleat h_c',rd(hc,0)+' mm'],['Cleat t_c',g.tc+' mm'],
  ['Cleat',g.cleatGrade],['Column',g.colGrade],['Beam',g.beamGrade]];}

function spliceSum(g){return[
  ['N_Ed',g.N+' kN'],['V_Ed',g.V+' kN'],['Bolts',g.boltSize+' Gr.8.8'],

  ['Flange plate',g.bfp+'×'+g.tfp+' mm'],['Web plate t',g.twp+' mm'],
  ['Cover L_cp',g.Lcp+' mm'],['Column',g.colGrade],['Plates',g.platGrade]];}

function readBase(){return{
  N:gv('ba-N'),V:gv('ba-V'),M:gv('ba-M'),
  dhd:gv('ba-dhd'),nhd:gv('ba-nhd'),hdgrade:gv('ba-hdgrade'),As:gv('ba-As'),

  fck:gv('ba-fck'),colGrade:gv('ba-colGrade'),platGrade:gv('ba-platGrade')};}
function baseSum(g){
  const c=Math.max((fv(g.Bp)-fv(g.bf))/2,(fv(g.Dp)-fv(g.dc))/2);
  return[['N_Ed',g.N+' kN'],['V_Ed',g.V+' kN'],['M_Ed',g.M+' kN·m'],

    ['Base plate',g.Bp+'×'+g.Dp+'×'+g.tp+' mm'],
    ['Cantilever c',rd(c,1)+' mm'],['Weld leg',g.aw+' mm'],
    ['Concrete','C'+g.fck+'/'+{20:'25',25:'30',30:'37',32:'40'}[g.fck]],
    ['Plate',g.platGrade],['Column',g.colGrade]];}

    const Bp=fv(gv('ba-Bp')),bf=fv(gv('ba-bf')),Dp=fv(gv('ba-Dp')),dc=fv(gv('ba-dc'));

  };
