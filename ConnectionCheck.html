<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P358 Steel Joint Design Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f4f1;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;}

/* ── HEADER ── */
.hdr{background:#fff;border-bottom:1px solid #e0ddd8;padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:600;font-size:16px;color:#1a1a1a;}
.logo em{color:#777;font-style:normal;}
.logo-sub{color:#999;font-size:10px;letter-spacing:1px;margin-top:2px;}
.hdr-meta{text-align:right;color:#666;font-size:11px;line-height:1.8;}
.hdr-meta b{color:#333;}
.home-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#888;text-decoration:none;transition:color .15s;}
.home-btn:hover{color:#444;}
.home-btn svg{width:12px;height:12px;}

/* ── JOINT SELECTOR BAR ── */
.jt-bar{background:#f5f4f1;border-bottom:1px solid #e0ddd8;padding:10px 16px 0;overflow-x:auto;}
.jt-inner{display:flex;gap:6px;min-width:max-content;padding-bottom:10px;}
.jt-card{display:flex;flex-direction:column;align-items:center;gap:5px;width:96px;
  padding:8px 6px 7px;border-radius:8px;cursor:pointer;
  border:1px solid #e0ddd8;background:#fff;
  transition:all .18s;user-select:none;}
.jt-card:hover:not(.locked){border-color:#b0a8e0;background:#fafaf8;}
.jt-card.active{border-color:#8a7fcc;background:#fff;box-shadow:0 0 0 2px rgba(138,127,204,.12);}
.jt-card.locked{opacity:.4;cursor:not-allowed;}
.jt-icon{width:70px;height:48px;display:flex;align-items:center;justify-content:center;}
.jt-icon svg{width:100%;height:100%;}
.jt-name{font-size:9.5px;font-weight:500;text-align:center;color:#666;line-height:1.3;}
.jt-card.active .jt-name{color:#1a1a1a;font-weight:600;}
.jt-tag{font-size:9px;letter-spacing:.6px;padding:1px 6px;border-radius:3px;}
.tag-done{background:#f0ede8;color:#555;}
.tag-soon{background:#fef3e2;color:#e67e22;}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:390px 1fr;min-height:calc(100vh - 112px);}
.col-l{padding:16px;border-right:1px solid #e0ddd8;overflow-y:auto;background:#fff;}
.col-r{padding:16px;overflow-y:auto;background:#f5f4f1;}

/* ── CARDS & FORMS ── */
.card{background:#fff;border:1px solid #e0ddd8;border-radius:10px;padding:16px 18px;margin-bottom:10px;}
.card-title{font-size:12px;font-weight:600;color:#777;letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0ede8;}
.field{margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;color:#555;font-size:11.5px;font-weight:500;margin-bottom:4px;}
.field label em{color:#999;font-weight:400;font-size:10.5px;font-style:normal;}
.iw{position:relative;}
.iw input,.iw select{width:100%;height:32px;background:#fafaf8;border:1px solid #d4d0ca;
  border-radius:6px;padding:0 34px 0 8px;color:#1a1a1a;font-size:13px;
  font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;}
.iw input:focus,.iw select:focus{border-color:#8a7fcc;box-shadow:0 0 0 2px rgba(138,127,204,.12);}
.iw .unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  color:#999;font-size:10px;pointer-events:none;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.g2 .field,.g3 .field{margin-bottom:0;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.ibox{background:#f5f4f1;border:1px solid #e0ddd8;border-radius:6px;
  padding:7px 10px;font-size:11px;color:#666;font-family:'SF Mono',Consolas,monospace;
  margin-top:9px;line-height:1.8;}

/* ── BUTTONS ── */
.btn-calc{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;
  padding:10px;font-size:14px;font-weight:500;font-family:inherit;
  cursor:pointer;margin-top:4px;transition:background .2s;}
.btn-calc:hover{background:#333;}
.btn-sm{background:#fff;color:#555;border:1px solid #d4d0ca;
  border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .15s;}
.btn-sm:hover{color:#1a1a1a;border-color:#999;}
.pdf-btn{width:100%;padding:9px;background:#fff;border:1px solid #d4d0ca;border-radius:8px;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:all .15s;margin-bottom:12px}
.pdf-btn:hover{background:#f5f4f1;border-color:#999}
.err{background:#fceaea;border:1px solid #f0b0b0;border-radius:8px;
  padding:9px 13px;color:#c0392b;font-size:12px;margin-bottom:10px;}

/* ── DIAGRAM PANEL ── */
.diag-panel{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0;}
.diag-title{font-weight:700;font-size:17px;color:#1a1a1a;}
.diag-desc{font-size:12px;color:#666;text-align:center;max-width:380px;line-height:1.7;}
.diag-wrap{background:#fff;border:1px solid #e0ddd8;border-radius:10px;padding:16px;width:100%;}
.diag-legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-size:11px;color:#666;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-sw{width:14px;height:10px;border-radius:2px;}

/* ── RESULTS ── */
.rhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.rhdr-t{font-weight:700;font-size:18px;color:#1a1a1a;}
.verdict{border-radius:8px;padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;}
.verdict.pass{background:#e8f5e1;border:1px solid #b8dda0;}
.verdict.fail{background:#fceaea;border:1px solid #f0b0b0;}
.v-lbl{font-weight:700;font-size:16px;letter-spacing:.2px;}
.verdict.pass .v-lbl{color:#2e7d22;}
.verdict.fail .v-lbl{color:#c0392b;}
.v-sub{color:#666;font-size:11px;margin-top:3px;}
.v-util{text-align:right;}
.v-util-lbl{color:#888;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
.v-util-val{font-family:'SF Mono',Consolas,monospace;font-size:22px;font-weight:600;}
.sumgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:6px;margin-bottom:12px;}
.si{background:#f5f4f1;border-radius:8px;padding:8px 10px;}
.si-k{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.3px;}
.si-v{font-family:'SF Mono',Consolas,monospace;font-size:12px;font-weight:600;margin-top:2px;color:#1a1a1a;}
.slbl{font-weight:600;font-size:11px;color:#777;letter-spacing:.05em;text-transform:uppercase;
  margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid #e0ddd8;}
.slbl:first-child{margin-top:0;}

/* ── CHECK ROWS ── */
.cr{background:#fff;border:1px solid #e0ddd8;border-radius:8px;margin-bottom:5px;overflow:hidden;}
.cr.pass{border-left:4px solid #2e7d22;}
.cr.fail{border-left:4px solid #c0392b;}
.crh{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;}
.crh:hover{background:#f5f4f1;}
.cr-n{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#888;min-width:18px;font-weight:600;}
.cr-name{font-size:13px;font-weight:500;flex:1;min-width:0;color:#1a1a1a;}
.cr-bw{min-width:70px;text-align:right;}
.cr-dvc{font-size:10px;color:#888;font-family:'SF Mono',Consolas,monospace;}
.cr-trk{height:3px;background:#e0ddd8;border-radius:2px;overflow:hidden;margin-top:3px;}
.cr-fill{height:100%;border-radius:2px;transition:width .4s;}
.cr-pct{font-family:'SF Mono',Consolas,monospace;font-size:12px;font-weight:700;min-width:44px;text-align:right;}
.cr-badge{font-size:10px;font-weight:700;letter-spacing:.8px;padding:2px 8px;border-radius:20px;min-width:40px;text-align:center;}
.bp{background:#e8f5e1;color:#2e7d22;}
.bf{background:#fceaea;color:#c0392b;}
.cr-arr{color:#999;font-size:11px;margin-left:2px;}
.crd{padding:0 12px 12px;border-top:1px solid #f0ede8;display:none;background:#fafaf8;}
.crd.open{display:block;}
.dref{display:inline-block;background:#f5f4f1;border-radius:4px;padding:2px 8px;
  font-size:11px;color:#555;font-family:'SF Mono',Consolas,monospace;margin:8px 0 6px;border:1px solid #e0ddd8;}
.dcalc{background:#fff;border-radius:6px;padding:10px;border:1px solid #e0ddd8;}
.dline{font-family:'SF Mono',Consolas,monospace;font-size:11.5px;padding:2.5px 0;color:#333;opacity:.9;}
.dline+.dline{border-top:1px solid rgba(0,0,0,.05);}
.dres{display:flex;justify-content:flex-end;align-items:center;gap:10px;
  margin-top:10px;padding-top:8px;border-top:1px solid #e0ddd8;}
.dres-l{color:#666;font-size:11px;}
.dres-v{font-family:'SF Mono',Consolas,monospace;font-size:15px;font-weight:700;}
.notes{background:#fff9e6;border:1px solid #e8d780;border-left:3px solid #f0a040;
  border-radius:6px;padding:12px;color:#7a4f00;font-size:11px;line-height:1.9;margin-top:12px;}
.notes b{color:#5a3a00;}

/* ── CSS VARS for rc() colour function ── */
:root{--pass:#2e7d22;--warn:#e67e22;--fail:#c0392b;}

@media(max-width:820px){
  .layout{grid-template-columns:1fr;}
  .col-l{border-right:none;border-bottom:1px solid #e0ddd8;}
}
.print-hdr{display:none;}
@media print{
  .no-print{display:none!important;}
  .jt-bar{display:none!important;}
  .col-l{display:none!important;}
  .layout{display:block!important;}
  .col-r{background:#fff!important;padding:0!important;}
  body{background:#fff!important;font-size:11px;}
  .card,.cr,.verdict,.notes,.si,.diag-wrap{border:1px solid #d4d0ca!important;border-radius:4px!important;}
  .crd{display:block!important;}
  .print-hdr{display:flex!important;justify-content:space-between;align-items:center;
    background:#1a1a1a;color:#fff;padding:10px 16px;margin-bottom:16px;}
  .print-hdr-title{font-size:12pt;font-weight:700;color:#fff;}
  .print-hdr-sub{font-size:8pt;color:#bbb;}
}
</style>

const UKB_SECTIONS = Object.keys(SECTIONS).filter(k=>k.includes('UKB'));

function secOpts(defSec){

// Notch requirement check (P358 §3 / Table 3.1)
// Returns {required, dn_min, ln_min, note} 
// dn_min = min notch depth, ln_min = min notch length
function notchCheck(beamSec, suppSec){
  if(!beamSec||!suppSec) return null;
  const b=SECTIONS[beamSec], s=SECTIONS[suppSec];
  if(!b||!s) return null;
  // A notch is required if the beam top flange would clash with the supporting member flange
  // Standard notch: dn ≥ tf_supp + r_supp + 5mm clearance (to clear root of supporting flange)
  // Notch length: ln ≥ b_supp/2 + 10mm (to clear supporting flange)
  const dn_min = s.tf + s.r + 5;
  const ln_min = s.b/2 + 10;
  // Notch required if supporting member flange depth > beam flange (i.e. would clash)
  const required = true; // conservative — always flag possibility
  return {required, dn_min: Math.ceil(dn_min), ln_min: Math.ceil(ln_min),
    note:`Notch depth dn ≥ tf,supp+r+5 = ${s.tf}+${s.r}+5 = ${Math.ceil(dn_min)} mm. Length ln ≥ b,supp/2+10 = ${Math.ceil(ln_min)} mm.`};
}

function diagFin(){
  // Fin Plate connection — SCI P358 §5 elevation
  // Supporting UC on the left (cut through web in elevation), fin plate welded
  // to the flange face with a double fillet weld, notched beam bolted to plate.
  // P358 parameters shown: z_p (eccentricity), e_1, e_2p, p_1, L_p, h_p,
  //                        d_n (notch depth), l_n (notch length), g_h (clearance).
  const W=620, H=470;
  const s=svgStart(W,H);

  // ─── SUPPORTING COLUMN (UC, shown through full canvas height) ─────
  const ccx=70, cbf=110, ctf=18, ctw=16;
  const cFaceX=ccx+cbf/2;                    // right flange face = 125
  const col =
    `<rect x="${ccx-cbf/2}" y="0" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${ccx-ctw/2}" y="${ctf}" width="${ctw}" height="${H-2*ctf}" ${D.web}/>
     <rect x="${ccx-cbf/2}" y="${H-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── BEAM (drawn first, so plate appears over web in the overlap) ─
  const gh=10, bx=cFaceX+gh;                 // clearance gap g_h
  const bcy=H/2+10;                           // beam CL, nudged down slightly
  const bd=230, btf=18;
  const blen=W-bx-12;
  const btop=bcy-bd/2, bbot=bcy+bd/2;
  const ndn=40, nln=70;                       // notch depth & length
  // Top flange present only past the notch
  const topFlg=`<rect x="${bx+nln}" y="${btop}" width="${blen-nln}" height="${btf}" ${D.sec}/>`;
  // Web: L-shaped outline accounting for the top-flange notch cutout
  const webPoly =
    `<polygon points="
       ${bx},${btop+ndn}
       ${bx+nln},${btop+ndn}
       ${bx+nln},${btop+btf}
       ${bx+blen},${btop+btf}
       ${bx+blen},${bbot-btf}
       ${bx},${bbot-btf}" ${D.web}/>`;
  const botFlg=`<rect x="${bx}" y="${bbot-btf}" width="${blen}" height="${btf}" ${D.sec}/>`;
  // Emphasise the notch re-entrant corner (drawn on top of web)
  const notchLine =
    `<polyline points="${bx},${btop+ndn} ${bx+nln},${btop+ndn} ${bx+nln},${btop}"
       fill="none" stroke="#1a1a1a" stroke-width="1.6"/>`;
  const beam = topFlg + webPoly + botFlg + notchLine;

  // ─── FIN PLATE (drawn after the beam so it's visible in the overlap) ──
  // Plate fits between the top notch line and the top of the bottom flange.
  const ptop = btop + ndn + 8;               // small offset below notch
  const pbot = bbot - btf - 8;               // small offset above bot flange
  const ph   = pbot - ptop;                  // plate height
  const plp  = 130;                           // plate length
  const px   = cFaceX;
  const plate = `<rect x="${px}" y="${ptop}" width="${plp}" height="${ph}" ${D.plt}/>`;

  // ─── FILLET WELDS (both sides, along full plate height) ──────────
  const wld =
    `<line x1="${px}" y1="${ptop}" x2="${px}" y2="${ptop+ph}" stroke="#1a1a1a" stroke-width="3.2"/>
     <polygon points="${px},${ptop} ${px+10},${ptop} ${px},${ptop+10}" ${D.wld}/>
     <polygon points="${px},${ptop+ph} ${px+10},${ptop+ph} ${px},${ptop+ph-10}" ${D.wld}/>`;

  // ─── BOLT GROUP (n = 3, single vertical line) ────────────────────
  const e1=35, p1=60, e2p=45;
  const boltX=px+plp-e2p;                     // bolt CL = 45 from free edge
  const bY1=ptop+e1, bY2=bY1+p1, bY3=bY2+p1;
  const bolts = bolt(boltX,bY1)+bolt(boltX,bY2)+bolt(boltX,bY3);

  // ─── DIMENSIONS (P358 nomenclature) ──────────────────────────────
  // Right of plate: bolt spacing + h_p
  const dimsR =
    dimV(px+plp+20, ptop, bY1, 'e₁', px+plp+32) +
    dimV(px+plp+20, bY1, bY2, 'p₁', px+plp+32) +
    dimV(px+plp+20, bY2, bY3, 'p₁', px+plp+32) +
    dimV(px+plp+20, bY3, ptop+ph, 'e₁', px+plp+32) +
    dimV(px+plp+62, ptop, ptop+ph, 'h_p', px+plp+76);
  // Below plate: z_p, e_2p, L_p
  const dimsB =
    dimH(px, boltX, bbot+34, 'z_p', bbot+46) +
    dimH(boltX, px+plp, bbot+34, 'e₂_p', bbot+46) +
    dimH(px, px+plp, bbot+62, 'L_p', bbot+74);
  // Above: clearance g_h (over beam end) + notch d_n (left of beam), l_n (above notch)
  const dimsT =
    dimH(cFaceX, bx, btop-30, 'g_h', btop-18) +
    dimV(bx-18, btop, btop+ndn, 'd_n', bx-34) +
    dimH(bx, bx+nln, btop-16, 'l_n', btop-4);
  const dims = dimsR + dimsB + dimsT;

  // ─── LABELS & CALLOUTS ───────────────────────────────────────────
  const labs =
    // Column label above beam
    `<text ${D.txt} x="${ccx}" y="${btop/2+4}" text-anchor="middle">Column</text>
     <text ${D.sml} x="${ccx}" y="${btop/2+18}" text-anchor="middle">(supporting)</text>` +
    // Fin plate callout — short leader from plate top corner, out to top-right
    `<line x1="${px+plp-4}" y1="${ptop+4}" x2="${px+plp+60}" y2="${btop-30}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${px+plp+64}" y="${btop-34}">Fin plate</text>
     <text ${D.sml} x="${px+plp+64}" y="${btop-22}">t_p × L_p × h_p</text>` +
    // Beam label (far right, above top flange)
    label(bx+blen-8, btop-28, 'Beam (supported)', 'end') +
    slabel(bx+blen-8, btop-16, 'notched UB', 'end') +
    // Weld callout — leader down-left from weld mid-height, around the column,
    // ending below the column bottom flange (clear of all geometry).
    `<line x1="${px+2}" y1="${ptop+ph*0.65}" x2="${ccx-cbf/2-8}" y2="${H-6}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${H-20}" text-anchor="end">Double fillet weld,</text>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${H-8}" text-anchor="end">leg a_w each side</text>` +
    // Notch callout (short leader from notch corner, up and slightly right)
    `<line x1="${bx+nln}" y1="${btop+ndn-4}" x2="${bx+nln+30}" y2="${btop-54}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${bx+nln+34}" y="${btop-56}">top-flange notch</text>` +
    // Grade note under bolt group
    `<text ${D.sml} x="${boltX}" y="${bbot+94}" text-anchor="middle">n bolts, Grade 8.8</text>`;

  // ─── APPLIED SHEAR V_Ed (vertical, acting on the beam) ───────────
  const fax = boltX + 180;
  const far_y1 = bcy-80, far_y2 = bcy+btf/2;
  const force =
    `<line x1="${fax}" y1="${far_y1}" x2="${fax}" y2="${far_y2}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${fax+10}" y="${bcy-20}">V_Ed</text>`;

  return s + col + beam + plate + wld + bolts + dims + labs + force + '</svg>';
}

function diagPDEP(){
  // Partial Depth End Plate connection — SCI P358 §4.5 elevation.
  // Supporting UC on the left shown as full I-section. Partial-depth end plate
  // welded with a double fillet weld to the beam web ONLY (stops short of both
  // flanges — that's the defining feature of PDEP). Plate bolted through the
  // column flange face. All P358 geometric parameters labelled.
  const W=620, H=420;
  const s=svgStart(W,H);

  // ─── SUPPORTING COLUMN (UC) ──────────────────────────────
  const ccx=70, cbf=110, ctf=18, ctw=16;
  const cFaceX=ccx+cbf/2;                    // right flange face = 125
  const col =
    `<rect x="${ccx-cbf/2}" y="0" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${ccx-ctw/2}" y="${ctf}" width="${ctw}" height="${H-2*ctf}" ${D.web}/>
     <rect x="${ccx-cbf/2}" y="${H-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── BEAM (drawn first, plate sits in front of web in the overlap) ─
  const bcy=H/2;                              // beam CL on canvas centre
  const bd=220, btf=18;
  const bx=cFaceX;                            // beam end flush with column face
  const blen=W-bx-12;
  const btop=bcy-bd/2, bbot=bcy+bd/2;
  const topFlg=`<rect x="${bx}" y="${btop}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const botFlg=`<rect x="${bx}" y="${bbot-btf}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const web    =`<rect x="${bx}" y="${btop+btf}" width="${blen}" height="${bd-2*btf}" ${D.web}/>`;
  const beam = topFlg + web + botFlg;

  // ─── END PLATE (partial depth — sits inside the flanges) ─
  const pGap=14;                              // gap plate-to-flange (typical)
  const ptop=btop+btf+pGap, pbot=bbot-btf-pGap;
  const ph=pbot-ptop;
  const ptk=14;                               // plate thickness (drawn larger for clarity)
  const px=cFaceX-ptk;                        // plate bears against column flange
  const plate=`<rect x="${px}" y="${ptop}" width="${ptk}" height="${ph}" ${D.plt}/>`;

  // ─── FILLET WELDS (double fillet, plate to BEAM WEB only) ──
  // Shown as pair of triangles either side of the beam web at plate right edge.
  const wwx=cFaceX;
  const wld =
    weldTri(wwx, ptop, ptop+ph, 1) +           // weld on top side of web
    weldTri(wwx, ptop, ptop+ph,-1);            // weld on bottom side of web

  // ─── BOLTS (through plate into column flange) ────────────
  const e1=35, p1=60, n=3;
  const boltX=px+ptk/2;                       // bolt CL through plate thickness centre
  const bY=[];
  for(let i=0;i<n;i++) bY.push(ptop+e1+i*p1);
  const bolts=bY.map(y=>bolt(boltX,y)).join('');

  // ─── DIMENSIONS ─────────────────────────────────────────
  // Right of beam: e1, p1's, e1 and overall h_p
  const dimsR =
    dimV(bx+blen+18, ptop, bY[0], 'e₁', bx+blen+30) +
    dimV(bx+blen+18, bY[0], bY[1], 'p₁', bx+blen+30) +
    dimV(bx+blen+18, bY[1], bY[2], 'p₁', bx+blen+30) +
    dimV(bx+blen+18, bY[2], pbot, 'e₁', bx+blen+30) +
    dimV(bx+blen+60, ptop, pbot, 'h_p', bx+blen+74);
  // Left of column (plate-to-flange gap, top and bottom)
  const dimsL =
    dimV(ccx-cbf/2-16, btop+btf, ptop, 'gap', ccx-cbf/2-30) +
    dimV(ccx-cbf/2-16, pbot, bbot-btf, 'gap', ccx-cbf/2-30);

  // ─── LABELS & CALLOUTS ──────────────────────────────────
  const labs =
    `<text ${D.txt} x="${ccx}" y="${btop/2+4}" text-anchor="middle">Column</text>
     <text ${D.sml} x="${ccx}" y="${btop/2+18}" text-anchor="middle">(supporting)</text>` +
    // End plate callout (leader from plate, out to the left, above the gap dim)
    `<line x1="${px-2}" y1="${ptop+20}" x2="${ccx-cbf/2-8}" y2="${btop+btf+30}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${ccx-cbf/2-12}" y="${btop+btf+26}" text-anchor="end">End plate</text>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${btop+btf+38}" text-anchor="end">(partial depth)</text>` +
    // Weld callout — leader below beam, down-left under the column
    `<line x1="${cFaceX+6}" y1="${bcy+16}" x2="${ccx-cbf/2-8}" y2="${H-6}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${H-20}" text-anchor="end">Double fillet weld,</text>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${H-8}" text-anchor="end">to beam web only</text>` +
    // Beam label
    label(bx+blen-8, btop-8, 'Beam (supported)', 'end') +
    // Grade note below dimensions
    `<text ${D.sml} x="${bx+blen+30}" y="${pbot+28}" text-anchor="middle">n bolts, Grade 8.8</text>`;

  // ─── APPLIED SHEAR V_Ed (vertical on beam) ──────────────
  const fax=bx+blen-90;
  const force =
    `<line x1="${fax}" y1="${bcy-80}" x2="${fax}" y2="${bcy+btf/2}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${fax+10}" y="${bcy-20}">V_Ed</text>`;

  return s + col + beam + plate + wld + bolts + dimsR + dimsL + labs + force + '</svg>';
}

function diagFDEP(){
  // Full Depth End Plate connection — SCI P358 §4.7 elevation.
  // Plate is the full depth of the supported beam: welded to web AND to both
  // flanges (separate web and flange welds), then bolted through the supporting
  // column flange face. Four bolts typical — P358 §4.7 Check 1.
  const W=640, H=440;
  const s=svgStart(W,H);

  // ─── SUPPORTING COLUMN ──────────────────────────────────
  const ccx=70, cbf=110, ctf=18, ctw=16;
  const cFaceX=ccx+cbf/2;                    // right flange face = 125
  const col =
    `<rect x="${ccx-cbf/2}" y="0" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${ccx-ctw/2}" y="${ctf}" width="${ctw}" height="${H-2*ctf}" ${D.web}/>
     <rect x="${ccx-cbf/2}" y="${H-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── BEAM (UB, full depth) ──────────────────────────────
  const bcy=H/2;
  const bd=260, btf=20;
  const bx=cFaceX;
  const blen=W-bx-12;
  const btop=bcy-bd/2, bbot=bcy+bd/2;
  const topFlg=`<rect x="${bx}" y="${btop}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const botFlg=`<rect x="${bx}" y="${bbot-btf}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const web    =`<rect x="${bx}" y="${btop+btf}" width="${blen}" height="${bd-2*btf}" ${D.web}/>`;

  // ─── END PLATE (full depth, same as beam) ───────────────
  const ptk=16, px=cFaceX-ptk;
  const plate=`<rect x="${px}" y="${btop}" width="${ptk}" height="${bd}" ${D.plt}/>`;

  // ─── WELDS ──────────────────────────────────────────────
  // Web weld (both sides), full length between flanges
  const wwebTop = btop+btf, wwebBot = bbot-btf;
  const wldWeb = weldTri(cFaceX, wwebTop, wwebBot, 1) +
                 weldTri(cFaceX, wwebTop, wwebBot,-1);
  // Flange welds (along top flange bottom face and bottom flange top face, near plate)
  const fwLen=70;
  const wldFlg = weldH(cFaceX, cFaceX+fwLen, btop+btf,-1) +   // top flange
                 weldH(cFaceX, cFaceX+fwLen, bbot-btf, 1);    // bot flange

  // ─── BOLTS (4 off, 2 above + 2 below beam CL) ───────────
  const e1=35, p1=60, gap_mid=90;            // larger centre gap typical
  const boltX=px+ptk/2;
  const bY=[btop+e1, btop+e1+p1, bbot-e1-p1, bbot-e1];
  const bolts=bY.map(y=>bolt(boltX,y)).join('');

  // ─── DIMENSIONS ────────────────────────────────────────
  const dimsR =
    dimV(bx+blen+18, btop, bY[0], 'e₁', bx+blen+30) +
    dimV(bx+blen+18, bY[0], bY[1], 'p₁', bx+blen+30) +
    dimV(bx+blen+18, bY[1], bY[2], 'p', bx+blen+30) +
    dimV(bx+blen+18, bY[2], bY[3], 'p₁', bx+blen+30) +
    dimV(bx+blen+18, bY[3], bbot, 'e₁', bx+blen+30) +
    dimV(bx+blen+62, btop, bbot, 'h_p = d', bx+blen+82);
  const dimsL =
    dimV(ccx-cbf/2-14, btop, btop+btf, 't_f', ccx-cbf/2-28);

  // ─── LABELS & CALLOUTS ────────────────────────────────
  const labs =
    `<text ${D.txt} x="${ccx}" y="${btop/2+4}" text-anchor="middle">Column</text>
     <text ${D.sml} x="${ccx}" y="${btop/2+18}" text-anchor="middle">(supporting)</text>` +
    // End plate callout (leader from plate edge out to the left, well below column label)
    `<line x1="${px-2}" y1="${btop+40}" x2="${ccx-cbf/2-8}" y2="${btop+70}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${ccx-cbf/2-12}" y="${btop+66}" text-anchor="end">End plate</text>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${btop+78}" text-anchor="end">(full depth)</text>` +
    // Beam label
    label(bx+blen-8, btop-10, 'Beam (supported)', 'end') +
    // Weld callouts — web weld (below beam), flange weld (above top flange)
    `<line x1="${cFaceX+2}" y1="${bcy}" x2="${ccx-cbf/2-8}" y2="${H-8}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${H-22}" text-anchor="end">Web weld</text>
     <text ${D.sml} x="${ccx-cbf/2-12}" y="${H-10}" text-anchor="end">(double fillet, both sides)</text>` +
    `<line x1="${cFaceX+fwLen/2}" y1="${btop+btf+4}" x2="${cFaceX+fwLen+40}" y2="${btop-32}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${cFaceX+fwLen+44}" y="${btop-36}">Flange weld</text>
     <text ${D.sml} x="${cFaceX+fwLen+44}" y="${btop-24}">(top + bottom, one side)</text>` +
    `<text ${D.sml} x="${boltX+120}" y="${bbot+28}" text-anchor="middle">4 × bolts Grade 8.8</text>`;

  // ─── APPLIED SHEAR V_Ed (vertical) ────────────────────
  const fax=bx+blen-100;
  const force =
    `<line x1="${fax}" y1="${bcy-100}" x2="${fax}" y2="${bcy+btf/2}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${fax+10}" y="${bcy-30}">V_Ed</text>`;

  return s + col + topFlg + web + botFlg + plate + wldWeb + wldFlg + bolts +
         dimsR + dimsL + labs + force + '</svg>';
}

function diagCleat(){
  // Double Angle Cleat connection — EC3-1-8 / ECCS Pub.126.
  // Pair of equal-leg angle cleats: outstanding legs bolted to the column flange,
  // web legs bolted through the beam web. No site welding. P358 does NOT cover
  // this connection type — checks based on EC3-1-8.
  const W=620, H=420;
  const s=svgStart(W,H);

  // ─── SUPPORTING COLUMN ─────────────────────────────────
  const ccx=70, cbf=110, ctf=18, ctw=16;
  const cFaceX=ccx+cbf/2;                   // right flange face = 125
  const col =
    `<rect x="${ccx-cbf/2}" y="0" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${ccx-ctw/2}" y="${ctf}" width="${ctw}" height="${H-2*ctf}" ${D.web}/>
     <rect x="${ccx-cbf/2}" y="${H-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── BEAM (with small clearance from column face) ─────
  const gh=12, bx=cFaceX+gh;
  const bcy=H/2;
  const bd=220, btf=18;
  const blen=W-bx-12;
  const btop=bcy-bd/2, bbot=bcy+bd/2;
  const topFlg=`<rect x="${bx}" y="${btop}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const botFlg=`<rect x="${bx}" y="${bbot-btf}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const web    =`<rect x="${bx}" y="${btop+btf}" width="${blen}" height="${bd-2*btf}" ${D.web}/>`;

  // ─── ANGLE CLEAT (near side, drawn solid) ─────────────
  // Outstanding leg vertical against column flange; web leg horizontal into the
  // web gap region. Cleats sit between the flanges.
  const tc=10;
  const Lout=130;                            // outstanding leg length (vertical)
  const Lweb=78;                             // web-leg projection (horizontal)
  const cTop=bcy-Lout/2;
  // Outstanding leg: thin vertical rectangle against column flange
  const outLeg=`<rect x="${cFaceX}" y="${cTop}" width="${tc}" height="${Lout}" ${D.plt}/>`;
  // Web leg (near-side) — horizontal, ABOVE the beam web centre
  const webLegN=`<rect x="${cFaceX+tc}" y="${bcy-tc-5}" width="${Lweb}" height="${tc}" ${D.plt}/>`;
  // Far-side cleat (dashed, offset ×2 for clarity) — BELOW beam CL
  const outLegFar=
    `<rect x="${cFaceX+6}" y="${cTop+6}" width="${tc}" height="${Lout}"
       fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>`;
  const webLegFar=
    `<rect x="${cFaceX+tc+6}" y="${bcy+5}" width="${Lweb}" height="${tc}"
       fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>`;

  // ─── BOLTS ────────────────────────────────────────────
  // Support bolts through outstanding leg + column flange (3 bolts vertical)
  const sbx=cFaceX+tc/2;
  const sbY=[cTop+22, cTop+Lout/2, cTop+Lout-22];
  const sbolts=sbY.map(y=>bolt(sbx,y)).join('');
  // Web bolts — through BOTH cleats' web legs AND beam web (horizontal, 2 bolts)
  // Positioned ON beam CL (average of near cleat above CL and far cleat below CL)
  const wby=bcy;
  const wbX=[cFaceX+tc+22, cFaceX+tc+Lweb-18];
  const wbolts=wbX.map(x=>bolt(x,wby)).join('');

  // ─── DIMENSIONS ──────────────────────────────────────
  // Left side of column: e1, p1, p1, e1 between support bolts + L_out overall
  const dimsR =
    dimV(cFaceX-22, cTop, sbY[0], 'e₁', cFaceX-36) +
    dimV(cFaceX-22, sbY[0], sbY[1], 'p₁', cFaceX-36) +
    dimV(cFaceX-22, sbY[1], sbY[2], 'p₁', cFaceX-36) +
    dimV(cFaceX-22, sbY[2], cTop+Lout, 'e₁', cFaceX-36) +
    dimV(cFaceX-58, cTop, cTop+Lout, 'L_out', cFaceX-74);

  // ─── LABELS & CALLOUTS ──────────────────────────────
  const labs =
    `<text ${D.txt} x="${ccx}" y="${btop/2+4}" text-anchor="middle">Column</text>
     <text ${D.sml} x="${ccx}" y="${btop/2+18}" text-anchor="middle">(supporting)</text>` +
    label(bx+blen-8, btop-10, 'Beam (supported)', 'end') +
    // Cleat callout
    `<line x1="${cFaceX+tc+Lweb+4}" y1="${bcy-tc/2}" x2="${cFaceX+tc+Lweb+60}" y2="${btop-16}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${cFaceX+tc+Lweb+64}" y="${btop-20}">Angle cleats × 2</text>
     <text ${D.sml} x="${cFaceX+tc+Lweb+64}" y="${btop-8}">(near side solid,</text>
     <text ${D.sml} x="${cFaceX+tc+Lweb+64}" y="${btop+3}">far side dashed)</text>` +
    // Support bolts callout
    slabel(sbx-30, cTop-6, 'support bolts', 'end') +
    `<line x1="${sbx-8}" y1="${sbY[0]}" x2="${sbx-28}" y2="${cTop-14}" stroke="#555" stroke-width="0.7"/>` +
    // Web bolts callout
    slabel(wbX[1]+14, bbot+22, 'web bolts') +
    `<line x1="${wbX[1]+4}" y1="${wby+6}" x2="${wbX[1]+14}" y2="${bbot+20}" stroke="#555" stroke-width="0.7"/>` +
    // "No site welds" pill
    `<rect x="${bx+blen-130}" y="${bbot+20}" width="120" height="18" rx="3"
       fill="#f0f9f2" stroke="#1a5e28" stroke-width="0.8"/>
     <text ${D.sml} x="${bx+blen-70}" y="${bbot+33}" text-anchor="middle"
       style="fill:#1a5e28;font-weight:600">No site welds</text>`;

  // ─── APPLIED SHEAR V_Ed ────────────────────────────
  const fax=bx+blen-180;
  const force =
    `<line x1="${fax}" y1="${bcy-90}" x2="${fax}" y2="${bcy+btf/2}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${fax+10}" y="${bcy-30}">V_Ed</text>`;

  return s + col + topFlg + web + botFlg + outLegFar + webLegFar + outLeg + webLegN +
         sbolts + wbolts + dimsR + labs + force + '</svg>';
}

function diagSCleat(){
  // Single Angle Cleat — EC3-1-8 / ECCS Pub.126.
  // Single angle: outstanding leg bolted to column flange, web leg bolted through
  // beam web. Whole connection carries full V_Ed on a single plane — limits
  // capacity vs double cleat. Not covered by P358.
  const W=620, H=420;
  const s=svgStart(W,H);

  // ─── SUPPORTING COLUMN ─────────────────────────────────
  const ccx=70, cbf=110, ctf=18, ctw=16;
  const cFaceX=ccx+cbf/2;
  const col =
    `<rect x="${ccx-cbf/2}" y="0" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${ccx-ctw/2}" y="${ctf}" width="${ctw}" height="${H-2*ctf}" ${D.web}/>
     <rect x="${ccx-cbf/2}" y="${H-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── BEAM ──────────────────────────────────────────────
  const gh=12, bx=cFaceX+gh;
  const bcy=H/2;
  const bd=220, btf=18;
  const blen=W-bx-12;
  const btop=bcy-bd/2, bbot=bcy+bd/2;
  const topFlg=`<rect x="${bx}" y="${btop}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const botFlg=`<rect x="${bx}" y="${bbot-btf}" width="${blen}" height="${btf}" ${D.sec}/>`;
  const web    =`<rect x="${bx}" y="${btop+btf}" width="${blen}" height="${bd-2*btf}" ${D.web}/>`;

  // ─── SINGLE ANGLE CLEAT ─────────────────────────────
  const tc=10, Lout=130, Lweb=78;
  const cTop=bcy-Lout/2;
  const outLeg=`<rect x="${cFaceX}" y="${cTop}" width="${tc}" height="${Lout}" ${D.plt}/>`;
  const webLeg=`<rect x="${cFaceX+tc}" y="${bcy-tc/2}" width="${Lweb}" height="${tc}" ${D.plt}/>`;

  // ─── BOLTS ──────────────────────────────────────────
  const sbx=cFaceX+tc/2;
  const sbY=[cTop+22, cTop+Lout/2, cTop+Lout-22];
  const sbolts=sbY.map(y=>bolt(sbx,y)).join('');
  const wbY=bcy;
  const wbX=[cFaceX+tc+22, cFaceX+tc+Lweb-18];
  const wbolts=wbX.map(x=>bolt(x,wbY)).join('');

  // ─── DIMENSIONS ────────────────────────────────────
  const dimsR =
    dimV(cFaceX-22, cTop, sbY[0], 'e₁', cFaceX-36) +
    dimV(cFaceX-22, sbY[0], sbY[1], 'p₁', cFaceX-36) +
    dimV(cFaceX-22, sbY[1], sbY[2], 'p₁', cFaceX-36) +
    dimV(cFaceX-22, sbY[2], cTop+Lout, 'e₁', cFaceX-36) +
    dimV(cFaceX-58, cTop, cTop+Lout, 'L_out', cFaceX-74);

  // ─── LABELS & CALLOUTS ────────────────────────────
  const labs =
    `<text ${D.txt} x="${ccx}" y="${btop/2+4}" text-anchor="middle">Column</text>
     <text ${D.sml} x="${ccx}" y="${btop/2+18}" text-anchor="middle">(supporting)</text>` +
    label(bx+blen-8, btop-10, 'Beam (supported)', 'end') +
    `<line x1="${cFaceX+tc+Lweb+4}" y1="${bcy}" x2="${cFaceX+tc+Lweb+60}" y2="${btop-16}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${cFaceX+tc+Lweb+64}" y="${btop-20}">Single angle cleat</text>
     <text ${D.sml} x="${cFaceX+tc+Lweb+64}" y="${btop-8}">(one side only)</text>` +
    slabel(sbx-30, cTop-6, 'support bolts', 'end') +
    `<line x1="${sbx-8}" y1="${sbY[0]}" x2="${sbx-28}" y2="${cTop-14}" stroke="#555" stroke-width="0.7"/>` +
    slabel(wbX[1]+14, bbot+22, 'web bolts') +
    `<line x1="${wbX[1]+4}" y1="${wbY+6}" x2="${wbX[1]+14}" y2="${bbot+20}" stroke="#555" stroke-width="0.7"/>` +
    // Capacity warning pill
    `<rect x="${bx+blen-170}" y="${bbot+18}" width="160" height="18" rx="3"
       fill="#fff8ed" stroke="#c47a0a" stroke-width="0.8"/>
     <text ${D.sml} x="${bx+blen-90}" y="${bbot+31}" text-anchor="middle"
       style="fill:#c47a0a;font-weight:600">Full V on one cleat</text>`;

  // ─── APPLIED SHEAR V_Ed ─────────────────────────
  const fax=bx+blen-190;
  const force =
    `<line x1="${fax}" y1="${bcy-90}" x2="${fax}" y2="${bcy+btf/2}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${fax+10}" y="${bcy-30}">V_Ed</text>`;

  return s + col + topFlg + web + botFlg + outLeg + webLeg +
         sbolts + wbolts + dimsR + labs + force + '</svg>';
}

function diagSplice(){
  // Column Splice connection — SCI P358 §6 elevation.
  // Bolted bearing splice: upper column sits on a finished bearing surface with
  // a small gap to the lower column. Cover plates bolted to each flange (pair)
  // and to the web (pair). Transfers axial force, shear and nominal moment from
  // construction eccentricity.
  const W=620, H=460;
  const s=svgStart(W,H);

  const cx=W/2;
  const ctf=18, ctw=12, cbf=140;
  const gap=12;                               // bearing gap
  const upBot=H/2-gap/2;
  const loTop=H/2+gap/2;

  // ─── UPPER COLUMN ──────────────────────────────────
  const upper =
    `<rect x="${cx-cbf/2}" y="10" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${cx-ctw/2}" y="${10+ctf}" width="${ctw}" height="${upBot-10-ctf-ctf}" ${D.web}/>
     <rect x="${cx-cbf/2}" y="${upBot-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── LOWER COLUMN ──────────────────────────────────
  const lower =
    `<rect x="${cx-cbf/2}" y="${loTop}" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${cx-ctw/2}" y="${loTop+ctf}" width="${ctw}" height="${H-10-loTop-ctf-ctf}" ${D.web}/>
     <rect x="${cx-cbf/2}" y="${H-10-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── BEARING INTERFACE (between columns) ──────────
  const bearing =
    `<line x1="${cx-cbf/2-14}" y1="${upBot}" x2="${cx+cbf/2+14}" y2="${upBot}"
       stroke="#555" stroke-width="0.8" stroke-dasharray="6,3"/>
     <line x1="${cx-cbf/2-14}" y1="${loTop}" x2="${cx+cbf/2+14}" y2="${loTop}"
       stroke="#555" stroke-width="0.8" stroke-dasharray="6,3"/>`;

  // ─── WEB COVER PLATES (near + far, pair either side of web) ─
  const wph=110, wpw=10;
  const wpy=H/2-wph/2;
  const wpxL=cx-ctw/2-wpw, wpxR=cx+ctw/2;
  const webPlates=
    `<rect x="${wpxL}" y="${wpy}" width="${wpw}" height="${wph}" ${D.plt}/>
     <rect x="${wpxR}" y="${wpy}" width="${wpw}" height="${wph}" ${D.plt}/>`;
  // Web bolts: 2 above + 2 below splice line, through both plates and web
  const wbxL=wpxL+wpw/2, wbxR=wpxR+wpw/2;
  const wbyT1=H/2-35, wbyT2=H/2-15;
  const wbyB1=H/2+15, wbyB2=H/2+35;
  const webBolts=[wbyT1,wbyT2,wbyB1,wbyB2].map(y=>bolt(wbxL,y)+bolt(wbxR,y)).join('');

  // ─── FLANGE COVER PLATES (outside face, top + bottom) ─
  const fpw=cbf*0.75, fph=10;
  const fpx1=cx-fpw/2;
  const fpyT=upBot-ctf-fph-1, fpyB=loTop+ctf+1;
  const flgPlates=
    `<rect x="${fpx1}" y="${fpyT}" width="${fpw}" height="${fph}" ${D.plt}/>
     <rect x="${fpx1}" y="${fpyB}" width="${fpw}" height="${fph}" ${D.plt}/>`;
  // Flange bolts: 2 up + 2 down on each plate, symmetric about splice
  const fbxL=fpx1+18, fbxR=fpx1+fpw-18;
  const fbyT=fpyT+fph/2, fbyB=fpyB+fph/2;
  const flgBolts=[[fbxL,fbyT],[fbxR,fbyT],[fbxL,fbyB],[fbxR,fbyB]]
    .map(([x,y])=>bolt(x,y)).join('');

  // ─── APPLIED FORCES (N at top, V horizontal at splice line) ─
  const force_N=
    `<line x1="${cx}" y1="${16}" x2="${cx}" y2="${44}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${cx+8}" y="${36}">N_Ed</text>`;
  const force_V=
    `<line x1="${cx+cbf/2+90}" y1="${H/2}" x2="${cx+cbf/2+24}" y2="${H/2}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${cx+cbf/2+94}" y="${H/2+5}">V_Ed</text>`;

  // ─── DIMENSIONS ────────────────────────────────
  const dims =
    dimV(cx+cbf/2+14, upBot, loTop, 'gap', cx+cbf/2+40) +
    dimV(wpxR+wpw+14, wpy, wpy+wph, 'L_cp', wpxR+wpw+32);

  // ─── LABELS & CALLOUTS ───────────────────────
  const labs =
    label(cx-cbf/2-80, 80, 'Upper column') +
    label(cx-cbf/2-80, H-80, 'Lower column') +
    // Web cover plate callout
    `<line x1="${wpxL-2}" y1="${wpy+10}" x2="${wpxL-36}" y2="${wpy-12}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${wpxL-40}" y="${wpy-15}" text-anchor="end">Web cover plates</text>
     <text ${D.sml} x="${wpxL-40}" y="${wpy-4}" text-anchor="end">(×2, both sides)</text>` +
    // Flange cover plate callout
    `<line x1="${fpx1+fpw+2}" y1="${fpyT+fph/2}" x2="${fpx1+fpw+36}" y2="${fpyT-14}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${fpx1+fpw+40}" y="${fpyT-17}">Flange cover plates</text>
     <text ${D.sml} x="${fpx1+fpw+40}" y="${fpyT-6}">(×4 total)</text>` +
    // Bearing gap callout
    slabel(cx-cbf/2-14, H/2+3, 'bearing surface', 'end');

  return s + upper + lower + bearing + webPlates + webBolts + flgPlates + flgBolts +
         force_N + force_V + dims + labs + '</svg>';
}

function diagBase(){
  // Column Base connection — SCI P358 §7 elevation.
  // Column welded to base plate via fillet welds, base plate bedded on grout
  // onto a concrete foundation, with holding-down bolts cast into the concrete.
  // Shows cantilever 'c' (P358 effective outstand), base plate thickness t_p,
  // base plate width B_p, grout layer and HD bolts.
  const W=600, H=480;
  const s=svgStart(W,H);

  // ─── COLUMN (UC, sitting above base plate) ─────────────
  const cx=W/2, ctf=18, ctw=14, cbf=130;
  const colTopY=20, colBotY=260;
  const col =
    `<rect x="${cx-cbf/2}" y="${colTopY}" width="${cbf}" height="${ctf}" ${D.sec}/>
     <rect x="${cx-ctw/2}" y="${colTopY+ctf}" width="${ctw}" height="${colBotY-colTopY-2*ctf}" ${D.web}/>
     <rect x="${cx-cbf/2}" y="${colBotY-ctf}" width="${cbf}" height="${ctf}" ${D.sec}/>`;

  // ─── WELDS (fillet welds, column flanges to base plate) ─
  const wldCol =
    weldH(cx-cbf/2, cx-ctw/2, colBotY, 1) +
    weldH(cx+ctw/2, cx+cbf/2, colBotY, 1);

  // ─── BASE PLATE ──────────────────────────────────────
  const bpw=280, bph=20;
  const bpx=cx-bpw/2, bpy=colBotY;
  const basePlate=`<rect x="${bpx}" y="${bpy}" width="${bpw}" height="${bph}" ${D.plt}/>`;

  // ─── GROUT LAYER ────────────────────────────────────
  const grty=bpy+bph, grth=14;
  const grout =
    `<rect x="${bpx-14}" y="${grty}" width="${bpw+28}" height="${grth}"
       fill="#e8e8e8" stroke="#888" stroke-width="0.8" stroke-dasharray="4,2"/>
     <text ${D.sml} x="${cx}" y="${grty+grth/2+3}" text-anchor="middle">grout</text>`;

  // ─── CONCRETE FOUNDATION ───────────────────────────
  const cony=grty+grth, conh=120;
  const conc =
    `<rect x="${bpx-48}" y="${cony}" width="${bpw+96}" height="${conh}" ${D.hat} stroke="#777" stroke-width="1"/>
     <text ${D.sml} x="${cx}" y="${cony+conh/2+3}" text-anchor="middle">Concrete foundation</text>`;

  // ─── HOLDING-DOWN BOLTS (4 off — show 2 in this elevation) ─
  const hdInset=36;
  const hdx1=bpx+hdInset, hdx2=bpx+bpw-hdInset;
  const hdShaftBot=cony+conh-8;
  const hdBolts =
    // Shafts embedded in concrete
    `<line x1="${hdx1}" y1="${bpy}" x2="${hdx1}" y2="${hdShaftBot}" stroke="#444" stroke-width="3"/>
     <line x1="${hdx2}" y1="${bpy}" x2="${hdx2}" y2="${hdShaftBot}" stroke="#444" stroke-width="3"/>` +
    // Anchor (bottom) — horizontal washer plate
    `<rect x="${hdx1-10}" y="${hdShaftBot}" width="20" height="5" fill="#444"/>
     <rect x="${hdx2-10}" y="${hdShaftBot}" width="20" height="5" fill="#444"/>` +
    // Nut + washer at base plate level
    bolt(hdx1, bpy+bph/2, 7) + bolt(hdx2, bpy+bph/2, 7);

  // ─── DIMENSIONS ────────────────────────────────────
  const dims =
    // Cantilever distances left & right of column flange (below base plate)
    dimH(bpx, cx-cbf/2, bpy+bph+34, 'c', bpy+bph+46) +
    dimH(cx+cbf/2, bpx+bpw, bpy+bph+34, 'c', bpy+bph+46) +
    // Overall base plate width (below concrete foundation)
    dimH(bpx, bpx+bpw, cony+conh+22, 'B_p', cony+conh+34) +
    // Base plate thickness (left of plate)
    dimV(bpx-22, bpy, bpy+bph, 't_p', bpx-36) +
    // Bolt edge distance (ex) — above the base plate
    dimH(bpx, hdx1, bpy-18, 'e_x', bpy-8);

  // ─── APPLIED FORCES (N, V) ────────────────────────
  const forces =
    // Axial N — vertical down at top of column
    `<line x1="${cx}" y1="4" x2="${cx}" y2="${colTopY-4}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${cx+8}" y="${colTopY-8}">N_Ed</text>` +
    // Shear V — horizontal, applied on column
    `<line x1="${cx+cbf/2+70}" y1="${colTopY+60}" x2="${cx+cbf/2+10}" y2="${colTopY+60}" stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${cx+cbf/2+74}" y="${colTopY+64}">V_Ed</text>`;

  // ─── LABELS & CALLOUTS ───────────────────────────
  const labs =
    // Column label — mid-column on the left
    label(cx-cbf/2-90, colTopY+100, 'Column') +
    // Base plate callout — leader from plate top-right, out to the right side
    `<line x1="${bpx+bpw-20}" y1="${bpy+2}" x2="${bpx+bpw+40}" y2="${bpy-18}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${bpx+bpw+44}" y="${bpy-22}">Base plate</text>` +
    // HD bolt callout — leader from an HD shaft inside concrete out to the left
    `<line x1="${hdx1-8}" y1="${cony+30}" x2="${hdx1-50}" y2="${cony+50}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${hdx1-54}" y="${cony+54}" text-anchor="end">HD bolts,</text>
     <text ${D.sml} x="${hdx1-54}" y="${cony+66}" text-anchor="end">cast-in anchors</text>` +
    // Fillet weld callout — leader from weld corner out to the left, above base plate
    `<line x1="${cx-cbf/2-2}" y1="${colBotY-2}" x2="${cx-cbf/2-50}" y2="${colBotY-30}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${cx-cbf/2-54}" y="${colBotY-34}" text-anchor="end">Fillet weld,</text>
     <text ${D.sml} x="${cx-cbf/2-54}" y="${colBotY-22}" text-anchor="end">leg a_w</text>`;

  return s + col + wldCol + basePlate + grout + conc + hdBolts +
         dims + forces + labs + '</svg>';
}

function diagBrace(){
  // Bracing Connection — SCI P358 §8 elevation.
  // Corner gusset plate welded to the supporting column (vertical) and the
  // supporting beam (horizontal). Diagonal brace member (flat bar or angle)
  // bolted to the gusset in a single row at 45°. Eccentricity e taken from the
  // bolt-group centroid to the intersection of member working axes.
  const W=640, H=460;
  const s=svgStart(W,H);

  // ─── SUPPORTING BEAM (horizontal, bottom) ─────────────
  const btf=18, bWeb=40;
  const bTopY=H-90;                           // top of beam top-flange
  const bBotY=bTopY+btf+bWeb+btf;             // bottom of beam bottom-flange
  const beamH =
    `<rect x="0" y="${bTopY}" width="${W}" height="${btf}" ${D.sec}/>
     <rect x="0" y="${bTopY+btf}" width="${W}" height="${bWeb}" ${D.web}/>
     <rect x="0" y="${bTopY+btf+bWeb}" width="${W}" height="${btf}" ${D.sec}/>`;

  // ─── SUPPORTING COLUMN (vertical, left) ───────────────
  const ctf=18, cWeb=44;
  const cRightX=ctf+cWeb+ctf;                 // right face of column = 80
  const colV =
    `<rect x="0" y="0" width="${ctf}" height="${bTopY}" ${D.sec}/>
     <rect x="${ctf}" y="0" width="${cWeb}" height="${bTopY}" ${D.web}/>
     <rect x="${ctf+cWeb}" y="0" width="${ctf}" height="${bTopY}" ${D.sec}/>`;

  // ─── GUSSET PLATE (triangle in corner, 45° hypotenuse) ─
  const gSize=200;                            // equal extents along beam & column
  const gAx=cRightX,       gAy=bTopY;         // inner corner
  const gBx=cRightX+gSize, gBy=bTopY;         // along beam
  const gCx=cRightX,       gCy=bTopY-gSize;   // along column
  const gusset=`<polygon points="${gAx},${gAy} ${gBx},${gBy} ${gCx},${gCy}" ${D.plt}/>`;

  // ─── GUSSET WELDS ───────────────────────────────────
  // Fillet weld along beam interface (gusset bottom edge)
  const wldBeam = weldH(gAx+8, gBx-8, gAy, -1);
  // Fillet weld along column interface (gusset left edge)
  const wldCol  = weldTri(gAx, gCy+8, gAy-8, 1);

  // ─── BRACE AXIS (45° up-right from hypotenuse midpoint) ─
  // Midpoint of hypotenuse BC, working axis passes through this point.
  const hmX=(gBx+gCx)/2, hmY=(gBy+gCy)/2;     // hypotenuse midpoint = (200, 270)
  const cosA=Math.SQRT1_2, sinA=Math.SQRT1_2; // 45°
  const axDX=cosA, axDY=-sinA;                 // axis unit vector (up-right)
  const pDX=sinA,  pDY=cosA;                   // perpendicular unit vector

  // ─── BRACE MEMBER ───────────────────────────────────
  // Flat bar centred on axis, starts just inside gusset, extends up-right.
  const bw=28, bl=260;
  // Start 24mm inside the gusset (overlap, so the end is covered)
  const sX=hmX-24*axDX, sY=hmY-24*axDY;
  const eX=sX+bl*axDX,  eY=sY+bl*axDY;
  const c1x=sX+pDX*bw/2, c1y=sY+pDY*bw/2;
  const c2x=sX-pDX*bw/2, c2y=sY-pDY*bw/2;
  const c3x=eX-pDX*bw/2, c3y=eY-pDY*bw/2;
  const c4x=eX+pDX*bw/2, c4y=eY+pDY*bw/2;
  const brace=`<polygon points="${c1x},${c1y} ${c2x},${c2y} ${c3x},${c3y} ${c4x},${c4y}" ${D.sec}/>`;

  // ─── BOLTS (3 off, single row along brace axis) ────
  // First bolt at e1 from the brace end inside the gusset, then p1 apart.
  const e1=36, p1=56;
  const b0x=hmX+e1*axDX,     b0y=hmY+e1*axDY;
  const b1x=b0x+p1*axDX,     b1y=b0y+p1*axDY;
  const b2x=b1x+p1*axDX,     b2y=b1y+p1*axDY;
  const bolts=bolt(b0x,b0y)+bolt(b1x,b1y)+bolt(b2x,b2y);

  // ─── APPLIED AXIAL FORCE (along brace, up-right) ───
  const fX=eX+16*axDX, fY=eY+16*axDY;
  const fStartX=fX+54*axDX, fStartY=fY+54*axDY;
  const force =
    `<line x1="${fStartX}" y1="${fStartY}" x2="${fX}" y2="${fY}"
       stroke="#1a5e28" stroke-width="3" marker-end="url(#arr)"/>
     <text ${D.grn} x="${fStartX+16}" y="${fStartY+4}">N_Ed</text>`;

  // ─── ECCENTRICITY e (bolt-group centroid to column CL) ───
  // Working point on column = column CL at beam top face.
  const wpX2=ctf+cWeb/2;
  // Centroid = middle bolt (b1). Drop vertical guide from centroid down to beam.
  const ecc =
    `<line x1="${b1x}" y1="${b1y}" x2="${b1x}" y2="${bTopY-6}"
       stroke="#555" stroke-width="0.7" stroke-dasharray="4,3"/>
     <line x1="${wpX2}" y1="${bTopY-16}" x2="${b1x}" y2="${bTopY-16}"
       stroke="#555" stroke-width="0.8" marker-start="url(#darrr)" marker-end="url(#darr)"/>
     <text ${D.sml} x="${(wpX2+b1x)/2}" y="${bTopY-20}" text-anchor="middle">e</text>`;

  // ─── DIMENSIONS ────────────────────────────────
  // h_g outside the column (far left of everything)
  const dims =
    dimV(gAx-40, gCy, gAy, 'h_g', gAx-56) +
    dimH(gAx, gBx, bBotY+30, 'l_g', bBotY+42);

  // ─── LABELS & CALLOUTS ───────────────────────
  const labs =
    // Column label — on its top area
    `<text ${D.txt} x="${cRightX/2}" y="100" text-anchor="middle">Column</text>` +
    // Beam label — far right, below beam bottom flange
    `<text ${D.txt} x="${W-60}" y="${bBotY+26}" text-anchor="middle">Beam</text>` +
    // Gusset callout — leader from gusset centroid to clear area top-right,
    // above the brace member exit point
    `<line x1="${gAx+gSize*0.4}" y1="${gAy-gSize*0.3}" x2="${gBx+50}" y2="${gAy-60}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${gBx+54}" y="${gAy-60}">Gusset plate</text>` +
    // Brace callout — leader from LOWER side of brace out to top-left clear area
    `<line x1="${c3x-40}" y1="${c3y+20}" x2="${c3x-80}" y2="${c3y-24}" stroke="#555" stroke-width="0.7"/>
     <text ${D.txt} x="${c3x-84}" y="${c3y-28}" text-anchor="end">Bracing member</text>
     <text ${D.sml} x="${c3x-84}" y="${c3y-16}" text-anchor="end">(flat bar / angle)</text>` +
    // Weld callouts — leaders from weld triangles out to clear areas outside gusset
    `<line x1="${gAx+gSize/2}" y1="${gAy+8}" x2="${gAx+gSize/2+40}" y2="${bBotY+btf-6}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${gAx+gSize/2+44}" y="${bBotY+btf-4}">fillet weld (beam)</text>` +
    `<line x1="${gAx-8}" y1="${(gAy+gCy)/2}" x2="${gAx-44}" y2="${(gAy+gCy)/2-30}" stroke="#555" stroke-width="0.7"/>
     <text ${D.sml} x="${gAx-48}" y="${(gAy+gCy)/2-32}" text-anchor="end">fillet weld</text>
     <text ${D.sml} x="${gAx-48}" y="${(gAy+gCy)/2-20}" text-anchor="end">(column)</text>`;

  return s + beamH + colV + gusset + wldBeam + wldCol + brace + bolts +
         ecc + dims + force + labs + '</svg>';
}

};
